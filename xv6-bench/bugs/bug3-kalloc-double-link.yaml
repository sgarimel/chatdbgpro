id: xv6-bug3-kalloc-no-advance
language: c
source_file: kernel/kalloc.c
trigger: trigalloc
description: >
  In kalloc(), the freelist head is assigned to itself
  (kmem.freelist = kmem.freelist) instead of advancing to
  the next node (kmem.freelist = r->next). Every call to
  kalloc() returns the same physical page. Multiple virtual
  pages, page-table pages, and process structures all alias
  to the same physical frame, causing immediate memory
  corruption and kernel panic.
criteria:
  root_cause: >
    Diagnosis must identify that kalloc() in kernel/kalloc.c
    around line 75 fails to advance the freelist head: the
    assignment 'kmem.freelist = kmem.freelist' is a no-op
    instead of the correct 'kmem.freelist = r->next'. This
    causes every allocation to return the same physical page.
  local_fix: >
    Change 'kmem.freelist = kmem.freelist' to
    'kmem.freelist = r->next' in kalloc() at kernel/kalloc.c
    line 75.
  global_fix: >
    The model must explain that kalloc manages a singly-linked
    free list of physical pages. Allocation must remove the head
    node by advancing the head pointer to head->next. When the
    head is not advanced, every kalloc() returns the same page.
    This means page table pages, user pages, pipe buffers, and
    kernel stacks all share a single physical frame. Writes to
    any of these structures corrupt all others, leading to invalid
    page table entries, corrupted process state, and kernel panic.
patch_file: kernel/kalloc.c
patch_line: 75
patch_function: kalloc
bug_type: memory_corruption
