id: xv6-bug2-pipewrite-skip
language: c
source_file: kernel/pipe.c
trigger: trigpipe
description: >
  In pipewrite(), the user-buffer index 'i' is incremented by 2
  instead of 1 after each byte is copied via copyin. This causes
  pipewrite to skip every other byte of the source buffer, reading
  from addr+0, addr+2, addr+4, ... while nwrite advances by 1
  each time. The written data is corrupted (interleaved with bytes
  from unintended offsets). When 'i' overshoots the user buffer,
  copyin reads from an unmapped page and returns -1, truncating
  the write.
criteria:
  root_cause: >
    Diagnosis must identify that in pipewrite() in kernel/pipe.c
    around line 95, the loop counter 'i' is incremented by 2
    instead of 1 (i += 2 instead of i++), causing every other
    source byte to be skipped and the copyin offset to overshoot
    the user buffer.
  local_fix: >
    Change 'i += 2' back to 'i++' (or equivalently 'i += 1')
    in the pipewrite inner loop at kernel/pipe.c line 95.
  global_fix: >
    The model must explain that i tracks the offset into the user
    buffer (addr + i) for copyin, while nwrite tracks the pipe's
    internal write position. Incrementing i by 2 desynchronizes
    the user-buffer read position from the pipe write position:
    only half the intended bytes are copied, and the copyin call
    eventually reads past the end of the user's valid memory
    region, producing truncated and corrupted pipe data.
patch_file: kernel/pipe.c
patch_line: 95
patch_function: pipewrite
bug_type: off_by_one
