id: xv6-bug4-kalloc-no-lock
language: c
source_file: kernel/kalloc.c
trigger: trigrace
description: >
  Removes acquire(&kmem.lock) and release(&kmem.lock) from both kfree()
  and kalloc(). With SMP enabled (2+ CPUs), concurrent calls to kalloc/kfree
  race on the shared freelist. Two CPUs can read the same freelist head
  simultaneously, both allocate the same page, causing memory corruption.
  This is a TOCTOU race on the freelist that is invisible in single-threaded
  execution and cannot be found by reading the code alone without noticing
  the missing locks.
criteria:
  root_cause: >
    Diagnosis must identify that kalloc() and/or kfree() in kernel/kalloc.c
    are missing their spinlock acquire/release around the freelist manipulation.
    The race condition occurs because multiple CPUs can concurrently read and
    modify kmem.freelist without mutual exclusion.
  local_fix: >
    Re-add acquire(&kmem.lock) before and release(&kmem.lock) after the
    freelist manipulation in both kalloc() and kfree().
  global_fix: >
    The model must explain that kmem.freelist is shared mutable state
    accessed by all CPUs. Without the spinlock, concurrent kalloc() calls
    can read the same freelist head (TOCTOU), both advance the pointer,
    and return the same physical page to two different callers. This causes
    two page tables or kernel structures to alias the same physical frame,
    leading to memory corruption, data races, and eventual panic. The
    spinlock serializes access to ensure each page is allocated to exactly
    one caller.
patch_file: kernel/kalloc.c
patch_line: 59
patch_function: kfree
bug_type: race_condition
