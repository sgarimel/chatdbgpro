id: xv6-bug1-uvmcopy-perm
language: c
source_file: kernel/vm.c
trigger: trigfork
description: >
  In uvmcopy(), the flags copied from parent PTEs have PTE_U stripped
  via (flags & ~PTE_U) before mapping into the child page table.
  After fork(), the child process's pages lack user-mode access permission.
  Any memory access in the child triggers a store/load page fault,
  killing the child process.
criteria:
  root_cause: >
    Diagnosis must identify that uvmcopy() in kernel/vm.c around line 314
    strips the PTE_U bit from the page table flags when copying pages
    from parent to child, causing user-mode page faults in the child
    after fork().
  local_fix: >
    The fix is to remove the '& ~PTE_U' mask so the child's pages
    retain the same permission flags as the parent:
    change 'mappages(new, i, PGSIZE, (uint64)mem, flags & ~PTE_U)'
    to    'mappages(new, i, PGSIZE, (uint64)mem, flags)'
  global_fix: >
    The model must explain WHY the bug occurs: uvmcopy is responsible
    for duplicating the parent's address space for the child during fork().
    Stripping PTE_U means the child's page table entries are marked as
    supervisor-only, so any user-mode access (read, write, or instruction
    fetch) triggers a page fault. The underlying principle is that
    fork() must preserve all permission bits to maintain the invariant
    that child and parent have identical virtual memory layouts.
patch_file: kernel/vm.c
patch_line: 314
patch_function: uvmcopy
bug_type: permission_error
