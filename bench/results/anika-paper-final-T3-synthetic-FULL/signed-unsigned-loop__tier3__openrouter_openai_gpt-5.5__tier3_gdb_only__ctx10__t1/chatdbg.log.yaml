      - output: |-
          ROOT CAUSE: `program.cpp:10` uses `for (size_t i = v.size() - 1; i >= 0; i--)`,
          but `size_t` is unsigned, so `i >= 0` is always true. In GDB, the first call to
          `print_reverse` had `v.size() == 3`, so `i` started at `2`, then became `1`,
          then `0`; after printing `v[0]`, `i--` wrapped around to `18446744073709551615`,
          and `i >= 0` still evaluated to `true`. The next iteration therefore evaluates
          `v[i]` with a huge unsigned index, producing an out-of-bounds read under
          AddressSanitizer; for an empty vector the initialization `v.size() - 1` would
          also immediately underflow to that same maximum value.

          LOCAL FIX: Replace the unsigned reverse loop with an idiom that never tests an
          unsigned value against zero after decrementing. A minimal safe edit is:
          ```diff
           static void print_reverse(const std::vector<int>& v) {
          -    for (size_t i = v.size() - 1; i >= 0; i--) {
          +    for (size_t i = v.size(); i-- > 0;) {
                   std::printf("%d\n", v[i]);
               }
           }
          ```
          This starts one past the last valid index, decrements before use, prints indices
          `size-1` down to `0`, and for an empty vector the condition `i-- > 0` is false
          before any access occurs.

          GLOBAL FIX: Avoid hand-written index arithmetic for reverse traversal when the
          container already provides bounded iteration. For example, implement this
          pattern using reverse iterators:
          ```cpp
          for (auto it = v.rbegin(); it != v.rend(); ++it) {
              std::printf("%d\n", *it);
          }
          ```
          More broadly, prefer iterator/range-based APIs or a small helper such as
          `print_reverse(std::span<const int>)` using reverse iterators, and enable
          warnings such as `-Wall -Wextra -Wtype-limits`/`-Wsign-compare` so impossible
          unsigned comparisons like `i >= 0` are caught during compilation.
        type: text
