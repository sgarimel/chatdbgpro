          ## Analysis

          The bug is in the `first_field` function at line 12 of `program.c`. Here's what
          happens:

          1. The input is `"alice,bob,carol\n"`
          2. The function finds the first comma at position 5
          3. It calculates `n = 5` (the length of "alice")
          4. It allocates `malloc(n)` which is only 5 bytes
          5. It copies 5 characters into the buffer: "alice"
          6. It then tries to write a null terminator at `out[5]`, which is one byte past
          the end of the 5-byte allocation

          The valid indices for a 5-byte allocation are `out[0]` through `out[4]`. Writing
          to `out[5]` is a one-byte heap-buffer-overflow.

          The fix is to allocate `n + 1` bytes instead of `n` bytes to account for the
          null terminator.

          ROOT CAUSE: program.c:12 - The function allocates `malloc(n)` where `n` is the
          number of characters in the field (e.g., 5 for "alice"), but then writes a null
          terminator at index `n` (line 17: `out[n] = '\0'`). Since C strings require a
          null terminator after the last character, the allocation needs to be `n + 1`
          bytes to hold `n` characters plus the terminator. With only `n` bytes allocated,
          writing to `out[n]` accesses one byte past the end of the heap allocation,
          triggering a heap-buffer-overflow when AddressSanitizer is enabled.

          LOCAL FIX: Change line 12 from `char *out = (char *)malloc(n);` to `char *out =
