id: test-pointers
language: cpp
source_file: program.cpp
description: >
  Constructs a nested struct chain (Adam -> Bob -> int****). bob2.data is
  nullptr, and dereferencing ****adam1.b2->data crashes.

build:
  compiler: clang++
  flags: ["-g", "-std=c++17", "-O0", "-fno-omit-frame-pointer", "-fsanitize=address"]

run:
  args: []
  expected_crash: true

bug:
  category: null_deref
  error_type: null_pointer_in_struct
  root_cause_lines: [23]
  related_lines: [20]

criteria:
  root_cause: >
    The response must identify that bob2.data is initialized to nullptr
    on line 20, and that the expression ****adam1.b2->data on line 23
    dereferences this null pointer. It must trace through the struct
    chain to show b2 points to bob2 whose data field is null.

  local_fix: >
    Check adam1.b2->data for null before dereferencing, or initialize
    bob2.data to a valid pointer chain like bob1.data.

  global_fix: >
    Eliminate the four-level pointer indirection. Use references, smart
    pointers, or a flattened data structure. Alternatively, enforce a
    non-null invariant at Bob construction time so that a Bob with null
    data cannot be created.
