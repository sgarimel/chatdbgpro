          container structures that encapsulate the pointer and size together (e.g., a
          `struct { const uint8_t *data; size_t len; }` or a C++ `std::span` equivalent).
          Alternatively, enforce memory safety using modern tooling like static analyzers
          or address sanitizers during development to catch off-by-one errors early, and
          standardize on loop idioms that discourage manual index manipulation (like
          range-based loops or pointer-arithmetic iterators if appropriate).
