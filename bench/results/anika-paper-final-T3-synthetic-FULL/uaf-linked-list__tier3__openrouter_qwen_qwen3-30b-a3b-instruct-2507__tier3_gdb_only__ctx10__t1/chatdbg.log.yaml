      - output: "The program crashes due to a use-after-free error during `destroy_list`,\n\
          specifically on the second iteration of the `for` loop. The root cause is\
          \ in the\n`for` loop\u2019s update clause: `cur = cur->next` is evaluated\
          \ and executed *after*\n`delete cur` in the loop body. During the first\
          \ iteration, `cur` is the head\nnode, and `delete cur` frees the memory\
          \ it points to. However, `cur->next` is\naccessed *before* `cur` is updated\
          \ \u2014 this access is valid because `cur` still\npoints to a valid (though\
          \ now freed) object. But on the second iteration, `cur`\nis assigned `cur->next`,\
          \ which is a pointer to the second node. However, this\npointer is now invalid\
          \ because the first node (which contains the pointer to the\nsecond) was\
          \ `delete`d, and `cur->next` was not captured before deletion.\n\nDuring\
          \ the second loop iteration, `cur` points to a freed memory region (the\n\
          first node\u2019s memory) that has already been `delete`d. But `cur` is\
          \ still the\npointer to the second node, and `cur->next` attempts to dereference\
          \ it \u2014 which\nis undefined behavior. This leads to a heap-use-after-free\
          \ detected by\nAddressSanitizer. The loop condition checks `cur != nullptr`,\
          \ which evaluates to\ntrue because `cur` still holds the address of the\
          \ second node (but the memory is\nnow freed). However, `cur->next` access\
          \ in the update clause fails because the\nnode is already freed.\n\nThe\
          \ key issue is that the `for` loop update clause (`cur = cur->next`) depends\n\
          on the previous node\u2019s `next` pointer *after* it has been freed. But\
          \ `cur`\npoints into freed memory when the loop attempts to access `cur->next`\
          \ in the\nupdate. The system cannot access the `next` pointer of a `Node`\
          \ that has been\nfreed, hence the crash.\n\nROOT CAUSE: `program.cpp:12`\
          \ \u2014 The `for` loop in `destroy_list` attempts to\naccess `cur->next`\
          \ after deleting `cur`, but the `cur` pointer remains valid\nonly until\
          \ the loop increment, where `cur = cur->next` uses a pointer to a freed\n\
          node, causing a heap-use-after-free when accessing `next` via the deleted\
          \ node.\n\nLOCAL FIX: Change the loop to capture `cur->next` before deletion:\n\
          ```cpp\nstatic void destroy_list(Node *head) {\n    for (Node *cur = head;\
          \ cur != nullptr; ) {\n        Node *next = cur->next;\n        delete cur;\n\
          \        cur = next;\n    }\n}\n```\n\nGLOBAL FIX: Replace raw pointer management\
          \ with a RAII wrapper (e.g.,\n`std::unique_ptr<Node>`) that automatically\
          \ handles deletion and prevents use-\nafter-free. This makes the ownership\
          \ lifetime clear and forbids manual pointer\narithmetic or dangling access\
          \ at compile time. The list becomes safe by\nconstruction, eliminating entire\
          \ classes of memory errors.\n\nROOT CAUSE: `program.cpp:12` \u2014 The `for`\
          \ loop's update clause `cur = cur->next`\nevaluates the `next` pointer from\
          \ a node that was just `delete`d in the previous\nloop iteration, leading\
          \ to a use-after-free when that pointer is accessed during\nthe increment\
          \ phase. The flow of control assumes `cur` remains valid after\n`delete`,\
          \ but it\u2019s the *next pointer* that\u2019s being dereferenced in the\
          \ update,\nwhich points to memory already freed.\n\nLOCAL FIX: Replace the\
          \ `for` loop with a version that captures `cur->next`\nbefore deletion:\n\
          ```cpp\nstatic void destroy_list(Node *head) {\n    for (Node *cur = head;\
          \ cur != nullptr; ) {\n        Node *next = cur->next;\n        delete cur;\n\
          \        cur = next;\n    }\n}\n```\n\nGLOBAL FIX: Use `std::unique_ptr<Node>`\
          \ to wrap each node, so ownership is\ncentralized and deletion is automatic\
          \ when the smart pointer goes out of scope.\nThis eliminates manual `delete`\
          \ calls and prevents dangling pointer usage\nentirely, enforcing memory\
          \ safety at compile time."
