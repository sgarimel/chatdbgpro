      - output: "The program crashes due to an assertion failure in the `fact` function.\
          \ The\nissue lies in the loop initialization: `for (auto i = 0.0; i < n;\
          \ i++)`. On the\nfirst iteration, `i` is 0.0, and since `x` is initialized\
          \ to 1.0, the statement\n`x *= i` evaluates to `x = 1.0 * 0.0 = 0.0`. After\
          \ this, `x` remains 0.0 for all\nsubsequent iterations because multiplying\
          \ by any number (including 0.0) keeps it\nzero. The assertion `assert(x\
          \ != 0.0)` fails because `x` is indeed 0.0, which\ntriggers the crash via\
          \ `SIGABRT`. The root cause is not the factorial algorithm\nitself (which\
          \ should be multiplicative from 1 to n), but the incorrect starting\npoint\
          \ of the loop: the loop starts with `i = 0.0`, which invalidates the\ncomputation\
          \ from the first step.\n\nROOT CAUSE: `program.cpp:6` \u2014 the loop starts\
          \ with `i = 0.0`, causing `x` to be\nmultiplied by zero on the first iteration,\
          \ resulting in `x = 0.0` for all\nsubsequent steps. This invalidates the\
          \ factorial calculation and causes the\nassertion `assert(x != 0.0)` to\
          \ fail at line 9, as `x` is zero.\n\nLOCAL FIX: `program.cpp:6` \u2014 change\
          \ the loop initialization from `i = 0.0` to `i\n= 1.0`. This ensures the\
          \ loop multiplies `x` by integers starting from 1, which\ncorrectly computes\
          \ the factorial.\n```diff\n- for (auto i = 0.0; i < n; i++)\n+ for (auto\
          \ i = 1.0; i < n; i++)\n```\n\nGLOBAL FIX: Instead of using `float` for\
          \ loop variables and computations,\nrefactor the `fact` function to use\
          \ integer types (`int` or `size_t`) for loop\nindices and mathematical operands,\
          \ and perform type conversion only at the end\nif needed. This eliminates\
          \ floating-point issues like `0.0` being a valid\niteration value and enforces\
          \ semantic correctness: iteration counts and\nfactorial operations are naturally\
          \ discrete and integer-valued. Also, use\n`static_assert` or invariant checks\
          \ to ensure the function is only called with\npositive integers, preventing\
          \ such misuse at compile time."
        type: text
