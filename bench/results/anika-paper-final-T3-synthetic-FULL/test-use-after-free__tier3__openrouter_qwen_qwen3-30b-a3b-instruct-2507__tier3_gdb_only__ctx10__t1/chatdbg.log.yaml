          fundamental on error this: invalid pointer, leading to heap corruption.
          Afterward, `doSomething(n)` dereferences the dangling pointer, resulting in a
          segmentation fault.

          LOCAL FIX: Replace line 10 (`n--`) with a no-op or remove it entirely, as it is
          the source of the pointer arithmetic error. The corrected `main` function should
          be:
          ```cpp
          int main()
          {
            int * n = new int(100);
            delete n;  // No decrement
            char * ch = new char[16];
            delete [] ch;
            doSomething(n);
            std::cout << "n = " << *n << std::endl;
            return 0;
          }
          ```
          This ensures `n` is deleted at its correct address, avoiding the use-after-free.

          GLOBAL FIX: Replace raw pointer management with RAII through
          `std::unique_ptr<int>`. This ensures that memory is automatically and safely
          managed, and prevents accidental pointer arithmetic. The revised code becomes:
          ```cpp
          #include <memory>
          // ...
          int main()
          {
            auto n = std::make_unique<int>(100);
            // n cannot be modified via pointer arithmetic without explicit cast, avoiding accidental misdirection
            doSomething(n.get());
            std::cout << "n = " << *n << std::endl;
            // unique_ptr automatically deletes the object
            return 0;
          }
          ```
          This eliminates the possibility of dangling pointers and use-after-free errors
          by enforcing ownership semantics and automatic cleanup at scope exit.
