      - output: "The program crashes due to a heap-buffer-overflow in `crc8()` when\
          \ it reads one\nbyte past the end of the input buffer. The error arises\
          \ because the loop in\n`crc8()` uses `i <= len` as its continuation condition,\
          \ which means it iterates\n`len + 1` times. Since `len` is the size of the\
          \ buffer (7 in this case), the\nloop attempts to access `buf[7]`, which\
          \ is one byte beyond the allocated\n`buf[7]` array (valid indices 0 to 6).\
          \ This is a classic off-by-one error due to\nan inclusive upper bound in\
          \ the loop condition, causing a buffer overflow that\nAddressSanitizer detects.\n\
          \nROOT CAUSE: `program.c:11` \u2014 The loop `for (size_t i = 0; i <= len;\
          \ i++)` uses\nan inclusive upper bound (`<= len`), causing the loop to iterate\
          \ one time too\nmany and access `buf[len]`, which is one byte past the end\
          \ of the input buffer.\nThis happens because the function `crc8` receives\
          \ `len` as the number of valid\nbytes, and the index `i` should only go\
          \ from 0 to `len - 1` inclusive.\n\nLOCAL FIX: `program.c:11` \u2014 Change\
          \ `i <= len` to `i < len` in the for loop of\n`crc8()`. This ensures the\
          \ loop runs exactly `len` times, accessing only valid\nindices 0 to `len\
          \ - 1` of the input buffer.\n\nGLOBAL FIX: Modify the `crc8` function\u2019\
          s interface to accept a `const uint8_t*\nbuf` and a `size_t len` but enforce,\
          \ via a static_assert or assert, that `len`\nis the number of valid bytes,\
          \ and use a bounded view or `span`-like type (e.g.,\n`const uint8_t*` +\
          \ `size_t` wrapped in a safe container) to prevent buffer\noverrun at compile\
          \ time or runtime. This prevents the misuse of `len` as\ninclusive in the\
          \ loop and introduces a design invariant where the length\nrepresents the\
          \ number of valid bytes.\n\nROOT CAUSE: `program.c:11` \u2014 The loop condition\
          \ `i <= len` causes the loop to\naccess `buf[len]`, which is one past the\
          \ end of the array, due to an off-by-one\nerror; this access triggers a\
          \ heap-buffer-overflow detected by AddressSanitizer\nwhen the program runs.\n\
          \nLOCAL FIX: Change `for (size_t i = 0; i <= len; i++)` to `for (size_t\
          \ i = 0; i <\nlen; i++)` in the `crc8` function to ensure only valid indices\
          \ of the buffer are\naccessed.\n\nGLOBAL FIX: Redesign the API to use a\
          \ bounded buffer view (e.g., `struct span {\nconst uint8_t* data; size_t\
          \ len; }`) that enforces invariants at compile time or\nvia assertions,\
          \ ensuring the length is always interpreted as the count of valid\nbytes\
          \ and never includes an offset beyond the data."
