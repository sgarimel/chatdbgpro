id: stack-buffer-overflow-strcpy
language: c
source_file: program.c
description: >
  greet() composes "Hello, <name>!" into a 16-byte stack buffer using
  strcpy + strcat. With a 24-byte name, strcat writes past the buffer
  and AddressSanitizer flags a stack-buffer-overflow inside __asan_memcpy
  with greet() in the parent frame.

build:
  compiler: clang
  flags: ["-g", "-O0", "-fno-omit-frame-pointer", "-fsanitize=address"]

run:
  args: []
  expected_crash: true

bug:
  category: buffer_overflow
  error_type: stack_buffer_overflow
  root_cause_lines: [6, 8]
  related_lines: [16]

criteria:
  root_cause: >
    The response must identify that buf is a 16-byte stack array and
    "Hello, " (7) + "ProfessorAdrieneDelmarre" (24) + "!" (1) + the
    NUL terminator is 33 bytes, so strcat writes 17 bytes past the
    end. Pointing only at "buffer overflow" without explaining the
    size math doesn't count.

  local_fix: >
    Either widen buf (e.g. to 64 bytes), or replace the strcpy/strcat
    pair with snprintf(buf, sizeof(buf), "Hello, %s!", who) so the
    write is bounded by the buffer size.

  global_fix: >
    A correct global fix removes unbounded string formatting from this
    function. Acceptable options:
      (a) take a length parameter and use snprintf with sizeof-based
          truncation;
      (b) build the message into a heap-allocated buffer sized via a
          length-checking pre-pass;
      (c) replace the C string composition with a typed string view
          / std::string-style API.
    Just bumping buf's size is a local fix, not a global one.
