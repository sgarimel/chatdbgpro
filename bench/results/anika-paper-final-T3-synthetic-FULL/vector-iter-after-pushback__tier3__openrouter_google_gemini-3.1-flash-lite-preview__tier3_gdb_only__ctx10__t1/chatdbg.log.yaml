      - output: |-
          The program demonstrates iterator invalidation in `std::vector`. In
          `program.cpp` at line 10, an iterator `it` is initialized to point to the third
          element (index 2) of a `std::vector<int> v`. Between lines 11 and 13, the
          program calls `v.push_back()` in a loop. Because `std::vector` stores its
          elements in a contiguous memory block, reaching its current capacity causes it
          to reallocate a larger block of memory and move all existing elements to the new
          location. This invalidates all existing iterators, pointers, and references to
          elements of the vector. When `printf` attempts to dereference `it` at line 14,
          the iterator points to the memory address of the now-deallocated original
          buffer, leading to a heap-use-after-free error.

          ROOT CAUSE: The iterator `it` in `program.cpp:10` is invalidated by
          `v.push_back()` calls at `program.cpp:12`, which trigger a vector reallocation.
          Dereferencing this stale iterator at `program.cpp:14` results in a use-after-
          free because the vector's underlying storage has been deallocated.

          LOCAL FIX: To fix this locally, use an integer index instead of an iterator to
          refer to the element, as indices remain stable even if the vector reallocates.
          Change `auto it = v.begin() + 2;` to `size_t index = 2;` and replace the
          dereference `*it` with `v[index]`.

          GLOBAL FIX: To prevent this class of bug, use data structures that provide
          stable iterators or references (like `std::list` or `std::deque`), or adopt a
          design that accesses elements via indices or keys rather than holding onto long-
          lived iterators across operations that may mutate or reallocate the underlying
          container. Alternatively, explicitly reserve sufficient capacity using
          `v.reserve()` before capturing iterators if the maximum size requirement is
          known at compile-time or early execution, ensuring no reallocation occurs while
          the iterator is in use.
