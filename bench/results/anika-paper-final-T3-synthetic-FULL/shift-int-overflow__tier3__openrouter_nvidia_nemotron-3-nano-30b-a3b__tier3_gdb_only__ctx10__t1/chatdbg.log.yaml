          time check\n`static_assert(width < 64, \"width must be < 64\")`. This change\
          \ ensures the shift\ncount is always in a safe range and the function cannot\
          \ be mis\u2011used with\nexcessive widths, preventing the entire class of\
          \ shift\u2011count\u2011UB bugs."
