id: test-stack-overflow
language: cpp
source_file: program.cpp
description: >
  Recursive fibonacci function with no base case. Calling fib(100)
  causes unbounded recursion until the stack is exhausted.

build:
  compiler: clang++
  flags: ["-g", "-O0", "-fno-omit-frame-pointer", "-fsanitize=address"]

run:
  args: []
  expected_crash: true

bug:
  category: stack_overflow
  error_type: missing_base_case
  root_cause_lines: [4]
  related_lines: [3, 10]

criteria:
  root_cause: >
    The response must identify that fib() on line 3-4 has no base case
    and recurses infinitely. It should note that fib(n-1) + fib(n-2)
    never terminates because there is no return for n <= 1 (or n <= 0).
    Simply saying "stack overflow" without identifying the missing base
    case is insufficient.

  local_fix: >
    Add a base case: if (n <= 1) return n; at the start of fib().

  global_fix: >
    Replace recursion with an iterative approach or memoization.
    For fib(100), even with a base case the naive recursive version
    has exponential time complexity. An iterative loop or dynamic
    programming solution is the proper fix.
