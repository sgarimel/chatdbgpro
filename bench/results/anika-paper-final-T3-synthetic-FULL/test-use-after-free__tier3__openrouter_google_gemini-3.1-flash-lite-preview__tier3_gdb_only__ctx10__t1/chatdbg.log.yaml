          The program allocates an integer on the heap using `new int(100)`. It then
          deliberately decrements the pointer `n` so that it no longer points to the start
          of the allocated memory block. When `delete n` is called, it attempts to
          deallocate the memory based on this modified, incorrect pointer, which is
          undefined behavior and typically causes an error in memory management.
          Furthermore, even if the deallocation did not cause an immediate crash, the
          pointer `n` remains dangling (still pointing to an address that is now invalid).
          When `doSomething(n)` is subsequently called, it attempts to dereference this
          invalid memory address, leading to a segmentation fault.

          ROOT CAUSE: program.cpp:11: The program performs pointer arithmetic on a heap-
          allocated pointer (`n--`) before calling `delete`, which passes an incorrect
          address to the deallocator (causing heap corruption/undefined behavior) and
          leaves `n` as a dangling pointer.

          LOCAL FIX: Remove the pointer decrement `n--` before the `delete` operation. The
          memory should be deallocated using the original pointer returned by `new`.

          GLOBAL FIX: Replace raw memory management (new/delete) with modern C++ RAII
          containers like `std::unique_ptr<int>` or `std::vector<int>`, which manage the
          lifetime of dynamically allocated memory automatically and prevent manual
          pointer manipulation errors.
