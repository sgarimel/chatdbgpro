          The program fails because it dereferences a null pointer. Specifically, the
          variable `p` is initialized to `nullptr` (line 1). A chain of pointers is
          constructed: `int **p2 = &p`, `int ***p3 = &p2`, and `int ****p4 = &p3`. This
          chain is stored in the `Bob` structs as `data`. When `****adam1.b1->data` is
          accessed in `main` (line 23), the expression dereferences through the chain:
          1. `adam1.b1->data` is some memory holding the address of `p3` (the `int ****p4`
          variable).
          2. `*adam1.b1->data` yields the address of `p2` (`p3`).
          3. `**adam1.b1->data` yields the address of `p` (`p2`).
          4. `***adam1.b1->data` yields the value of `p`, which is `nullptr`.
          5. Finally, `****adam1.b1->data` attempts to dereference `nullptr`, causing a
          `SIGSEGV`.

          ROOT CAUSE: The program performs an illegal memory access at `program.cpp:23` by
          dereferencing a pointer (`p`) that is explicitly initialized to `nullptr` in
          `program.cpp:1`. The chain of pointers correctly traverses the hierarchy to the
          source of the reference (`p`), which holds `0x0`, leading to a null pointer
          dereference during the final star operator.

          LOCAL FIX: Initialize `p` to point to a valid integer variable instead of
          `nullptr`. For example, change line 1 to:
          ```cpp
          static int val = 42;
          static int* p = &val;
          ```

          GLOBAL FIX: Eliminate deep pointer-to-pointer indirection, which is notoriously
          error-prone and opaque. Replace the complex pointer chain with a more robust
          structure, such as a wrapper class that manages pointer safety (e.g., using
          `std::optional<T&>` or smart pointers to ensure availability), or refactor the
          data flow to pass values directly rather than by multiple levels of reference
          where the end-point is susceptible to being unset.
