      - output: |-
          ROOT CAUSE: program.c:11 uses `for (size_t i = 0; i <= len; i++)`, so `crc8()`
          processes `len + 1` bytes instead of `len` bytes. In `main()` at
          program.c:22-23, `buf` has exactly 7 valid bytes, indexed `buf[0]` through
          `buf[6]`, and `crc8(buf, sizeof(buf))` passes `len == 7`. In the debugger,
          execution reached program.c:12 with `i == len == 7`; `&buf[6]` was the last
          valid byte, while `&buf[7]` was the one-past-the-end address. The statement `crc
          ^= buf[i];` therefore reads `buf[7]`, which is outside the supplied buffer and
          triggers the AddressSanitizer buffer-overflow report.

          LOCAL FIX: Change the CRC loop to use an exclusive upper bound so it visits only
          valid indices `0` through `len - 1`. Minimal patch: `diff\n--- a/program.c\n+++
          b/program.c\n@@\n-    for (size_t i = 0; i <= len; i++) {\n+    for (size_t i =
          0; i < len; i++) {\n         crc ^= buf[i];\n         for (int b = 0; b < 8;
          b++) {\n             crc = (crc & 0x80) ? (uint8_t)((crc << 1) ^ 0x07) :
          (uint8_t)(crc << 1);\n`. With this change, when `len` is 7 the last iteration
          uses `i == 6`, and the loop terminates before attempting to read `buf[7]`.

          GLOBAL FIX: Represent byte buffers with an API/invariant that makes the valid
          range explicit and consistently exclusive, for example a small `struct byte_span
          { const uint8_t *data; size_t size; };` whose contract is that valid elements
          are always `[0, size)`, and require helper functions such as `crc8_span(struct
          byte_span input)` to iterate with `i < input.size`. Pair that with tests for
          edge lengths, especially zero-length, one-byte, and exact-size buffers under
          AddressSanitizer, so inclusive-bound mistakes in buffer-processing loops are
          caught immediately.
        type: text
