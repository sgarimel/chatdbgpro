      - output: "ROOT CAUSE: `program.cpp:17` computes `uint32_t bytes = count *\n\
          (uint32_t)sizeof(Record);`, so the allocation size is calculated in 32-bit\n\
          arithmetic even though `malloc` takes a `size_t`. In the failing run, `main`\n\
          sets `n = 70,000,000`, and GDB shows `sizeof(Record) == 64`, so the required\n\
          allocation is `70,000,000 * 64 = 4,480,000,000` bytes. That exceeds\n`UINT32_MAX`,\
          \ so the 32-bit product wraps to `185,032,704` bytes. `make_records`\ntherefore\
          \ returns a pointer to a buffer of only about 176 MiB, while `main`\nassumes\
          \ it contains 70,000,000 records. The failing write at `program.cpp:33`,\n\
          `rs[n - 1].id = 42`, targets offset `4,479,999,936` from `rs`, far beyond\
          \ the\nallocated `185,032,704` bytes, producing the SIGSEGV/heap-buffer-overflow.\n\
          \nLOCAL FIX: Compute the allocation size in `size_t` and check for multiplication\n\
          overflow before calling `malloc`/`memset`. A minimal fix is:\n```diff\n\
          +#include <limits>\n+\n static Record *make_records(uint32_t count) {\n\
          \     /* Compute the allocation size and reserve a zeroed buffer large\n\
          \      * enough to hold `count` Record values. Callers pre-size the\n  \
          \    * batch so OOM is the only expected failure. */\n-    uint32_t bytes\
          \ = count * (uint32_t)sizeof(Record);\n+    if ((size_t)count > std::numeric_limits<size_t>::max()\
          \ / sizeof(Record))\n+        return nullptr;\n+    size_t bytes = (size_t)count\
          \ * sizeof(Record);\n     Record *r = (Record *)std::malloc(bytes);\n  \
          \   if (!r) return nullptr;\n     std::memset(r, 0, bytes);\n     return\
          \ r;\n }\n```\nThis makes the requested size `4,480,000,000` bytes on a\
          \ 64-bit platform instead\nof the wrapped `185,032,704` bytes, and it cleanly\
          \ returns `nullptr` if the\nmultiplication cannot be represented.\n\nGLOBAL\
          \ FIX: Replace raw \u201Ccount plus manually computed byte size\u201D allocation\n\
          patterns with a typed container or checked allocation API that preserves\
          \ the\nelement count and performs overflow-safe sizing internally, for example\n\
          `std::vector<Record> records(count);` or a project-wide\n`allocate_array<T>(count)`\
          \ helper that uses `size_t`, checks `count <= SIZE_MAX\n/ sizeof(T)`, and\
          \ returns an owning RAII object. That design prevents callers\nfrom accidentally\
          \ mixing 32-bit counts, byte counts, and element counts, and it\nensures\
          \ every array allocation enforces the same overflow invariant before\nmemory\
          \ is reserved or indexed."
