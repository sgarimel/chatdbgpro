      - output: |-
          ROOT CAUSE: `program.cpp:13` dereferences `a + 5` with `f(*(a + 5));`. In
          `main`, `a` is declared at `program.cpp:10` as `int a[5] = {1, 2, 3, 4, 5};`, so
          its valid indices are `0` through `4`; `a + 5` is only the one-past-the-end
          pointer and must not be dereferenced. In the debugger, `a` contained `{1, 2, 3,
          4, 5}`, `&a[0]` was followed by `&a[5]` exactly 5 `int`s later, and examining
          memory showed the slot after `5` was outside the array. The call attempts to
          load that out-of-bounds value before entering `f`, which is why AddressSanitizer
          reports a stack-buffer-overflow/read beyond `a`.

          LOCAL FIX: Replace the out-of-bounds access with a valid element of `a`. If the
          intent is to pass the last value in the array, the minimal edit is:
          ```diff
          -  f(*(a + 5));
          +  f(a[4]);
          ```
          Equivalently, avoid pointer arithmetic here and use the valid index explicitly.

          GLOBAL FIX: Replace raw stack arrays and unchecked pointer arithmetic with a
          bounds-aware abstraction such as `std::array<int, 5>` and access through `.at()`
          when the index may be computed, e.g. `std::array<int, 5> a{1,2,3,4,5};
          f(a.at(4));`. More broadly, pass array views/ranges plus validated indices
          instead of raw pointers, so one-past pointers cannot be accidentally
          dereferenced without a bounds check.
        type: text
