          \ for example by requiring all reverse\nloops to use `std::reverse_iterator`\
          \ (or a range\u2011based reverse view) and by\nadding a clang\u2011tidy\
          \ check that flags the pattern `for (size_t i = ...; i >= 0;\n...)`; this\
          \ prevents the entire class of underflow\u2011induced infinite loops and\n\
