          \        newname[i] = isupper(ch) ? (char)tolower(ch) : (char)ch;\n    }\n\
          \    newname[len] = '\\0';\n} else {\n    memcpy(newname, original, len\
          \ + 1);\n    error = -1;\n}\n```\n\nA more thorough fix would remove the\
          \ arbitrary stack-sized copy from the design.\n`convert_fileName()` can\
          \ allocate the destination name based on the actual input\nlength, then\
          \ validate against filesystem limits separately if desired. For\nexample:\n\
          \n```c\nvoid convert_fileName(char *original)\n{\n    size_t len;\n    char\
          \ *newname;\n    char *bslash;\n    int error = 0;\n\n    if (original ==\
