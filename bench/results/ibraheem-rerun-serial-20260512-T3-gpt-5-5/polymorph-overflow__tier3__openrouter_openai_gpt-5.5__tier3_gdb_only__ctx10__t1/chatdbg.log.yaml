          \ bslash + 1, strlen(bslash + 1) + 1);\n        }\n    }\n\n    if (error\
          \ != -1) {\n        error = does_newnameExist(newname);\n        if (error)\
          \ {\n            fprintf(stderr, \"target exists -- skipping %s...\\n\"\
          , original);\n            free(newname);\n            return;\n        }\n\
          \    }\n\n    error = rename(original, newname);\n    if (error) {\n   \
          \     fprintf(stderr,\n                \"polymorph had trouble converting\
          \ %s to %s...\\n\",\n                original,\n                newname);\n\
          \        fprintf(stderr, \"the file is now possibly corrupt\\n\");\n   \
