id: ncompress-overflow
language: c
kind: bugbench
description: >
  ncompress-4.2.4 stack buffer overflow. In compress42.c function
  comprexx(), a stack array tempname[MAXPATHLEN] is overflowed by
  strcpy(tempname, *fileptr) when the input filename exceeds
  MAXPATHLEN (1024) bytes. The overflow corrupts the stack return
  address, causing a crash.

source:
  dir: bugbench-src/ncompress/src
  build_commands:
    # -DNOFUNCDEF: skip ncompress-4.2.4's old K&R-style `extern int open(...)`
    #   etc. forward decls that conflict with modern glibc fcntl.h on clang 18+.
    - "clang -g -O0 -std=gnu89 -w -fsanitize=address -DDIRENT=1 -DSYSDIR=1 -DLSTAT=1 -DUTIME_H=1 -DUSERMEM=800000 -DREGISTERS=20 -DIBUFSIZ=8192 -DOBUFSIZ=8192 -DBYTEORDER=4321 -DNOALLIGN=1 -DNOFUNCDEF=1 -DCOMPILE_DATE='\"now\"' -o compress compress42.c"
  binary: compress
  key_files:
    - compress42.c

run:
  # Long filename (>1024 chars) to overflow tempname[MAXPATHLEN]
  crash_args_script: "python3 -c \"print('a'*1100)\""
  expected_crash: true

debug:
  # For T3 (lldb/gdb): args to pass to the binary
  args_script: "python3 -c \"print('a'*1100)\""

bug:
  category: buffer_overflow
  error_type: stack_buffer_overflow
  root_cause_file: compress42.c
  root_cause_lines: [896]
  root_cause_function: comprexx
  fix_description: >
    Replace strcpy(tempname, *fileptr) with a bounds-checked copy.

criteria:
  root_cause: >
    The response must identify that strcpy(tempname, *fileptr) on line
    896 of compress42.c overflows the stack buffer tempname[MAXPATHLEN]
    when the input filename is longer than MAXPATHLEN bytes. Mentioning
    "buffer overflow in comprexx" or "strcpy without bounds check" with
    reference to the filename/tempname is sufficient.

  local_fix: >
    Replace the unbounded strcpy with a bounded copy. Acceptable:
      - strncpy(tempname, *fileptr, sizeof(tempname)-1); tempname[sizeof(tempname)-1] = '\0';
      - Check strlen(*fileptr) >= MAXPATHLEN and return/exit before strcpy
      - Use snprintf(tempname, sizeof(tempname), "%s", *fileptr)

  global_fix: >
    A structural fix should prevent this class of bug across the codebase:
      (a) Replace all fixed-size path buffers with dynamically allocated strings
          (strdup/realloc), eliminating the size mismatch entirely.
      (b) Introduce a safe_path_copy(dst, src, maxlen) helper used everywhere
          a pathname is copied, with a single bounds-check implementation.
      (c) Use realpath() or similar OS API that handles allocation, rather
          than manual buffer management.
    Simply adding a strlen check at this one call site is a local fix.
