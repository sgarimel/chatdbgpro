      - output: |-
          The crash is caused by an unchecked copy of a 600-byte command-line argument
          into a fixed 256-byte global buffer.

          From the debugger/source:

          ```c
          8  char buf[256]={1};

          10 int main(int argv,char **argc) {
          11         strcpy(buf,argc[1]);
          12 }
          ```

          Despite the confusing parameter names, `argv` is actually the argument count and
          `argc` is actually the argument vector. At the breakpoint in `main`:

          ```gdb
          argv = 2
          argc[1] = 0x7fffffffe0eb 'A' <repeats ...>
          strlen(argc[1]) = 600
          sizeof(buf) = 256
          &buf[0]   = 0x53eb40
          &buf[255] = 0x53ec3f
          ```

          So the program calls:

          ```c
          strcpy(buf, argc[1]);
          ```

          with:

          - destination: `buf`, a global array of 256 bytes
          - source: command-line argument containing 600 `'A'` characters
          - `strcpy` behavior: copies all source bytes plus the terminating `'\0'`

          That means `strcpy` attempts to write `601` bytes into a `256`-byte buffer. The
          first 256 bytes fill `buf[0]` through `buf[255]`; the next byte writes past the
          end at `buf[256]`, corrupting the global redzone / adjacent memory.
          AddressSanitizer catches this as a global buffer overflow.

          The bug is not AddressSanitizer-specific; ASan merely detects the undefined
          behavior. Without ASan, this would silently corrupt memory.

          There is also a secondary robustness bug: the program does not check that an
          argument was actually provided before reading `argc[1]`. With no command-line
          argument, it would read a null or invalid pointer.

          A minimal safe version would bound the copy and check the argument count:

          ```c
          #include <stdio.h>
          #include <string.h>

          char buf[256] = {1};

          int main(int argc, char **argv) {
              if (argc < 2) {
                  return 1;
              }

              snprintf(buf, sizeof buf, "%s", argv[1]);
              return 0;
          }
          ```

          This prevents the overflow by truncating input to fit `buf`.

          If truncation is not acceptable, reject oversized input instead:

          ```c
          #include <string.h>

          char buf[256] = {1};

          int main(int argc, char **argv) {
              if (argc < 2) {
                  return 1;
              }

              if (strlen(argv[1]) >= sizeof buf) {
                  return 1;
              }

              strcpy(buf, argv[1]);
              return 0;
          }
          ```

          Or, more structurally, avoid the fixed-size global buffer entirely and allocate
          the destination based on the input length.

          ROOT CAUSE: `program.c:11` copies `argc[1]` with `strcpy` into global `char
          buf[256]` without checking the source length. In the failing run, `argc[1]` is
          600 bytes long, so `strcpy` writes 601 bytes including the NUL terminator into a
          256-byte array, overflowing `buf`.

          LOCAL FIX: Replace the unbounded copy with a bounded copy and validate the
          argument exists, for example:

          ```diff
          + #include <stdio.h>
          + #include <string.h>
          +
            char buf[256]={1};

          - int main(int argv,char **argc) {
          -         strcpy(buf,argc[1]);
          + int main(int argc, char **argv) {
          +         if (argc < 2) {
          +                 return 1;
          +         }
          +         snprintf(buf, sizeof buf, "%s", argv[1]);
          +         return 0;
            }
          ```

          GLOBAL FIX: Do not pass around raw fixed-size buffers without their sizes. Use
          an API/design where the destination buffer length is part of the operation, or
          allocate storage dynamically based on the input length. For example, replace the
          global `char buf[256]` with a dynamically allocated string sized as
          `strlen(argv[1]) + 1`, or wrap buffers in a struct containing both pointer and
          capacity so unbounded functions like `strcpy` cannot be used accidentally.
        type: text
      type: chat
