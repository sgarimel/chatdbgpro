          `` `\n\n200 timesThe> global...\n\n destinationprint buffer ( occupiesint)\
          \ only 256 bytes:\n\n```gdb\nprint &buf[0]\n$6 = 0xe92a20 <buf> \"\"\n\n\
          print &buf[255]\n$7 = 0xe92b1f <buf+255> \"\"\n\nprint &buf[256]\n$8 = 0xe92b20\
          \ <buf+256> \"\"\n```\n\nAt the intercepted `strcpy` call, the arguments\
          \ are:\n\n```gdb\nrdi = 0xe92a20          // destination: buf\nrsi = 0x7fffffffe0eb\
          \    // source: 600-byte argv[1]\n```\n\n`strcpy(buf, argc[1])` copies the\
          \ entire 600-byte string plus the terminating NUL byte, so it attempts to\
          \ write 601 bytes into a 256-byte global array. The first 256 bytes fill\
          \ `buf`; the remaining 345 bytes write past `buf[255]` into AddressSanitizer\u2019\
          s global redzone or adjacent global storage. That is the memory safety failure.\n\
          \nThere is also a secondary bug: the program does not check that an argument\
          \ was supplied before reading `argc[1]`. With no command-line argument,\
          \ it would read a null or invalid pointer and pass it to `strcpy`.\n\nThe\
          \ parameter names are misleading too:\n\n```c\nint main(int argv, char **argc)\n\
          ```\n\nThis is technically allowed as far as names go, but `argv` is actually\
          \ `argc`, and `argc` is actually `argv`. That does not cause this specific\
          \ overflow, but it makes the bug easier to write and harder to notice.\n\
          \nA minimal safe fix is to validate the argument and bound the copy.\n\n\
          Example rejecting oversized input:\n\n```diff\n+ #include <stdio.h>\n+ #include\
          \ <string.h>\n+ #include <stdlib.h>\n+\n  char buf[256];\n\n- int main(int\
          \ argv,char **argc) {\n-      strcpy(buf,argc[1]);\n+ int main(int argc,\
          \ char **argv) {\n+      if (argc < 2) {\n+          fprintf(stderr, \"\
          usage: %s STRING\\n\", argv[0]);\n+          return EXIT_FAILURE;\n+   \
          \   }\n+\n+      if (strlen(argv[1]) >= sizeof buf) {\n+          fprintf(stderr,\
          \ \"input too long: maximum is %zu bytes\\n\", sizeof buf\n- 1);\n+    \
          \      return EXIT_FAILURE;\n+      }\n+\n+      strcpy(buf, argv[1]);\n\
          +      return EXIT_SUCCESS;\n  }\n```\n\nAlternatively, if truncation is\
          \ acceptable:\n\n```c\nsnprintf(buf, sizeof buf, \"%s\", argv[1]);\n```\n\
          \nBut silent truncation can be dangerous if callers expect the full string\
          \ to be preserved, so rejecting oversized input is usually the safer local\
          \ fix.\n\nROOT CAUSE: `program.c:11` copies an unbounded attacker-controlled\
          \ command-line string into `char buf[256]` using `strcpy`. For the failing\
          \ input, `argc[1]`/`argv[1]` is 600 bytes long, so `strcpy` writes 601 bytes\
          \ including the NUL terminator into a 256-byte global buffer, overflowing\
          \ past `buf[255]`.\n\nLOCAL FIX: Validate argument count and input length\
          \ before copying, or use a bounded copy. Minimal rejecting fix:\n\n```c\n\
          #include <stdio.h>\n#include <string.h>\n#include <stdlib.h>\n\nchar buf[256];\n\
          \nint main(int argc, char **argv) {\n    if (argc < 2) {\n        fprintf(stderr,\
          \ \"usage: %s STRING\\n\", argv[0]);\n        return EXIT_FAILURE;\n   \
          \ }\n\n    if (strlen(argv[1]) >= sizeof buf) {\n        fprintf(stderr,\
          \ \"input too long\\n\");\n        return EXIT_FAILURE;\n    }\n\n    strcpy(buf,\
          \ argv[1]);\n    return EXIT_SUCCESS;\n}\n```\n\nGLOBAL FIX: Avoid APIs\
          \ and designs that separate raw pointers from their capacities. Replace\
          \ fixed-size global character arrays plus `strcpy` with length-aware storage:\
          \ dynamically allocate based on `strlen(argv[1]) + 1`, use a bounded string\
          \ abstraction, or pass `{pointer, length, capacity}` buffers through the\
          \ program. Also ban unsafe functions like `strcpy`, `strcat`, and `sprintf`\
          \ in favor of checked wrappers that require the destination size."
