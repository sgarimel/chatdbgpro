      - output: "**ROOT CAUSE:** `program.c:11` \u2013 `strcpy(buf, argv[1]);`\nThe\
          \ destination buffer `buf` is only `256` bytes (`char buf[256];`).  `argv[1]`\n\
          can be arbitrarily long (the testcase supplies >\u202F500\u202F\u2018A\u2019\
          \ characters).  `strcpy`\ncopies the source byte\u2011by\u2011byte until\
          \ it hits the terminating NUL, writing past\nthe 256\u2011byte boundary\
          \ and overwriting the stack frame (saved frame pointer,\nreturn address,\
          \ and other locals).  This corrupts the call stack, leading to\nundefined\
          \ behaviour that the AddressSanitizer reports as a\n*stack\u2011buffer\u2011\
          overflow* and causes the process to abort.  Because the overflow\nhappens\
          \ on the stack, the crash occurs very early (before any deeper function\n\
          calls), which is why the back\u2011trace shows no application frames.\n\n\
          ---\n\n### LOCAL FIX \u2013 minimal change to stop the immediate symptom\n\
          Replace the unsafe `strcpy` with a bounded copy that never writes past the\n\
          buffer:\n\n```c\n- strcpy(buf, argv[1]);\n+ /* copy at most sizeof(buf)-1\
          \ bytes and always NUL\u2011terminate */\n+ strncpy(buf, argv[1], sizeof(buf)\
          \ - 1);\n+ buf[sizeof(buf) - 1] = '\\0';\n```\n\nor, equivalently, add an\
          \ explicit length check before calling `strcpy`:\n\n```c\n+ if (strlen(argv[1])\
          \ >= sizeof(buf)) {\n+     fprintf(stderr, \"input too long (max %zu bytes)\\\
          n\", sizeof(buf)-1);\n+     return 1;\n+ }\n+ strcpy(buf, argv[1]);\n```\n\
          \nEither change guarantees the write stays within the allocated stack space,\n\
          eliminating the immediate crash.\n\n---\n\n### GLOBAL FIX \u2013 prevent\
          \ the class of bug from re\u2011appearing\nThe fundamental issue is the\
          \ use of a fixed\u2011size stack buffer for an operation\nthat can accept\
          \ arbitrary\u2011size input.  A more robust design would:\n\n1. **Avoid\
          \ static stack buffers for unbounded data.**\n   Allocate a buffer size\
          \ matching the input (e.g., `char *buf =\nmalloc(strlen(argv[1]) + 1);`)\
          \ *or* enforce a hard maximum length that is\nclearly documented.\n\n2.\
          \ **Adopt safer string\u2011handling APIs.**\n   Use functions that take\
          \ an explicit size limit such as `strncpy`, `strlcpy`\n(BSD), `snprintf`,\
          \ or the C11 `strncat_s`-style functions, and always ensure\nNUL\u2011termination.\n\
          \n3. **Add compile\u2011time checks / static analysis.**\n   Enable warnings\
          \ (`-Wall -Wstringop-overflow=`) or use tools like **Clang\u2019s\n`-Wbufferoverrun**`,\
          \ **Fortify Source**, or **Coverity** to flag unsafe\n`strcpy`/`strcat**\
          \ usages automatically.\n\n4. **Introduce defensive invariants.**\n   If\
          \ the program\u2019s contract is \u201Cinput must be \u2264\u202FN bytes\u201D\
          , validate this at\nentry (as in the local fix) and expose the limit through\
          \ a macro or API, so any\nfuture misuse is caught early.\n\nBy shifting\
          \ from a raw, unchecked `strcpy` on a fixed stack buffer to a\nsize\u2011\
          aware copy or dynamic allocation, the program no longer exhibits the\nstack\u2011\
          overflow class of memory\u2011safety defects, making the failure mode\n\
          impossible to re\u2011introduce."
        type: text
