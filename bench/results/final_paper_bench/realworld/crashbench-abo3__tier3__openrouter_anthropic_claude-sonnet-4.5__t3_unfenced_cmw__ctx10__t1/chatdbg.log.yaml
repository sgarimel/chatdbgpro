          ## Final Analysis

          Based on my investigation, I can now provide a complete analysis of the root
          cause:

          **ROOT CAUSE:** program.c:12 - The `strcpy(buf, argc[1])` call performs an
          unchecked copy of the first command-line argument (600 bytes) into a stack
          buffer `buf` that is only 256 bytes in size. This causes a heap-buffer-overflow
          (or stack-buffer-overflow depending on where ASAN places the buffer) of 344
          bytes beyond the allocated buffer. AddressSanitizer detects this memory safety
          violation during the strcpy operation and terminates the program. The overflow
          occurs because `strcpy` does not perform any bounds checking and will continue
          copying until it encounters a null terminator, regardless of the destination
          buffer size.

          **LOCAL FIX:**
          Replace the unsafe `strcpy` with a bounds-checked alternative:
          ```c
          strncpy(buf, argc[1], sizeof(buf) - 1);
          buf[sizeof(buf) - 1] = '\0';  // Ensure null-termination
          ```

          Or better yet, use a safer function:
          ```c
          snprintf(buf, sizeof(buf), "%s", argc[1]);
          ```

          **GLOBAL FIX:**
          The program should adopt a defense-in-depth approach to prevent this class of
          buffer overflow bugs:

          1. **Use safe string APIs**: Replace all uses of unsafe C string functions
          (`strcpy`, `strcat`, `sprintf`, `gets`) with their safe counterparts
          (`strncpy`/`strlcpy`, `strncat`/`strlcat`, `snprintf`, `fgets`).

          2. **Input validation**: Add runtime checks to validate input size before
          copying:
          ```c
          if (argv > 1 && strlen(argc[1]) < sizeof(buf)) {
              strcpy(buf, argc[1]);
          } else {
              fprintf(stderr, "Error: argument too long\n");
              exit(1);
          }
          ```

          3. **Use bounded string types**: Replace raw `char[]` buffers with safer
          abstractions that carry size information and enforce bounds checking at the API
          level (e.g., a custom bounded_string struct or use C++ std::string if migrating
          to C++).

          4. **Compiler hardening**: Continue using AddressSanitizer in
          testing/development and enable stack canaries and other exploit mitigations
          (`-fstack-protector-strong`, `-D_FORTIFY_SOURCE=2`) in production builds.

          5. **Static analysis**: Integrate static analysis tools (e.g., clang-tidy with
          cert-str-related checks) into the build process to catch such issues at compile
          time.

          6. **API redesign**: For new code, avoid fixed-size buffers entirely when
