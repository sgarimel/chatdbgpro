id: test-definition-likely
language: cpp
source_file: program.cpp
description: >
  A static global pointer p is initialized to nullptr. A chain of
  pointer-to-pointer indirection (p2->p3->p4) is built from it and
  stored in two Bob structs. Dereferencing ****adam1.b1->data reaches
  the null p and crashes.

build:
  compiler: clang++
  flags: ["-g", "-std=c++17", "-O0", "-fno-omit-frame-pointer", "-fsanitize=address"]

run:
  args: []
  expected_crash: true

bug:
  category: null_deref
  error_type: static_null_pointer_chain
  root_cause_lines: [23]
  related_lines: [1]

criteria:
  root_cause: >
    The response must identify that the static global p on line 1 is
    nullptr, and that the chain of four dereferences on line 23
    (****adam1.b1->data) eventually reaches p which is null. It should
    trace through p4 -> p3 -> p2 -> p to show the null origin.

  local_fix: >
    Initialize p to point to a valid int (e.g. static int val = 0;
    static int* p = &val;) before building the pointer chain.

  global_fix: >
    Eliminate the multi-level pointer indirection. Use direct values
    or references. If the indirection is needed, use smart pointers
    or a wrapper type that enforces non-null at construction.
