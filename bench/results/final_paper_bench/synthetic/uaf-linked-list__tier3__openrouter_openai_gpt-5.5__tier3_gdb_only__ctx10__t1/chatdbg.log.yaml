      - output: |-
          The crash is caused by a use-after-free in `destroy_list`.

          In `main`, the list is built like this:

          ```cpp
          Node *c = new Node{3, nullptr};
          Node *b = new Node{2, c};
          Node *a = new Node{1, b};
          destroy_list(a);
          ```

          So the list state before `destroy_list(a)` is:

          ```text
          a -> b -> c -> nullptr
          ```

          with:

          ```text
          a->value == 1, a->next == b
          b->value == 2, b->next == c
          c->value == 3, c->next == nullptr
          ```

          The bug is here:

          ```cpp
          for (Node *cur = head; cur != nullptr; cur = cur->next) {
              delete cur;
          }
          ```

          The loop deletes `cur`, then the `for` loop update expression runs:

          ```cpp
          cur = cur->next
          ```

          But at that point `cur` points to memory that has already been freed by `delete
          cur`. Reading `cur->next` is therefore a use of deallocated memory.

          Step-by-step:

          1. `cur` is initialized to `head`, which is `a`.
          2. `cur != nullptr` is true.
          3. The loop body executes:

          ```cpp
             delete cur;
             ```

             This frees node `a`.

          4. The loop update expression executes:

          ```cpp
             cur = cur->next;
             ```

             But `cur` still has the old pointer value for `a`, and `a` has already been
          deleted. Reading `cur->next` dereferences freed memory.

          That is exactly what AddressSanitizer reports: a load of the `next` pointer from
          deallocated memory at line 12.

          The immediate defect is that the code deletes the current node before saving the
          pointer to the next node.

          ##### Recommendation

          Minimal local fix in
          `/Users/ibraheemamin/projects/COS484/chatdbgpro/bench/cases/uaf-linked-
          list/program.cpp`, line 12:

          Replace:

          ```cpp
          static void destroy_list(Node *head) {
              for (Node *cur = head; cur != nullptr; cur = cur->next) {
                  delete cur;
              }
          }
          ```

          with:

          ```cpp
          static void destroy_list(Node *head) {
              for (Node *cur = head; cur != nullptr; ) {
                  Node *next = cur->next;
                  delete cur;
                  cur = next;
              }
          }
          ```

          or equivalently:

          ```cpp
          static void destroy_list(Node *head) {
              while (head != nullptr) {
                  Node *next = head->next;
                  delete head;
                  head = next;
              }
          }
          ```

          The important part is that `next` is read before `delete cur`.

          A more thorough root-cause fix would be to avoid raw owning pointers and manual
          deletion entirely. For example, model ownership with `std::unique_ptr`:

          ```cpp
          #include <cstdio>
          #include <memory>

          struct Node {
              int value;
              std::unique_ptr<Node> next;
          };

          int main() {
              auto c = std::make_unique<Node>(Node{3, nullptr});
              auto b = std::make_unique<Node>(Node{2, std::move(c)});
              auto a = std::make_unique<Node>(Node{1, std::move(b)});

              std::printf("done\n");
              return 0;
          }
          ```

          Then the list is destroyed automatically when `a` goes out of scope, and there
          is no need for `destroy_list` or manual `delete`.
