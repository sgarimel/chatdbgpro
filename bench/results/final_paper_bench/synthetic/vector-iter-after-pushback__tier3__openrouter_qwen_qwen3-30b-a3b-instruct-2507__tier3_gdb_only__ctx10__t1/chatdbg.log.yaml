          \ is called 1000 times,\nwhich is well beyond the initial capacity of the\
          \ vector (which, for a vector of\n4 elements, is likely 4 or 8). This triggers\
          \ reallocation of the internal\nstorage. When reallocation occurs, all existing\
          \ iterators, pointers, and\nreferences to elements in the vector are invalidated.\
          \ The iterator `it`, which\nwas captured before the loop, now points to\
          \ memory that has been freed or\noverwritten. After the loop, the program\
          \ attempts to dereference `it`, causing a\nheap-use-after-free violation\
          \ that is detected by AddressSanitizer. The `print`\ncommands fail because\
          \ the debugger cannot access local variables once control\nhas returned\
