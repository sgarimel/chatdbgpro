          \ then **beyond** the buffer.\n- On `input_end++` after `'c'`, it points\
          \ to invalid memory \u2192 **read from\noutside buffer** \u2192 **heap buffer\
          \ overflow**.\n\n---\n\n### **Step 5: Fix \u2014 Local Minimal Fix**\n\n\
          **Minimal fix**: Add a bounds check in `parse_string`:\n\n```c\nstatic cJSON_bool\
          \ parse_string(cJSON * const item, parse_buffer * const input_buffer)\n\
          {\n    const char *input_end = input_buffer->content + input_buffer->offset;\n\
