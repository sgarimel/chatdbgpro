      - output: "The program crashes with a **heap buffer overflow**, and the stack\
          \ trace points\nto `print_reverse` at line 11, specifically within the `for`\
          \ loop starting at\nline 10:\n\n```cpp\nfor (size_t i = v.size() - 1; i\
          \ >= 0; i--) {\n    std::printf(\"%d\\n\", v[i]);\n}\n```\n\n### Step-by-step\
          \ Analysis\n\n#### 1. **Variable Type Mismatch: `size_t` vs. Signed Loop\
          \ Counter**\nThe loop variable `i` is declared as `size_t`, which is an\
          \ **unsigned type**\n(typically `unsigned long` or `unsigned int` on macOS/Linux).\n\
          \nThe loop condition is:\n```cpp\ni >= 0\n```\n\nHowever, `size_t` is unsigned.\
          \ In unsigned arithmetic:\n- The smallest value `size_t` can hold is `0`.\n\
          - When `i` is `0` and we decrement (`i--`), it wraps around to the **maximum\n\
          value** of `size_t` (e.g., `18446744073709551615` on 64-bit systems).\n\n\
          Thus, after `i` becomes `0`, the next iteration does:\n```cpp\ni-- -> becomes\
          \ a very large positive number (wraparound)\n```\nAnd since `i >= 0` is\
          \ **always true** for unsigned values, the loop runs\n**forever**.\n\nEventually,\
          \ the code accesses `v[i]` with this huge index:\n```cpp\nstd::printf(\"\
          %d\\n\", v[i]);\n```\nSince `i` is now effectively a massive number (e.g.,\
          \ `2^64 - 1`), this accesses\nmemory far beyond the bounds of the vector\
          \ `v`, causing a **heap buffer\noverflow**.\n\n#### 2. **Why the Error Occurs\
          \ on `empty` Vector**\nThe `main` function calls `print_reverse` twice:\n\
          ```cpp\nprint_reverse(v);     // v has 3 elements\nprint_reverse(empty);\
          \ // empty has 0 elements\n```\n\n- On the first call (`v`), the loop runs\
          \ correctly: `i = 2, 1, 0`, then `i--`\nbecomes `0` \u2192 `i--` \u2192\
          \ `0xFFFFFFFFFFFFFFFF`, then `i >= 0` is `true`, so infinite\nloop \u2192\
          \ crash.\n- The same issue happens on the empty vector, but it crashes even\
          \ faster because\n`v.size() == 0`, so `i = 0 - 1`, which is `size_t(-1)`,\
          \ again the max value \u2192\nloop runs infinitely \u2192 heap overflow.\n\
          \n#### 3. **Why `frame variable i` and `v` Fail to Show?**\nDespite the\
