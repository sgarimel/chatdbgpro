      - output: |-
          The issue here is related to the loop condition used in the `print_reverse`
          function. In C++, the `size_t` type is an unsigned integer, meaning it can only
          represent non-negative values. The loop on line 10 is designed to iterate
          backwards through the vector `v`:

          ```cpp
          for (size_t i = v.size() - 1; i >= 0; i--) {
              std::printf("%d\n", v[i]);
          }
          ```

          However, this logic fails because when `i` reaches `0` and decrements further,
          it underflows and wraps around to a very large value due to its nature of being
          unsigned. This behavior results in an infinite loop or an out-of-bounds access,
          which could lead to a crash when using tools like AddressSanitizer.

          Let's detail what each section should contain:

          ROOT CAUSE:
          The problem lies in `program.cpp:10`, where an unsigned `size_t` loop variable
          is used with a condition `i >= 0`. Because `size_t` is always non-negative, the
          condition `i >= 0` is always true, which leads to an underflow on `i--`,
          wrapping it to a large positive value, resulting in out-of-bounds access to the
          vector.

          LOCAL FIX:
          To fix the issue, modify the loop to correctly check the end condition for an
          unsigned type. You could use a different control flow:

          ```cpp
          for (size_t i = v.size(); i-- > 0;) {
              std::printf("%d\n", v[i]);
          }
          ```

          This change ensures `i` decrements correctly until it reaches 0 without
          underflowing.

          GLOBAL FIX:
          To prevent similar issues from occurring in the future, it's beneficial to
          redesign looping constructs involving potentially unsigned loop counters.
          Consider using iterators or logical checks that account for underflow scenarios.
          Additionally, employing debugging tools for boundary checks during development
          could help catch such issues early on.
        type: text
