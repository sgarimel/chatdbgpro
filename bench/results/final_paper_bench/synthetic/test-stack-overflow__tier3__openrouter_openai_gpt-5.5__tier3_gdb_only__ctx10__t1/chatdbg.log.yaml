      - output: |-
          The crash is caused by unbounded recursion in `fib`.

          The relevant code is:

          ```cpp
          int fib(int n) {
            return fib(n-1) + fib(n-2);
          }

          int main()
          {
            auto const n = 100;
            std::cout << "fib(" << n << ") = " << fib(n);
            return 0;
          }
          ```

          `main` calls:

          ```cpp
          fib(100)
          ```

          Inside `fib`, there is no base case. Every call to `fib(n)` immediately calls
          more recursive `fib` calls:

          ```cpp
          return fib(n-1) + fib(n-2);
          ```

          So the call chain begins roughly like this:

          ```text
          fib(100)
            fib(99)
              fib(98)
                fib(97)
                  ...
          ```

          Eventually `n` reaches values where a normal Fibonacci implementation would
          stop:

          ```text
          fib(1)
          fib(0)
          ```

          But this implementation does not stop there. It continues:

          ```text
          fib(0)
            fib(-1)
              fib(-2)
                fib(-3)
                  ...
          ```

          That matches the stack trace:

          ```text
          fib(n = -261269)
          fib(n = -261268)
          fib(n = -261267)
          ...
          ```

          Those negative values are present because `n` has been repeatedly decremented by
          the recursive call `fib(n - 1)`. Since there is no condition that returns for `n
          == 0`, `n == 1`, or invalid negative values, recursion continues until the
          process exhausts its stack.

          The crash:

          ```text
          EXC_BAD_ACCESS (code=2, address=0x16f603ffc)
          ```

          is consistent with a stack overflow on macOS. The program keeps creating
          recursive stack frames until it touches memory beyond the valid stack region.

          The immediate defect is here:

          ```cpp
          int fib(int n) {
            return fib(n-1) + fib(n-2);
          }
          ```

          There is no terminating condition.

          A minimal local fix is to add Fibonacci base cases:

          ```cpp
          int fib(int n) {
            if (n <= 1) {
              return n;
            }

            return fib(n - 1) + fib(n - 2);
          }
          ```

          However, this is only a partial fix. It prevents the infinite recursion for
          nonnegative inputs, but there are still two deeper problems:

          1. `fib(100)` is far too expensive with the naive recursive implementation. It
          takes exponential time.
          2. The return type `int` cannot store `fib(100)`. The value is:

          ```text
          354224848179261915075
          ```

          That is much larger than a 32-bit `int`, and even larger than a 64-bit signed
          integer.

          So a more complete root-cause fix would be to use an iterative implementation
          and a type large enough to store the result. For example, using
          `boost::multiprecision::cpp_int`:

          ```cpp
          #include <iostream>
          #include <stdexcept>
          #include <boost/multiprecision/cpp_int.hpp>

          using boost::multiprecision::cpp_int;

          cpp_int fib(int n) {
            if (n < 0) {
              throw std::invalid_argument("fib is undefined for negative n");
            }

            cpp_int a = 0;
            cpp_int b = 1;

            for (int i = 0; i < n; ++i) {
              cpp_int next = a + b;
              a = b;
              b = next;
            }

            return a;
          }

          int main() {
            auto const n = 100;
            std::cout << "fib(" << n << ") = " << fib(n) << '\n';
            return 0;
          }
          ```

          This version:

          - Terminates for valid inputs.
          - Rejects negative inputs explicitly.
          - Avoids stack overflow by using iteration instead of recursion.
          - Correctly computes `fib(100)` without integer overflow.

          ##### Recommendation

          Use an iterative Fibonacci implementation with explicit input validation and a
          sufficiently large integer type:

          ```cpp
          #include <iostream>
          #include <stdexcept>
          #include <boost/multiprecision/cpp_int.hpp>

          using boost::multiprecision::cpp_int;

          cpp_int fib(int n) {
            if (n < 0) {
              throw std::invalid_argument("fib is undefined for negative n");
            }

            cpp_int a = 0;
            cpp_int b = 1;

            for (int i = 0; i < n; ++i) {
              cpp_int next = a + b;
              a = b;
              b = next;
            }

            return a;
          }

          int main() {
            auto const n = 100;
            std::cout << "fib(" << n << ") = " << fib(n) << '\n';
            return 0;
          }
          ```
