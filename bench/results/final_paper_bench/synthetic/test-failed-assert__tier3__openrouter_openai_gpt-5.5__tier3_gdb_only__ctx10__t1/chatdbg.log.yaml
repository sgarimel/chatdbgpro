      - output: |-
          The crash is caused by the assertion in `fact` failing:

          ```cpp
          assert(x != 0.0);
          ```

          At the time of the assertion, the program state is:

          ```cpp
          (float) n = 100
          (double) x = 0
          ```

          The reason `x` is `0` is the loop:

          ```cpp
          auto x = 1.0;
          for (auto i = 0.0; i < n; i++) {
            x *= i;
          }
          ```

          Step by step:

          1. `main` calls:

          ```cpp
             fact(100)
             ```

             The integer literal `100` is converted to `float`, so inside `fact`:

          ```cpp
             n = 100.0f
             ```

          2. In `fact`, `x` is initialized as:

          ```cpp
             auto x = 1.0;
             ```

             Because `1.0` is a `double` literal, `x` has type `double` and value `1.0`.

          3. The loop starts with:

          ```cpp
             auto i = 0.0;
             ```

             So `i` is a `double` initialized to `0.0`.

          4. On the first loop iteration:

          ```cpp
             x *= i;
             ```

             becomes:

          ```cpp
             x = 1.0 * 0.0;
             ```

             So `x` becomes `0.0`.

          5. After that, every later multiplication keeps `x` at zero:

          ```cpp
             0.0 * 1.0 == 0.0
             0.0 * 2.0 == 0.0
             ...
             ```

          6. The loop eventually finishes when `i` reaches `100.0`, since the condition `i
          < n` is then false.

          7. The assertion checks:

          ```cpp
             assert(x != 0.0);
             ```

             But `x` is exactly `0.0`, so the assertion fails and the program aborts.

          The immediate defect is that the factorial loop starts at `0`. Multiplying by
          zero guarantees the result becomes zero. Factorial should multiply by positive
          integers starting at `1`, or more commonly `2`.

          There is also a second design issue: the function is named `fact`, but it takes
          a `float`. Factorial is normally defined for non-negative integers. Using
          floating-point values for the loop bound and loop counter is unnecessary and can
          introduce rounding/termination issues for non-integral inputs.

          Also, `100!` is far too large to fit in a `float`. `100!` is approximately:

          ```text
          9.33e157
          ```

          A `float` can only represent values up to roughly:

          ```text
          3.4e38
          ```

          So even if the loop is fixed, returning `float` will overflow to infinity for
          `fact(100)`.

          A minimal local fix that prevents the assertion failure would be:

          ```cpp
          float fact(float n) {
            auto x = 1.0;
            for (auto i = 1.0; i < n; i++) {
              x *= i;
            }
            assert(x != 0.0);
            return x;
          }
          ```

          However, that still computes `99!` for `fact(100)`, because the loop condition
          is `i < n`. A more correct local factorial fix would be:

          ```cpp
          float fact(float n) {
            auto x = 1.0;
            for (auto i = 2.0; i <= n; i++) {
              x *= i;
            }
            assert(x != 0.0);
            return x;
          }
          ```

          But this still has the deeper problem that `float` is the wrong type for both
          the input and the result.

          A better root-cause fix would be to make the input an integer and use a wider
          return type:

          ```cpp
          #include <cassert>
          #include <iostream>

          double fact(unsigned int n) {
            double x = 1.0;

            for (unsigned int i = 2; i <= n; ++i) {
              x *= i;
            }

            return x;
          }

          int main() {
            std::cout << fact(100) << std::endl;
            return 0;
          }
          ```

          For `100!`, `double` is large enough, because `100!` is around `9.33e157`, which
          is below the maximum finite `double` value of roughly `1.8e308`.

          If exact integer factorial values are required, even `double` is not ideal
          because it will lose integer precision for large `n`. In that case, use a big
          integer type, such as `boost::multiprecision::cpp_int`:

          ```cpp
          #include <iostream>
          #include <boost/multiprecision/cpp_int.hpp>

          boost::multiprecision::cpp_int fact(unsigned int n) {
            boost::multiprecision::cpp_int x = 1;

            for (unsigned int i = 2; i <= n; ++i) {
              x *= i;
            }

            return x;
          }

          int main() {
            std::cout << fact(100) << std::endl;
            return 0;
          }
          ```

          ##### Recommendation

          Minimal local fix:

          ```cpp
          float fact(float n) {
            auto x = 1.0;
            for (auto i = 2.0; i <= n; i++) {
              x *= i;
            }
            assert(x != 0.0);
            return x;
          }
          ```

          More thorough root-cause fix:

          ```cpp
          #include <iostream>

          double fact(unsigned int n) {
            double x = 1.0;

            for (unsigned int i = 2; i <= n; ++i) {
              x *= i;
            }

            return x;
          }

          int main() {
            std::cout << fact(100) << std::endl;
            return 0;
          }
          ```

          The root cause is that the loop starts at `0`, so the first multiplication sets
          `x` to zero. The deeper design issue is that factorial should use an integer
          argument, and `float` is too small to represent `100!`.
