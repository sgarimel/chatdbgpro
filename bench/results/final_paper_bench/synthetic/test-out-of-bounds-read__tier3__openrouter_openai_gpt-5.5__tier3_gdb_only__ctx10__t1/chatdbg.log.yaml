      - output: |-
          The crash is caused by an out-of-bounds read from the stack array `a`.

          At the crashing line:

          ```cpp
          f(*(a + 5));
          ```

          `a` is declared as:

          ```cpp
          int a[5] = {1, 2, 3, 4, 5};
          ```

          That array has 5 elements, with valid indices:

          ```cpp
          a[0] == 1
          a[1] == 2
          a[2] == 3
          a[3] == 4
          a[4] == 5
          ```

          In C/C++, `a` decays to a pointer to its first element in the expression `a +
          5`. Therefore:

          ```cpp
          a + 0  // points to a[0]
          a + 1  // points to a[1]
          a + 2  // points to a[2]
          a + 3  // points to a[3]
          a + 4  // points to a[4]
          a + 5  // points one past the end of the array
          ```

          The pointer `a + 5` is legal to compute as a one-past-the-end pointer, but it is
          not legal to dereference. This part is the defect:

          ```cpp
          *(a + 5)
          ```

          That attempts to read `a[5]`, which does not exist.

          So the effective code is equivalent to:

          ```cpp
          f(a[5]);
          ```

          But `a[5]` is out of bounds.

          The second array:

          ```cpp
          int b[5] = {6, 7, 8, 9, 10};
          ```

          is not directly used, but because both `a` and `b` are stack arrays, an out-of-
          bounds access from `a` could, in an uninstrumented build, accidentally read
          nearby stack memory. Depending on compiler layout, optimization, and stack
          arrangement, that memory might be part of `b`, padding, a sanitizer redzone, or
          something else. With AddressSanitizer or similar instrumentation enabled, the
          invalid read is detected as a stack buffer overflow.

          The function `f` itself is not the cause of the crash:

          ```cpp
          void f(int value) {
            // The value in this function is expected to be in [1, 5].
            std::cout << value << std::endl;
          }
          ```

          The problem happens while evaluating the argument to `f`, before `f` is entered.
          The program tries to produce the `value` argument by reading past the end of
          `a`.

          Minimal local fix, if the intent was to pass the last element of `a`:

          ```cpp
          int main() {
            int a[5] = {1, 2, 3, 4, 5};
            int b[5] = {6, 7, 8, 9, 10};

            f(a[4]);
          }
          ```

          or, keeping the pointer style:

          ```cpp
          f(*(a + 4));
          ```

          But using array indexing is clearer and less error-prone.

          A more thorough fix is to avoid raw pointer arithmetic and use a bounds-checked
          container/access pattern:

          ```cpp
          #include <array>
          #include <cassert>
          #include <iostream>

          void f(int value) {
            assert(value >= 1 && value <= 5);
            std::cout << value << std::endl;
          }

          int main() {
            std::array<int, 5> a = {1, 2, 3, 4, 5};
            std::array<int, 5> b = {6, 7, 8, 9, 10};

            constexpr std::size_t index = 4;
            f(a.at(index));
          }
          ```

          If the index is computed dynamically, validate it before indexing:

          ```cpp
          #include <array>
          #include <cassert>
          #include <iostream>

          void f(int value) {
            assert(value >= 1 && value <= 5);
            std::cout << value << std::endl;
          }

          int main() {
            std::array<int, 5> a = {1, 2, 3, 4, 5};

            std::size_t index = 4;

            if (index < a.size()) {
              f(a[index]);
            } else {
              std::cerr << "index out of range\n";
              return 1;
            }
          }
          ```

          The root defect is an off-by-one error: the code uses offset `5` for an array of
          length `5`, but the largest valid offset is `4`.

          ##### Recommendation

          Fix the invalid access by changing:

          ```cpp
          f(*(a + 5));
          ```

          to:

          ```cpp
          f(a[4]);
          ```

          If the index may vary, replace raw pointer arithmetic with `std::array` and
          bounds-checked access such as `a.at(index)`, or explicitly check `index <
          a.size()` before reading.
