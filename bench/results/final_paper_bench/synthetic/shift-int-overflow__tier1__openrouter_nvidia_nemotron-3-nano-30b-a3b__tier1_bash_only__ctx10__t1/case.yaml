id: shift-int-overflow
language: c
source_file: program.c
description: >
  high_bit_mask() shifts the literal 1 left by `width` bits before
  casting to unsigned long long. With width=64 the shift count is
  >= the width of the int operand, which is undefined behaviour.
  UndefinedBehaviorSanitizer reports
  "shift exponent 64 is too large for 32-bit type 'int'" and aborts.

build:
  compiler: clang
  flags: ["-g", "-O0", "-fno-omit-frame-pointer", "-fsanitize=undefined", "-fno-sanitize-recover=undefined"]

run:
  args: []
  expected_crash: true

bug:
  category: undefined_behavior
  error_type: shift_overflow
  root_cause_lines: [9]
  related_lines: [13]

criteria:
  root_cause: >
    The response must identify that the literal `1` in `1 << width`
    has type `int` (32 bits on this platform), so a shift by >= 32 is
    undefined behaviour per C11 §6.5.7. The cast to unsigned long long
    happens *after* the shift, so it does not widen the operand.

  local_fix: >
    Force the shift's left-operand to be wide enough by writing
    `1ULL << width` (or `(unsigned long long)1 << width`). The shift
    is then well-defined for width up to 63.

  global_fix: >
    A correct global fix prevents this class of "promote too late" bug.
    Acceptable options:
      (a) introduce a typed mask helper, e.g. `static inline uint64_t
          bit(unsigned w) { return (uint64_t)1 << w; }` and route all
          shift-by-runtime-value sites through it;
      (b) add a static_assert / runtime check that `width < 64` and
          reject otherwise;
      (c) compile with `-Wshift-count-overflow -Wshift-overflow` and
          treat them as errors so the type-promotion mistake is caught
          at build time.
    Just changing `1` to `1ULL` at this one site is a local fix.
