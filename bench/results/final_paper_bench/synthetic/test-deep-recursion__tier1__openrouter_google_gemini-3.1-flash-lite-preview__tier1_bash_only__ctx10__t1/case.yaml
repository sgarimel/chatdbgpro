id: test-deep-recursion
language: cpp
source_file: program.cpp
description: >
  Constructs a deeply nested struct chain (Adam -> Bob -> Charlie ->
  David -> int*). One David in the chain has data set to nullptr.
  Dereferencing through the full chain crashes.

build:
  compiler: clang++
  flags: ["-g", "-std=c++17", "-O0", "-fno-omit-frame-pointer", "-fsanitize=address"]

run:
  args: []
  expected_crash: true

bug:
  category: null_deref
  error_type: null_in_deep_chain
  root_cause_lines: [40]
  related_lines: [33]

criteria:
  root_cause: >
    The response must trace the chain adam1.b2->c2->d1->data and
    identify that david5.data is nullptr (line 33). It should show
    that c2 is charlie4, charlie4.d1 is david5, and david5.data is
    null. Simply saying "null dereference" without identifying which
    node in the chain is null is insufficient.

  local_fix: >
    Check each pointer in the chain before dereferencing, or
    initialize david5.data to a valid element of arrayofints.

  global_fix: >
    Replace the raw struct nesting with a builder or factory that
    validates all pointers are non-null at construction. Use
    std::optional or reference wrappers to make null states
    unrepresentable. The deep indirection itself is a design smell.
