          \ v = {1, 2, 3, 4};\n\n    v.reserve(v.size() + 1000);\n\n    auto it =\
          \ v.begin() + 2;\n\n    for (int i = 0; i < 1000; ++i) {\n        v.push_back(i);\n\
          \    }\n\n    std::printf(\"element via iter: %d\\n\", *it);\n    return\
