      - output: |-
          The `greet` function in `program.c` composes a greeting message using a string
          buffer of 16 bytes which is insufficient to hold the full greeting when a name
          longer than 8 characters (accounting for "Hello, ", the name, and the "!") is
          provided. The sanitizer identified a stack-buffer overflow because the `strcat`
          operation on line 8 appends a 24-character name to the buffer that already
          contains "Hello, ", which exceeds its capacity, causing a memory write outside
          the allocated buffer.

          ROOT CAUSE: `program.c:8` and `program.c:9` - The defect arises because the
          buffer `buf` is declared with only 16 bytes, which is insufficient to store the
          static text "Hello, ", any name of significant length, and a terminating
          exclamation mark plus the null terminator. Therefore, a buffer overflow occurs
          leading to unsafe memory writes when a long name is used as input.

          LOCAL FIX: Increase the size of the buffer to ensure it can handle the maximum
          expected length of input plus the greeting text. Change the buffer declaration
          as follows:
          ```c
          char buf[40]; // Accommodates "Hello, " + 24-char name + "!" + null terminator
          ```

          GLOBAL FIX: Implement bounds-checking or use safer string manipulation functions
          like `snprintf` instead of raw `strcpy` and `strcat` to prevent this class of
          error. Using dynamic memory allocation or std::string (in C++) or even
          encapsulating string operations into a safe API can help handle variable string
          lengths more robustly.
