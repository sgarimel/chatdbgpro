          if (required / sizeof(Record) != static_cast<size_t>(n) || required == 0)\
          \ {\n    std::cerr << \"allocation size overflow for n=\" << n << \"\\n\"\
          ;\n    return nullptr;\n}\nRecord* rs = static_cast<Record*>(std::malloc(required));\n\
          if (!rs) {\n    std::fprintf(stderr, \"OOM\\n\");\n    return nullptr;\n\
          }\n```\n\nor simply:\n\n```cpp\nstd::vector<Record> rs(n);          // automatic\
          \ sizing and bounds safety\nrs[n - 1].id = 42;                    // safe\
          \ write\n```\n\nThese changes guarantee that `rs[n\u20111]` is a valid object,\
