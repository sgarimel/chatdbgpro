      - output: |-
          The crash is caused by dereferencing a null pointer through a chain of four
          pointers.

          At the crashing line:

          ```cpp
          int n = ****adam1.b1->data;
          ```

          the expression ultimately tries to read through `p`, but `p` was initialized to
          `nullptr`:

          ```cpp
          static int* p = nullptr;
          ```

          So the final dereference attempts to read from address `0x0`, producing:

          ```text
          EXC_BAD_ACCESS (code=1, address=0x0)
          ```

          Program state at the crash:

          ```cpp
          static int* p = nullptr;

          int **p2 = &p;
          int ***p3 = &p2;
          int ****p4 = &p3;

          Bob bob1 = {p4};
          Bob bob2 = {p4};
          Adam adam1 = {&bob1, &bob2};

          int n = ****adam1.b1->data;
          ```

          The relevant values are:

          ```text
          adam1.b1      = &bob1
          bob1.data     = p4
          p4            = &p3
          *p4           = p3 = &p2
          **p4          = p2 = &p
          ***p4         = p  = nullptr
          ****p4        = *p = invalid dereference
          ```

          Walking through the expression:

          ```cpp
          adam1.b1->data
          ```

          is `bob1.data`, which is `p4`.

          Then:

          ```cpp
          *adam1.b1->data
          ```

          dereferences `p4`, producing `p3`.

          ```cpp
          **adam1.b1->data
          ```

          dereferences `p3`, producing `p2`.

          ```cpp
          ***adam1.b1->data
          ```

          dereferences `p2`, producing `p`.

          But `p` is:

          ```cpp
          nullptr
          ```

          So:

          ```cpp
          ****adam1.b1->data
          ```

          tries to dereference `nullptr`, causing the crash.

          `bob2` is not involved in the crash. It also stores the same `p4`, but the
          crashing expression uses `adam1.b1`, which points to `bob1`.

          The immediate defect is that `p` is null before being dereferenced. The deeper
          design issue is that the code builds a long chain of raw pointers without
          ensuring that the final `int*` points to a valid `int`.

          ##### Recommendation

          Minimal local fix: initialize `p` to point to a valid `int` before dereferencing
          it.

          For example:

          ```cpp
          static int value = 42;
          static int* p = &value;

          struct Bob
          {
            int ****data;
          };

          struct Adam
          {
            Bob *b1;
            Bob *b2;
          };

          int main()
          {
            int **p2 = &p;
            int ***p3 = &p2;
            int ****p4 = &p3;

            Bob bob1 = {p4};
            Bob bob2 = {p4};
            Adam adam1 = {&bob1, &bob2};

            int n = ****adam1.b1->data;
            return 0;
          }
          ```

          Or, if `p` must remain global but should be initialized inside `main`:

          ```cpp
          static int* p = nullptr;

          int main()
          {
            int value = 42;
            p = &value;

            int **p2 = &p;
            int ***p3 = &p2;
            int ****p4 = &p3;

            Bob bob1 = {p4};
            Bob bob2 = {p4};
            Adam adam1 = {&bob1, &bob2};

            int n = ****adam1.b1->data;
            return 0;
          }
          ```

          A more thorough root-cause fix is to avoid the unnecessary chain of raw pointers
          and store the actual thing the program needs. For example, if `Bob` needs access
          to an integer value, define it that way:

          ```cpp
          struct Bob
          {
            int *data;
          };

          struct Adam
          {
            Bob *b1;
            Bob *b2;
          };

          int main()
          {
            int value = 42;

            Bob bob1 = {&value};
            Bob bob2 = {&value};
            Adam adam1 = {&bob1, &bob2};

            int n = *adam1.b1->data;
            return 0;
          }
          ```

          If null is a valid possible state, guard before dereferencing:

          ```cpp
          if (adam1.b1 &&
              adam1.b1->data &&
              *adam1.b1->data &&
              **adam1.b1->data &&
              ***adam1.b1->data)
          {
            int n = ****adam1.b1->data;
          }
          ```

          But the best fix is to simplify ownership and pointer structure so the program
          does not require dereferencing through four raw pointer levels.
