          \nSo `sizeof(Record) = 64`.\n\nIn `make_records`, the bytes to allocate\
          \ are computed as:\n```c++\nuint32_t bytes = count * (uint32_t)sizeof(Record);\n\
          ```\nWith `count = 70,000,000` and `sizeof(Record) = 64`, we get:\n```c++\n\
          bytes = 70,000,000 \xD7 64 = 4,480,000,000\n```\n\nBut `uint32_t` has a\
          \ maximum value of 4,294,967,295 (~4.29 billion). So\n4,480,000,000 **overflows**\
          \ `uint32_t`.\n\nThis causes an integer underflow (wraparound), and the\
          \ actual computed `bytes`\nbecomes:\n```\n4,480,000,000 mod 2^32 = 4,480,000,000\
          \ - 4,294,967,296 = 185,032,704\n```\n\nSo `bytes` is only `185,032,704`\
          \ bytes (\u2248 185 MB), **not** 4.48 GB.\n\nThis is insufficient to hold\
          \ 70 million `Record`s (which would need ~4.48 GB).\nThe `malloc` call succeeds\
          \ (since 185 MB is reasonable), but only allocates 185\nMB.\n\nThe result\
          \ is `rs` pointing to a buffer that only holds ~185 MB / 64 bytes =\n~2,891,135\
          \ `Record`s.\n\nNow, the code tries to access `rs[n - 1]`, i.e., `rs[69,999,999]`,\
          \ but the valid\nrange is only ~[0, 2,891,134].\n\nThis is a **huge** out-of-bounds\
          \ access, causing `EXC_BAD_ACCESS` at\n`0x20d57a7c0` \u2014 an invalid memory\
          \ address.\n\n### Root Cause:\n**Integer overflow in `bytes = count * sizeof(Record)`\
          \ due to `uint32_t` being\ntoo small.**\nThe multiplication 70,000,000 \xD7\
          \ 64 overflows `uint32_t`, resulting in a much\nsmaller allocation size,\
          \ leading to out-of-bounds memory access.\n\n### Why the crash happens:\n\
          - `make_records(n)` returns a pointer to a buffer that is far too small.\n\
          - `rs[n - 1]` attempts to access an index beyond the allocated array.\n\
          - The memory access pattern causes a segfault (EXC_BAD_ACCESS).\n\n---\n\
          \n### Fix\n\nWe must use a type large enough to hold the full product.\n\
          \n#### \U0001F7E2 Minimal Fix:\nChange `uint32_t bytes` to `uint64_t` in\
          \ `make_records`:\n```cpp\nstatic Record *make_records(uint32_t count) {\n\
          \    uint64_t bytes = (uint64_t)count * sizeof(Record);  // Cast to uint64_t\
          \ before multiplication\n    Record *r = (Record *)std::malloc(bytes);\n\
          \    if (!r) return nullptr;\n    std::memset(r, 0, bytes);\n    return\
          \ r;\n}\n```\n\nThis prevents overflow and ensures the correct amount of\
          \ memory is allocated.\n\n#### \U0001F50D More Thorough (Robust) Fix:\n\
          Even better: Validate the multiplication for overflow before doing it. Since\n\
          `count` is `uint32_t`, the max value is ~4.3e9, and `sizeof(Record) = 64`,\
          \ so\nmax possible `bytes` is ~276 billion, which exceeds `uint64_t`? No\
          \ \u2014 `uint64_t`\nmax is ~1.8e19, so no overflow possible at that level\
          \ \u2014 but **we still need to\ndetect if the allocation is too large**.\n\
          \nBut in this context, the input is capped at 70M, so overflow is the real\
          \ danger.\n\nSo the **minimal fix** (changing `bytes` to `uint64_t` and\
          \ casting properly) is\nsufficient and safe.\n\nWe **do not** need to check\
