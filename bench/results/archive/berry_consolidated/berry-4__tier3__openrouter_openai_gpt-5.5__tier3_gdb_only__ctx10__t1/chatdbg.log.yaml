      - output: |-
          The failure is not a crash. The interpreter exits normally, but
          `tests/string.be` fails because the string formatting implementation mishandles
          escaped percent signs.

          I traced execution under GDB with the working directory set to `/work` so
          `tests/string.be` could be loaded correctly. The earlier `find` assertions
          execute successfully. The first failing formatting case is:

          ```berry
          assert(s.format("%%") == "%")
          ```

          When `str_format()` is entered for this call:

          ```c
          top = be_top(vm)          // 1
          format = be_tostring(vm, 1) // "%%"
          index = 2
          ```

          There is only one Berry argument: the format string itself. That is correct,
          because `"%%"` should produce a literal percent and should not consume a
          formatting value.

          However, `str_format()` processes every percent sequence as if it requires an
          argument. The relevant code is:

          ```c
          p = get_mode(p + 1, mode);
          buf[0] = '\0';
          if (index > top) {
              be_raise(vm, "runtime_error", be_pushfstring(vm,
                  "bad argument #%d to 'format': no value", index));
          }
          switch (*p) {
          ...
          ```

          For `"%%"`:

          1. `strchr(format, '%')` finds the first `%`.
          2. `pushstr(vm, format, p - format)` pushes the literal prefix, which is empty.
          3. `get_mode(p + 1, mode)` is called with the second `%`.
          4. `get_mode()` returns a pointer to that second `%`, so `*p == '%'`.
          5. Before `switch (*p)` can handle the conversion, the code checks `if (index >
          top)`.
          6. `index == 2`, `top == 1`, so the function raises `"bad argument #2 to
          'format': no value"`.

          That is wrong for `%%`: escaped percent is not a value-consuming conversion. The
          formatter should append `"%"` and should not require or consume an argument.

          There is a second related bug: `str_format()` has no `case '%'` in its `switch`.
          Even if the argument-count check were moved, `%%` would currently fall into the
          default error path:

          ```c
          default:
              be_raise(vm, "runtime_error", be_pushfstring(vm,
                  "invalid option '%%%c' to 'format'", *p));
          ```

          So the immediate defect is that literal percent escapes are not supported by
          `str_format()`, even though the test expects C/Python-like formatting semantics
          where `"%%"` means a literal `%`.

          A correct local fix is to special-case `%` before checking for a value, and
          avoid incrementing `index` for that case.

          One minimal patch:

          ```diff
          diff --git a/src/be_strlib.c b/src/be_strlib.c
          index ... .. ...
          --- a/src/be_strlib.c
          +++ b/src/be_strlib.c
          @@ -511,8 +511,15 @@ static int str_format(bvm *vm)
                       pushstr(vm, format, p - format);
                       concat2(vm);
                       p = get_mode(p + 1, mode);
                       buf[0] = '\0';
          +
          +            /* "%%" is an escaped percent.  It does not consume an argument. */
          +            if (*p == '%') {
          +                pushstr(vm, "%", 1);
          +                concat2(vm);
          +                format = p + 1;
          +                continue;
          +            }
          +
                       if (index > top) {
                           be_raise(vm, "runtime_error", be_pushfstring(vm,
                               "bad argument #%d to 'format': no value", index));
                       }
                       switch (*p) {
          ```

          With this behavior:

          ```berry
          s.format("%%")          // "%"
          s.format("%i%%", 12)    // "12%"
          s.format("%i%%%i", 12, 13) // "12%13"
          s.format("%s%%", "foo") // "foo%"
          ```

          The escaped percent no longer triggers the missing-argument check and does not
          increment the value index.

          ROOT CAUSE: `/work/src/be_strlib.c:515` in `str_format()`. The code checks `if
          (index > top)` for every `%` sequence before determining whether the sequence is
          `%%`. But `%%` is a literal percent escape and should not consume an argument.
          Because `index` starts at `2` and `top` is `1` for `s.format("%%")`, the
          formatter reports a missing second argument instead of returning `"%"`. The
          switch also lacks a `case '%'`, so escaped percent handling is absent entirely.

          LOCAL FIX: Add explicit handling for `%%` immediately after `get_mode()` and
          before the argument-count check, without incrementing `index`.

          ```diff
          @@ -511,8 +511,15 @@ static int str_format(bvm *vm)
                       pushstr(vm, format, p - format);
                       concat2(vm);
                       p = get_mode(p + 1, mode);
                       buf[0] = '\0';
          +            if (*p == '%') {
          +                pushstr(vm, "%", 1);
          +                concat2(vm);
          +                format = p + 1;
          +                continue;
          +            }
                       if (index > top) {
                           be_raise(vm, "runtime_error", be_pushfstring(vm,
                               "bad argument #%d to 'format': no value", index));
                       }
          ```

          GLOBAL FIX: Refactor `str_format()` so format parsing produces an explicit token
          type, e.g. `FORMAT_LITERAL_PERCENT`, `FORMAT_INT`, `FORMAT_REAL`,
          `FORMAT_STRING`, etc. Only value-consuming token types should perform argument-
          count checks or increment `index`. This prevents the parser from treating all
          `%` sequences uniformly and avoids future bugs where non-consuming directives,
          escaped characters, or invalid directives are mixed with value-consuming
          conversions.
