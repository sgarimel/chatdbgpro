      - output: |-
          The crash is caused by dereferencing an invalidated `std::vector<int>` iterator.

          At the crashing line:

          ```cpp
          std::printf("element via stale iter: %d\n", *it);
          ```

          `it` no longer points into valid live storage.

          Program state walkthrough:

          ```cpp
          std::vector<int> v = {1, 2, 3, 4};
          ```

          `v` initially contains:

          ```cpp
          {1, 2, 3, 4}
          ```

          Its size is `4`. Its capacity is at least `4`, and in a typical implementation
          here it is likely exactly `4`.

          Then:

          ```cpp
          auto it = v.begin() + 2;
          ```

          `it` points to the third element of the original vector storage:

          ```cpp
          *it == 3
          ```

          Conceptually:

          ```cpp
          v:  [1, 2, 3, 4]
                    ^
                    it
          ```

          Then the code appends 1000 more elements:

          ```cpp
          for (int i = 0; i < 1000; ++i) {
              v.push_back(i);
          }
          ```

          `std::vector` stores its elements in a contiguous dynamically allocated buffer.
          When `push_back` grows the vector beyond its current capacity, the vector
          allocates a new, larger buffer, moves/copies the old elements into it, and frees
          the old buffer.

          When that happens, all existing iterators, pointers, and references into the old
          vector storage are invalidated.

          So after one of the `push_back` calls reallocates `v`, this iterator:

          ```cpp
          it
          ```

          still contains an address pointing into the old buffer, but that old buffer has
          been deallocated.

          At the end of the loop, `v` contains 1004 elements:

          ```cpp
          {1, 2, 3, 4, 0, 1, 2, ..., 999}
          ```

          But `it` still points to the old freed allocation. Therefore this line:

          ```cpp
          *it
          ```

          attempts to read an `int` from deallocated memory. AddressSanitizer reports that
          as:

          ```text
          Use of deallocated memory
          ```

          The root defect is retaining a `std::vector` iterator across operations that may
          reallocate the vector, then dereferencing that stale iterator.

          A minimal local fix is to store an index instead of an iterator and look the
          element up after the `push_back` operations:

          ```cpp
          #include <cstdio>
          #include <vector>

          int main()
          {
              std::vector<int> v = {1, 2, 3, 4};

              std::size_t index = 2;

              for (int i = 0; i < 1000; ++i) {
                  v.push_back(i);
              }

              std::printf("element via index: %d\n", v[index]);
              return 0;
          }
          ```

          Because appending to a vector does not change the logical index of existing
          elements, `v[2]` is still the element originally pointed to by `it`.

          If the intent was specifically to preserve the original value, not the position,
          then store the value before mutating the vector:

          ```cpp
          #include <cstdio>
          #include <vector>

          int main()
          {
              std::vector<int> v = {1, 2, 3, 4};

              int element = v[2];

              for (int i = 0; i < 1000; ++i) {
                  v.push_back(i);
              }

              std::printf("element value: %d\n", element);
              return 0;
          }
          ```

          Another possible local fix is to reserve enough capacity before taking the
          iterator:

          ```cpp
          #include <cstdio>
          #include <vector>

          int main()
          {
              std::vector<int> v = {1, 2, 3, 4};

              v.reserve(v.size() + 1000);

              auto it = v.begin() + 2;

              for (int i = 0; i < 1000; ++i) {
                  v.push_back(i);
              }

              std::printf("element via iter: %d\n", *it);
              return 0;
          }
          ```

          This works because if `reserve` successfully allocates enough capacity ahead of
          time, the following `push_back` calls will not reallocate, so `it` remains
          valid. However, this is more fragile because it depends on accurately reserving
          enough capacity before all future insertions.

          The more thorough root-cause fix is to avoid designs that keep `std::vector`
          iterators, references, or raw pointers alive across vector-mutating operations
          that may change capacity. Prefer one of these patterns:

          ```cpp
          // Store an index.
          std::size_t index = 2;
          // mutate vector
          use(v[index]);
          ```

          or:

          ```cpp
          // Store the value if you need the old value.
          int saved = v[2];
          // mutate vector
          use(saved);
          ```

          or recompute the iterator after mutation:

          ```cpp
          std::size_t index = 2;

          for (int i = 0; i < 1000; ++i) {
              v.push_back(i);
          }

          auto it = v.begin() + index;
          std::printf("element via fresh iter: %d\n", *it);
          ```

          ##### Recommendation

          Fix the code by not dereferencing an iterator that was saved before `push_back`
          calls. The safest minimal fix is to store the index and reacquire the element
          after the vector mutations:

          ```cpp
          #include <cstdio>
          #include <vector>

          int main()
          {
              std::vector<int> v = {1, 2, 3, 4};

              std::size_t index = 2;

              for (int i = 0; i < 1000; ++i) {
                  v.push_back(i);
              }

              std::printf("element via index: %d\n", v[index]);
              return 0;
          }
          ```

          If you truly need to use an iterator, recompute it after the `push_back` loop,
          or call `reserve` before taking the iterator and ensure no later operation
          exceeds the reserved capacity.
