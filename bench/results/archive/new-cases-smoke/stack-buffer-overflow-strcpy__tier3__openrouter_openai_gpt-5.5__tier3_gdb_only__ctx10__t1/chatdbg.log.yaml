      - output: |-
          The crash is caused by writing past the end of a stack-allocated buffer in
          `greet`.

          ```c
          static void greet(const char *who)
          {
              char buf[16];
              strcpy(buf, "Hello, ");
              strcat(buf, who);
              strcat(buf, "!");
              puts(buf);
          }
          ```

          `buf` has room for only 16 bytes total, including the terminating `'\0'`.

          Program state at the crash:

          ```c
          greet("ProfessorAdrieneDelmarre");
          ```

          The argument `who` points to the string literal:

          ```c
          "ProfessorAdrieneDelmarre"
          ```

          That string is 24 characters long.

          Inside `greet`:

          1. `buf` is allocated on the stack:

          ```c
             char buf[16];
             ```

             Valid indexes are `buf[0]` through `buf[15]`.

          2. This line succeeds:

          ```c
             strcpy(buf, "Hello, ");
             ```

             `"Hello, "` is 7 characters, plus the null terminator, so `buf` now contains:

          ```text
             H e l l o ,   \0
             ```

             That uses 8 bytes. The current string length is 7.

          3. Then this line crashes:

          ```c
             strcat(buf, who);
             ```

             `strcat` appends the 24-character `who` string after the existing 7-character
          `"Hello, "` prefix.

             The resulting string would be:

          ```text
             "Hello, ProfessorAdrieneDelmarre"
             ```

             Length:

          ```text
             strlen("Hello, ")                  = 7
             strlen("ProfessorAdrieneDelmarre") = 24
             null terminator                    = 1
             total bytes needed                 = 32
             ```

             But `buf` only has 16 bytes. So `strcat` writes far past the end of `buf`,
          corrupting the stack. AddressSanitizer detects this as a stack buffer overflow.

          4. The next line would also require more space:

          ```c
             strcat(buf, "!");
             ```

             The final intended string would be:

          ```text
             "Hello, ProfessorAdrieneDelmarre!"
             ```

             Required size:

          ```text
             7 + 24 + 1 + 1 = 33 bytes
             ```

             That is 32 visible characters plus the terminating null byte.

          So the root cause is that `greet` uses a fixed-size local buffer that is too
          small for the data being copied into it, and it uses unbounded string functions,
          `strcpy` and `strcat`, which do not know the size of the destination buffer.

          ## Minimal local fix

          If this is just a toy program and you know the maximum input size, increase the
          buffer so it can hold the full greeting:

          ```c
          #include <stdio.h>
          #include <string.h>

          static void greet(const char *who)
          {
              char buf[33]; /* 7 + 24 + 1 + 1 */

              strcpy(buf, "Hello, ");
              strcat(buf, who);
              strcat(buf, "!");
              puts(buf);
          }

          int main(void)
          {
              greet("ProfessorAdrieneDelmarre");
              return 0;
          }
          ```

          However, this only fixes the current input. If someone later calls `greet` with
          a longer name, the same bug returns.

          A slightly safer local fix is to use `snprintf` with a fixed buffer:

          ```c
          #include <stdio.h>

          static void greet(const char *who)
          {
              char buf[64];

              snprintf(buf, sizeof buf, "Hello, %s!", who);
              puts(buf);
          }
          ```

          This prevents overflowing `buf`, but it may truncate long names.

          ## More thorough root-cause fix

          The better fix is to allocate enough space based on the actual length of `who`:

          ```c
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>

          static void greet(const char *who)
          {
              const char *prefix = "Hello, ";
              const char *suffix = "!";

              size_t len = strlen(prefix) + strlen(who) + strlen(suffix) + 1;

              char *buf = malloc(len);
              if (buf == NULL) {
                  perror("malloc");
                  return;
              }

              snprintf(buf, len, "%s%s%s", prefix, who, suffix);
              puts(buf);

              free(buf);
          }

          int main(void)
          {
              greet("ProfessorAdrieneDelmarre");
              return 0;
          }
          ```

          This version makes the destination buffer exactly large enough for the prefix,
          the supplied name, the suffix, and the null terminator.

          Alternatively, since the function only prints the greeting and does not need to
          store it, the simplest robust version is:

          ```c
          #include <stdio.h>

          static void greet(const char *who)
          {
              printf("Hello, %s!\n", who);
          }

          int main(void)
          {
              greet("ProfessorAdrieneDelmarre");
              return 0;
          }
          ```

          That avoids the intermediate stack buffer entirely, which removes the root
          cause.

          ##### Recommendation

          Replace the manual `strcpy`/`strcat` construction with direct formatted output:

          ```c
          #include <stdio.h>

          static void greet(const char *who)
          {
              printf("Hello, %s!\n", who);
          }
          ```

          If a buffer is truly needed, compute its required size from `strlen(who)` and
          allocate it dynamically, or use `snprintf` with explicit truncation/error
          handling.
