          \   printLine(data);\n   ```\n\n   `printLine()` is implemented in `io.c`\
          \ as:\n\n```c\n   void printLine (const char * line)\n   {\n       if(line\
          \ != NULL)\n       {\n           printf(\"%s\\n\", line);\n       }\n  \
          \ }\n   ```\n\n   Since `data` is still non-`NULL`, `printLine()` calls\
