      - output: "**Root\u2011cause analysis**\n\n1. The program stops at line\u202F\
          4 with the exon\u2011failure `EXC_BAD_ACCESS`.\n2. The stack trace shows\
          \ an ever\u2011growing chain of calls to `fib` with arguments\nthat keep\
          \ decreasing (`\u2026\u2011261267`, `\u2011261266`, \u2026).\n3. Looking\
          \ at the source of `fib` (the only code we can see around line\u202F4) we\n\
          find:\n\n```cpp\n   int fib(int n) {\n       return fib(n-1) + fib(n-2);\
          \   // <-- no base case, no termination condition\n   }\n   ```\n\n4. Because\
          \ the function lacks any *base case* (e.g. `if (n <= 0) return 0;` or\n\
          `if (n < 2) return n;`), every recursive call spawns two more calls that\
          \ keep\ndecreasing `n`.\n5. Starting from `n = 100` in `main`, the recursion\
          \ eventually reaches deeply\nnegative values. The call depth can grow without\
          \ bound, eventually exhausting\nthe process stack. When the stack guard\
          \ page is overwritten, the kernel raises\n`EXC_BAD_ACCESS` (address\u202F\
          0x16f603ff0).\n6. The crash is therefore a direct consequence of **infinite\
          \ recursion caused by\na missing termination condition** in `fib`.\n\n---\n\
          \n### Minimal local fix\n\nAdd a proper base\u2011case that stops the recursion\
          \ when `n` reaches a small, known\nvalue (typically 0 or 1). The smallest\
          \ change that preserves the original intent\nis:\n\n```cpp\nint fib(int\
          \ n) {\n    if (n < 2)          // handles n == 0 and n == 1\n        return\
          \ n;\n    return fib(n-1) + fib(n-2);\n}\n```\n\n- This returns `0` for\
          \ `n == 0` and `1` for `n == 1`.\n- For negative `n` the condition `n <\
          \ 2` also triggers, returning the negative\nargument, which prevents the\
          \ recursion from running forever on negative values.\n\nWith this modification\
          \ the program terminates correctly for `n = 100`, printing\nthe Fibonacci\
          \ number without crashing.\n\n---\n\n### More thorough root\u2011cause fix\n\
          \nThe naive implementation is both **inefficient** (exponential time) and\n\
          **non\u2011terminating** for negative inputs. A robust solution should:\n\
          \n1. **Guarantee termination for all integer inputs** (including negatives).\n\
          2. **Avoid unbounded stack growth** by either:\n   - Using a *tail\u2011\
          recursive* formulation (if the compiler can optimise it), or\n   - Switching\
          \ to an **iterative** algorithm, or\n   - Adding explicit bounds checks.\n\
          \nA stronger fix could look like:\n\n```cpp\n#include <stdexcept>\n#include\
          \ <iostream>\n\nlong long fib(int n) {\n    if (n < 0)               //\
          \ optional: treat negatives as error\n        throw std::invalid_argument(\"\
          Fibonacci is undefined for negative n\");\n\n    long long a = 0, b = 1;\
          \  // F(0), F(1)\n    for (int i = 0; i < n; ++i) {\n        long long tmp\
          \ = a + b;\n        a = b;\n        b = tmp;\n    }\n    return a;     \
          \           // iteratively compute F(n)\n}\n\nint main() {\n    const int\
          \ n = 100;\n    std::cout << \"fib(\" << n << \") = \" << fib(n) << '\\\
          n';\n    return 0;\n}\n```\n\n**Why this is more thorough:**\n\n- **Termination\
          \ guarantee:** No recursion \u2192 no risk of stack overflow.\n- **Correctness\
          \ for all inputs:** The function now explicitly validates and\nhandles negative\
          \ arguments.\n- **Performance:** Runs in O(n) time and O(1) stack space,\
          \ suitable for large\n`n`.\n- **Clarity:** The iterative algorithm is easier\
          \ to reason about and maintain.\n\nIf you prefer to keep recursion, you\
          \ could add both base cases **and** a depth\nguard:\n\n```cpp\nint fib(int\
          \ n, int depth = 0) {\n    const int MAX_DEPTH = 10'000;   // arbitrary\
          \ safety limit\n    if (depth > MAX_DEPTH) {\n        std::cerr << \"Maximum\
          \ recursion depth exceeded\\n\";\n        std::exit(EXIT_FAILURE);\n   \
          \ }\n    if (n < 2) return n;\n    return fib(n-1, depth+1) + fib(n-2, depth+1);\n\
          }\n```\n\n---\n\n### Summary\n\n- **Defect:** `fib` lacks a base case, causing\
          \ unlimited recursion when called\nwith `n = 100`. The recursion depth eventually\
          \ overflows the stack, leading to\n`EXC_BAD_ACCESS`.\n- **Fix:** Introduce\
          \ proper termination conditions (minimal fix) or replace the\nrecursive\
          \ formulation with an iterative algorithm that also guards against\nnegative\
          \ inputs (thorough fix).\n\n#### Recommendation\nAdopt the iterative solution\
          \ shown above, or at minimum add the simple base\u2011case\n`if (n < 2)\
          \ return n;` to the recursive version. This eliminates the stack\noverflow\
          \ and makes the program safe for any non\u2011negative `n`.\n\n### Recommendation\n\
          1. Implement the minimal base\u2011case fix: `if (n < 2) return n;` before\
          \ the\nrecursive call.\n2. For long\u2011term robustness, replace the recursive\
          \ implementation with an\niterative algorithm that handles negative inputs\
          \ gracefully."
