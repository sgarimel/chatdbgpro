      - output: |-
          The error "Deallocation of non-allocated memory" occurs because the program is
          attempting to delete a pointer (`n`) that does not point to the beginning of the
          memory block allocated by `new`.

          ### Analysis
          Looking at the source code in `program.cpp`:

          ```cpp
          9    int * n = new int(100);
          10   n--;                  // Subtracts from the pointer
          11   delete n;             // Attempts to delete the modified pointer
          ```

          1.  **Line 9**: `int * n = new int(100);` allocates memory on the heap for an
          integer. The pointer `n` holds the address of this allocated memory.
          2.  **Line 10**: `n--;` decrements the address stored in the pointer. If the
          integer at that heap location is at address `0xABC`, `n` now points to `0xABC -
          sizeof(int)` (e.g., `0xA98`).
          3.  **Line 11**: `delete n;` is called. The C++ `delete` operator expects a
          pointer that was returned by `new`. Since `n` was decremented and no longer
          points to the start of the buffer `new` allocated, the memory management system
          detects that an invalid address is being deallocated, triggering the
          "Deallocation of non-allocated memory" error (frequently raised by memory
          sanitizers like ASan).

          ### Root Cause
          The root cause is manual pointer arithmetic on a heap-allocated pointer before
          passing it to `delete`. This violates the contract of the `delete` operator,
          which requires the exact pointer returned by `new`.

          ***

          ### Recommendations

          #### Minimal Fix
          Remove the incorrect pointer arithmetic on line 10.

          ```cpp
          9    int * n = new int(100);
          10   // n--; Remove or fix this decrement
          11   delete n;
          ```

          #### Thorough Root-Cause Fix
          Avoid manual memory management wherever possible. Use `std::unique_ptr` or
          `std::shared_ptr` from the `<memory>` header, which automatically manage the
          memory lifecycle and eliminate the possibility of calling `delete` on an
          incorrect or invalidated pointer.

          ```cpp
          #include <memory>

          int main() {
            auto n = std::make_unique<int>(100);
            // ... no need to call delete manually, and no risk of invalidating the pointer
            return 0;
          }
          ```
