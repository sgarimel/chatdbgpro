          \ to stop the recursion when `n` reaches 0\nor 1.\n\n```cpp\nint fib(int\
          \ n) {\n  if (n <= 1) {\n    return n;\n  }\n  return fib(n - 1) + fib(n\
          \ - 2);\n}\n```\n\n#### Thorough Root-Cause Fix\nWhile the fix above solves\
          \ the stack overflow, the naive recursive Fibonacci\nimplementation has\
          \ exponential time complexity ($O(2^n)$). For an input like `n\n= 100`,\
          \ it would still take an extremely long time to compute even if the base\n\
          case is added. A production-ready fix should use memoization or an iterative\n\
          approach to achieve linear time complexity ($O(n)$):\n\n```cpp\n#include\
