          \ and `fib(n-2)`.\n2.  **Infinite Recursion**: Because there is no base\
          \ case, the function will\ncontinue to call itself indefinitely. As `n`\
          \ decreases, it enters negative\nnumbers (as seen in the stack trace `n\
          \ = -261266`).\n3.  **Stack Exhaustion**: Every recursive call adds a new\
