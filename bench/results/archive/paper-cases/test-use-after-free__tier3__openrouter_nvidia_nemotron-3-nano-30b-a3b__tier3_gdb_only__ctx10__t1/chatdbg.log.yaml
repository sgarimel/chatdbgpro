      - output: "**Root\u2011cause analysis**\n\n1. **Program state at the moment\
          \ of the crash**\n   - `int *n = new int(100);` allocates a single `int`\
          \ on the heap and stores\nits address in `n`.\n   - `n--;` performs pointer\
          \ arithmetic, moving the raw pointer **backward** by\none `int` size (typically\
          \ 4 bytes). The resulting address now points **outside**\nthe region that\
          \ was allocated.\n   - `delete n;` attempts to free the memory at that out\u2011\
          of\u2011bounds address. The\nruntime detects that the memory was **not allocated\
          \ with `new`** (or was not the\noriginal allocation) and raises the \u201C\
          Deallocation of non\u2011allocated memory\u201D\nerror.\n   - After the\
          \ illegal `delete`, the program continues and executes\n`doSomething(n);`\
          \ (which may read or write through the now\u2011invalid pointer) and\nthen\
          \ `std::cout << \"n = \" << *n << std::endl;`. This is a **use\u2011after\u2011\
          free**\nsituation, which reinforces the crash and would produce undefined\
          \ behaviour even\nif the first delete succeeded.\n\n2. **Why this triggers\
          \ the observed error**\n   The error message *\u201CDeallocation of non\u2011\
          allocated memory\u201D* is emitted by the\nC++ runtime when `delete` is\
          \ called on a pointer that does not refer to a block\nallocated with `new[]`\
          \ or `new`. Because `n--` changed the pointer value, the\nsubsequent `delete`\
          \ no longer matches any allocation, causing the runtime to\nabort with the\
          \ reported diagnosis.\n\n3. **Minimal local fix**\n   The immediate fix\
          \ is to **remove the offending pointer adjustment** and the\nsubsequent\
          \ use of the now\u2011invalid pointer:\n\n```cpp\n   int *n = new int(100);\n\
          \   // delete n--;   // <-- remove this line\n   delete n;       // delete\
          \ the memory that was actually allocated\n   char *ch = new char[16];\n\
          \   delete [] ch;\n   doSomething(n); // now safe \u2013 n still points\
          \ to the allocated int\n   std::cout << \"n = \" << *n << std::endl;\n \
          \  ```\n\n   If the intent was to work with an array of `int`s, allocate\
          \ an array instead:\n\n```cpp\n   int *n = new int[1];          // allocate\
          \ one element\n   // no decrement!\n   delete n;                     //\
          \ free the allocated element\n   ```\n\n   Or, even better, use a scalar\
          \ `int` without a raw pointer:\n\n```cpp\n   int n = 100;\n   doSomething(&n);\
          \   // pass address if the function really needs a pointer\n   ```\n\n4.\
          \ **More thorough root\u2011cause fix**\n   The underlying design flaw is\
          \ the **manual, raw pointer management combined\nwith pointer arithmetic\
          \ that is not justified by the intended semantics**. A\nrobust solution\
          \ would eliminate raw pointers altogether or at least encapsulate\nthem\
          \ in an RAII type:\n\n```cpp\n   #include <memory>\n   #include <iostream>\n\
          \n   void doSomething(int *ptr) {\n       *ptr = 0;\n   }\n\n   int main()\
          \ {\n       // Use a smart pointer that automatically manages lifetime\n\
          \       std::unique_ptr<int> n = std::make_unique<int>(100);\n       \n\
          \       // No pointer arithmetic; just pass the raw pointer if needed\n\
          \       doSomething(n.get());\n\n       // No use\u2011after\u2011free possible\
          \ \u2013 n goes out of scope automatically\n       std::cout << \"n = \"\
          \ << *n << std::endl;\n       \n       // Allocate and free the char buffer\
          \ safely\n       std::unique_ptr<char[]> ch = std::make_unique<char[]>(16);\n\
          \       // ... use ch ...\n   }\n   ```\n\n   *Benefits of this approach*\n\
          \   - No manual `new`/`delete` pair to mismanage.\n   - The pointer is guaranteed\
          \ to be valid for the whole lifetime of the object.\n   - `delete` is performed\
          \ automatically when the `unique_ptr` goes out of\nscope, eliminating leftover\
          \ `delete` calls that could become dangling.\n   - If more complex buffer\
          \ handling is required, `std::vector<int>` or\n`std::array<int, N>` can\
          \ replace the manual allocation.\n\n5. **Why the deeper fix matters**\n\
          \   Even if you kept the raw pointer for educational purposes, you would\
          \ still\nneed to enforce strict invariants:\n   - **No pointer arithmetic**\
          \ that moves the pointer away from the original\nallocation unless you also\
          \ store the original base address and later restore it.\n   - **Never delete\
          \ a pointer that has been altered** unless you have a\ncorresponding original\
          \ pointer to delete.\n   - **Never access a pointer after it has been deleted**.\n\
          \n   By adopting smart pointers and avoiding raw pointer manipulation, the\
          \ code\nbecomes self\u2011documenting and the runtime can enforce lifetimes\
          \ automatically,\npreventing both the \u201Cdeallocation of non\u2011allocated\
          \ memory\u201D and the subsequent\nuse\u2011after\u2011free errors.\n\n\
          ---\n\n##### Recommendation\n**Fix:** Remove the `n--;` line and the subsequent\
          \ `delete n;` (or replace the\nraw allocation with a proper container/smart\
          \ pointer). If you truly need to\nmanipulate the pointer value, store the\
          \ original address separately and restore\nit before deletion.\n\n**Additional\
          \ suggestions (if you prefer incremental debugging):**\n1. Insert a check\
          \ before the `delete`: `assert(n >= original_allocation_start &&\nn < original_allocation_end);`\
          \ to catch invalid deletes early.\n2. Replace `new`/`delete` with `std::unique_ptr`/`std::shared_ptr`\
          \ throughout\nthe project to make memory management explicit and exception\u2011\
          safe.\n3. Run the program under **AddressSanitizer** (`-fsanitize=address`)\
          \ to get a\nclear diagnostic of the out\u2011of\u2011bounds delete and any\
          \ subsequent use\u2011after\u2011free.\n\nThese steps will eliminate the\
          \ immediate crash and prevent related memory\u2011safety\nbugs in the future."
