          The backtrace shows that the exit() function was called from the exit_shell()
          function, which was called from the main() function. This suggests that the
          exit_shell() function is responsible for exiting the program with code 8.

          To identify the root cause, I'll check the exit_shell() function to see why it's
          exiting the program.



          The code around line 10 in src/exit_shell.c is:

          ```c
          // exit_shell.c
          10 void exit_shell() {
          11     exit(8);
          12     //... other code...
          }
          ```

          The exit_shell() function is exiting the program with code 8 because of the
          exit(8) statement. This suggests that the root cause of the bug is the incorrect
          exit code being returned.

          **Recommendation**

          To fix the bug, we need to change the exit code returned by the exit_shell()
          function. We can do this by changing the line `exit(8)` to `exit(0)`.

          Minimal local fix:

          ```c
          // exit_shell.c
          10 void exit_shell() {
          11     exit(0);  // Change the exit code to 0
          12     //... other code...
          }
          ```

          Thorough root-cause fix:

          ```c
          // exit_shell.c
          10 void exit_shell() {
          11     // Remove the exit statement altogether to let the program exit normally
          12     //... other code...
          }
          ```

          In the first fix, we're simply changing the exit code to 0 to fix the bug. In
          the second fix, we're removing the exit statement altogether to let the program
          exit normally, which is the expected behavior.
