          +  if (strlen(pattern) == 0) {
          +    return 0;  // Ignore empty patterns
          +  }
          +
            /*... */
          ```
          In the minimal local fix, we simply return an error if the pattern is empty. In
          the thorough root-cause fix, we simplify the pattern matching logic to handle
          empty patterns correctly.

          Both fixes should resolve the issue and produce the correct output.
