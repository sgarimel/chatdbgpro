          \ (`''`), leading to `glob()` or parsing failure,\nwhich triggers an error\
          \ path that increments `nb_errors`, causing `main()` to\nreturn `ret = 1`\
          \ even though no real bug exists.**\n\nBut is `nb_errors` reset between\
          \ tests?\n\nYes \u2014 `nb_errors` and `nb_leaks` are static, but they are\
