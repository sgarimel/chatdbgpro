          \nThis implies: **the `yaml_cpp` program itself tries to invoke `sed`**,\
          \ and fails\nbecause `sed` is not available (or not executable), and then\
          \ calls `exit(127)`.\n\nThis behavior is very suspicious. `exit(127)` is\
          \ reserved by the shell when a\ncommand is not found. The standard `system()`\
          \ calls return `127` when the\ncommand cannot be found. So if the program\
          \ calls `system(\"sed ...\")` and `sed`\nis not found, `system()` returns\
          \ 127, and if the program then calls `exit(127)`,\nit yields the failure.\n\
          \nNow, look at the stack trace:\n\n```\n0: exit()\n1: __libc_start_main()\n\
          2: ??\n```\n\nThat means the program executed `exit()` and returned control\
          \ to\n`__libc_start_main`, which then returned to the system. The key is\
          \ not that\n`exit()` is called \u2014 it's that **`exit(127)` is called**,\
