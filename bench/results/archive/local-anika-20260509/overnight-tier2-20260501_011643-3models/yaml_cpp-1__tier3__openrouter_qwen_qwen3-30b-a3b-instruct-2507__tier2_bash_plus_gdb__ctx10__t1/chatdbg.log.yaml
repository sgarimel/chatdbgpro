          So the program itself is responsible for calling `exit(127)`.\n\nNow, go\
          \ back to the code.\n\nLet\u2019s look for places where `system()` or `popen()`\
          \ are used, especially where\nthey might invoke `sed`.\n\nRun:\n\n"
