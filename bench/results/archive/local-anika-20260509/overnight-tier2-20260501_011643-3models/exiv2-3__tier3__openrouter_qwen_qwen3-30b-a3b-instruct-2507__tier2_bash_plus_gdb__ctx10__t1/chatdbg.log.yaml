          \nActually, from `tags_int.cpp`, we see:\n```cpp\nTagInfo(0x9286, \"UserComment\"\
          , N_(\"User Comment\"), ... xmpText, xmpInt...), printValue)\n```\n\nSo\
          \ `printValue` is the function pointer.\n\nWe must locate its definition.\n\
          \n```bash\ngrep -n \"printValue\" /work/src/exif.cpp\n```\n\n\u2192 returns\
          \ nothing? Then it's defined elsewhere.\n\nBut `exif.cpp` has `static void\
