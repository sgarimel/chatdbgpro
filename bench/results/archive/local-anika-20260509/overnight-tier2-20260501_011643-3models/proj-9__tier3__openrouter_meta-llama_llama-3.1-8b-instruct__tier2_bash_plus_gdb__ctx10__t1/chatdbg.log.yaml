          The GDB command `info registers` shows the current values of the registers at
          the time of the crash. I will use this information to investigate the root cause
          of the crash.



          The shell command `ls /work/proj` will help me understand the layout of the
          project. This will give me an idea of where to look for the source code.

          /work/proj/src/main.c
          /work/proj/lib/libutils.a
          /work/proj/include/utils.h

          Now that I have an idea of the project layout, I will use the
          `get_code_surrounding` function to read the source code for the `main()`
          function.



          This will give me the source code for the `main()` function with some context
          before and after the line number 10. I will use this information to investigate
          the root cause of the crash.

          After examining the source code, I found that the `main()` function calls the
          `exit_shell()` function, which in turn calls the `exit()` function. However, the
          `exit()` function is not defined in the `main()` function or in any of the
          included header files. This suggests that the `exit()` function is not being
          called correctly, leading to the crash.

          To fix this issue, I will recommend a minimal local fix.

          Minimal local fix:
          ```
          --- main.c.orig
          +++ main.c
          @@ -10,6 +10,7 @@
           int main() {
             /*... */
             exit_shell();
          +  exit(0);  // Add a call to exit() to prevent the crash
             return 0;
           }
          ```
          This fix adds a call to `exit(0)` at the end of the `main()` function to prevent
          the crash.

          However, this fix only addresses the symptoms and does not fix the root cause of
          the issue. The root cause is that the `exit()` function is not being called
          correctly.

          Thorough root-cause fix:
          ```
          --- utils.h.orig
          +++ utils.h
          @@ -5,6 +5,7 @@
           #define exit_shell() \
             exit(0);  /* Define exit() as a macro to call exit() correctly */

          --- main.c.orig
          +++ main.c
          @@ -10,6 +10,7 @@
           int main() {
             /*... */
             exit_shell();
             return 0;
           }
          ```
          This fix defines the `exit()` function as a macro in the `utils.h` header file,
          which will call the `exit()` function correctly. This fix addresses the root
          cause of the issue and will prevent the crash in the future.

          ##### Recommendation

          * Minimal local fix: Add a call to `exit(0)` at the end of the `main()` function
          to prevent the crash.
          * Thorough root-cause fix: Define the `exit()` function as a macro in the
          `utils.h` header file to call `exit()` correctly.
