                parser parser(R"(
                    # Rules
                    ROOT         <-  ITEM (',' ITEM)*
                    ITEM         <-  WORD / PHRASE

                    # Tokens
                    WORD         <-  < [a-zA-Z0-9_]+ >
                    PHRASE       <-  < '"' (!'"' .)* '"' >

                    %whitespace  <-  [ \t\r\n]*
                )");

