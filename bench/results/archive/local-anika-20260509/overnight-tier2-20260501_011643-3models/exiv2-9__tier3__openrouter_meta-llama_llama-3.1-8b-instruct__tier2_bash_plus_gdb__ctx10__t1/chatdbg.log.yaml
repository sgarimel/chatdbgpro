          --- a/tiff.cpp
          +++ b/tiff.cpp
          @@ -117,7 +117,7 @@
              if (numTags < 0) {
                numTags = 0;
              } else {
                return numTags;
              }
          ```
          The minimal local fix adds a condition to check if `numTags` is greater than or
          equal to 0 before returning it. The root-cause fix simply removes the
          unnecessary condition and returns `numTags` only if it is non-negative.

          ##### Recommendation

