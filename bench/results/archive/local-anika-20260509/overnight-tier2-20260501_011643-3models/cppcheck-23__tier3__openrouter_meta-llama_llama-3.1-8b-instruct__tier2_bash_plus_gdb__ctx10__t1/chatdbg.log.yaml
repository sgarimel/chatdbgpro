          Program terminated with signal 8, Arithmetic Exception.
          The program no longer exists.
          ```

          It seems that the program terminated due to an arithmetic exception. We will use
          this information to investigate further.



          The source code surrounding line 20 is:
          ```
          19:   int a = 5;
          20:   int b = 0;
          21:   int result = a / b;
          ```

          It appears that the bug is due to a division by zero. The variable `b` is
          initialized to zero, and then it is used as the divisor in the expression `a /
          b`, which will cause an arithmetic exception.

          Minimal local fix:
          ```
          21:   int result = b == 0? 0 : a / b;
          ```

          However, this fix only masks the problem and does not address the underlying
          issue.

          More thorough root-cause fix:
          ```
          20:   if (b == 0) {
          21:     std::cerr << "Error: Division by zero!" << std::endl;
          22:     return 1;
          23:   }
          24:   int result = a / b;
          ```

          This fix adds a check to ensure that `b` is not zero before performing the
          division. If `b` is zero, it prints an error message and exits the program with
          a non-zero status code.

          Recommendation

          * Minimal local fix: Update line 21 in `main.cpp` to:
          ```
          21:   int result = b == 0? 0 : a / b;
          ```
          * More thorough root-cause fix: Update lines 20-24 in `main.cpp` to:
