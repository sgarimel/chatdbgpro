          The code for the `main()` function is:

          ```cpp
          int main() {
            //...
            bash "exit";
            return 8;
          }
          ```

          This code directly calls the `exit()` function with the argument 8, which is the
          reason why the program exits with code 8.

          To fix this issue, we can remove the `bash "exit"` call, as it is not necessary.
          The corrected code would be:

          ```cpp
          int main() {
            //...
            return 0;
          }
          ```

          This fix will ensure that the program exits with code 0, as expected.

          However, if we want to understand the root cause of this issue, we can
          investigate further.

          Let's try to execute the `bash` command that was originally called, and see what
