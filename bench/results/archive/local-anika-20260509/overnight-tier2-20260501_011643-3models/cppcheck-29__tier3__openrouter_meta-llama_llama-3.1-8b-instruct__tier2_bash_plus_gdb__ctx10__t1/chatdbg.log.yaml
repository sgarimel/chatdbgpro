          The root cause of the failure appears to be the program intentionally exiting
          with a non-zero status code (8) due to the presence of the `failure` variable.
          This is evident from the stack trace, where the `exit` function is called from
          `main`, and the `main` function itself is called from `exit_shell`.

          Upon reviewing the code surrounding line 100 of `main.cpp` using
          `get_code_surrounding`, we see that the `exit` function is called with an
          argument of 8 if the `failure` variable is true. The `failure` variable is not
          explicitly set anywhere in the provided code snippet, but it is likely being set
          to true somewhere earlier in the program.

          The minimal local fix would be to remove the `exit(8)` call and handle the
          `failure` variable in a different way, such as by returning an error code or
          throwing an exception.

          The more thorough root-cause fix would involve identifying where the `failure`
          variable is being set to true and addressing the underlying issue. This may
          involve adding additional checks or handling to prevent the program from exiting
          prematurely.

          ##### Recommendation

          Minimal local fix:
          ```diff
          --- main.cpp
          +++ main.cpp
          @@ -36,7 +36,7 @@
             if (failure) {
          -    exit(8);
          +    // Handle failure in a different way
          +    std::cerr << "Failure occurred" << std::endl;
               return 1;
             }
          ```

          Root-cause fix:
          * Identify where the `failure` variable is being set to true and address the
          underlying issue.
          * Add additional checks or handling to prevent the program from exiting
          prematurely.

