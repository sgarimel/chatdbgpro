              //...
          }
          ```

          However, a more thorough root-cause fix would be to refactor the parsing logic
          to avoid repeated calls to `parse_exif_data()`. This could involve reorganizing
          the code to use a more efficient parsing algorithm or to avoid unnecessary
          parsing when the input buffer is empty.

          A more thorough root-cause fix could involve the following changes:

