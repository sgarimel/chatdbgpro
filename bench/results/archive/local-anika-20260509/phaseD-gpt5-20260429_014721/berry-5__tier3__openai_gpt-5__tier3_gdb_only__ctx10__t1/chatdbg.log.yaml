          \ a standard phrase in CLI help messages.\n   - The actual output contains\
          \ \u201CAvilable options are:\u201D.\n   - The program exits with code 0\
          \ (res remains 0), so there\u2019s no crash, but the\ntest fails because\
          \ the printed text is incorrect.\n\nWhy each contributing variable has its\
          \ value\n- argv contains \"-h\": supplied by the test to trigger help.\n\
          - opt.pattern = \"vhilec?o?\": hardcoded to permit -h, among others.\n-\
          \ args has arg_h set: because arg_getopt matched 'h' against the pattern\
          \ and\nreturned 'h', parse_arg ORs arg_h into args.\n- help_information:\
          \ a compile-time constant macro with the misspelled string\nliteral \u201C\
          Avilable options are:\u201D. This is the root cause of the mismatch.\n\n\
          Root cause\nA typographical error in the static CLI help text:\n- In default/berry.c,\
          \ macro help_information contains \u201CAvilable options are:\u201D\ninstead\
          \ of \u201CAvailable options are:\u201D.\n- This user-visible string is\
          \ emitted when -h is passed, causing the test to\nfail due to output mismatch.\n\
          \nProposed fixes\n\nMinimal local fix (directly correct the typo)\n- In\
          \ default/berry.c, change the misspelled line in help_information:\n  -\
