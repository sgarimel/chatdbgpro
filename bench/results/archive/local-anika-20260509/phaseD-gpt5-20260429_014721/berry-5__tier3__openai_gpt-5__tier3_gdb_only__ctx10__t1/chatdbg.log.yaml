          \     - res = analysis_args(vm, argc, argv);\n     - be_vm_delete(vm);\n\
          \     - return res;\n\n   Variables and values:\n   - argc/argv: The test\
          \ harness likely invokes the program with -h (help) to\nassert on help text.\
          \ For example: ./berry -h\n   - vm: a valid Berry VM pointer (not directly\
          \ relevant to output mismatch).\n\n2) analysis_args in default/berry.c:\n\
          \   - Sets up the option parser:\n     - int args = 0;\n     - struct arg_opts\
          \ opt = { 0 };\n     - opt.pattern = \"vhilec?o?\";  // Valid options: v,\
          \ h, i, l, e, c? (optional\narg), o? (optional arg)\n   - args = parse_arg(&opt,\
          \ argc, argv);\n     - parse_arg consumes -h and sets the arg_h flag in\
          \ args.\n\n   Variables and values:\n   - opt.pattern is \"vhilec?o?\",\
          \ so 'h' is a recognized option.\n   - parse_arg sets args |= arg_h when\
          \ it sees -h. opt.idx is advanced past the\noption.\n\n3) analysis_args\
          \ continues:\n   - if (args & arg_err) { ... }  // not taken\n   - if (args\
          \ & arg_v) { ... }    // not taken unless -v given\n   - if (args & arg_h)\
          \ { be_writestring(help_information); }\n     - Because -h is set, it prints\
          \ the static macro help_information.\n\n   Critical variable:\n   - help_information\
          \ (macro) is defined at default/berry.c lines 60\u201371:\n     - It contains\
