          \ \"%\", 1);\n    concat2(vm);\n    format = p + 1;\n    continue;\n}\n\
          ```\n\nSo the relevant block becomes:\n\n```c\np = get_mode(p + 1, mode);\n\
          buf[0] = '\\0';\n\nif (*p == '%') {\n    pushstr(vm, \"%\", 1);\n    concat2(vm);\n\
