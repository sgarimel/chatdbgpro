            /* Apply binary operator `op` to e1 and e2, result in e1 */
            void be_code_binop(bfuncinfo *finfo, int op, bexpdesc *e1, bexpdesc *e2, int dst)
            {
                switch (op) {
                case OptAnd:
                    var2anyreg(finfo, e2);
                    be_code_conjump(finfo, &e2->f, e1->f);
                    *e1 = *e2;
                    break;
                case OptOr:
                    var2anyreg(finfo, e2);
                    be_code_conjump(finfo, &e2->t, e1->t);
                    *e1 = *e2;
                    break;
