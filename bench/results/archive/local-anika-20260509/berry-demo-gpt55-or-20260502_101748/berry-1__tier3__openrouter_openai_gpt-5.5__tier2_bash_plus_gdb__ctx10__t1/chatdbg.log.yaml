                varname, func(m_varname), BE_DEBUG_VAR_INFO
                upvname, func(m_upvname), BE_DEBUG_VAR_INFO
            }
            @const_object_info_end */
            #include "../generate/be_fixed_debug.h"
            #endif

            #endif /* BE_USE_DEBUG_MODULE */
            [exit=1]
          type: text
