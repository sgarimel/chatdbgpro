      - output: "**Walking through the state that leads to the `exit()` call**\n\n\
          1. **Program start** \u2013 The test harness launches the built\u2011in\
          \ `test\u2011main`\nbinary.\n2. **Parsing phase** \u2013 The PEG library\
          \ parses the supplied source and attempts\nto build an abstract syntax tree\
          \ (AST).\n   *A key intermediate variable* in this phase is **`ast_root`**,\
          \ a pointer that\nshould hold the root node of the newly built AST.\n3.\
          \ **Memory\u2011related bug** \u2013 Earlier in the parse, a rule mis\u2011\
          matches and writes\npast the end of a small buffer that holds the node\u2019\
          s children. This overflow\ncorrupts the heap metadata *and* overwrites the\
          \ local variable\n**`node_alloc_status`** (a flag that the parser uses to\
          \ indicate\nsuccess/failure).\n4. **Incorrect success flag** \u2013 Because\
          \ `node_alloc_status` is corrupted, the\nsubsequent test\n```cpp\n   if\
          \ (!ast_root) {\n       // error handling\n       exit(0);          // \u2190\
          \ unintentionally called with success code\n   }\n   ```\n   incorrectly\
          \ believes that the parse succeeded (`ast_root` is non\u2011null), so it\n\
          skips the intended error path.\n5. **Early termination** \u2013 The code\
          \ reaches the `exit(0);` call. Since the\nvariable that would normally be\
          \ set to a non\u2011zero error code (`error_code`) was\nleft at its default\
          \ (`0`), the program terminates cleanly with exit status\u202F0.\n6. **Test\
          \ harness expectation** \u2013 The harness (`test\u2011main`) treats any\
          \ non\u2011zero\nexit status as a signal that the test caught a bug. Because\
          \ the program exited\nwith `0`, the harness reports *failure* of the \u201C\
          Custom\u202FAST\u202Ftestr\u201D, even though\nno crash occurred.\n\n**Why\
          \ the variable has that value**\n\n- **`ast_root`** ends up `nullptr` because\
          \ the underlying allocation failed due\nto the buffer overflow.\n- **`node_alloc_status`**\
          \ (or equivalently a Boolean flag used to signal\nsuccess) is set to `true`\
          \ incorrectly because the overflow corrupted its\nstorage.\n- **`error_code`\
          \ / exit code** is initialized to `0` and never updated on the\nerror path,\
          \ so the `exit(0);` call emits a *success* status instead of an error\n\
          code.\n\n**Minimal local fix**\n\nChange the error path to communicate the\
          \ failure properly instead of calling\n`exit(0)`. For example, replace:\n\
          \n```cpp\nif (!ast_root) {\n    // buggy: exit(0) hides the error\n    exit(0);\n\
          }\n```\n\nwith:\n\n```cpp\nif (!ast_root) {\n    std::cerr << \"AST construction\
          \ failed \u2013 memory error detected.\\n\";\n    // Propagate a non\u2011\
          zero error to the harness\n    return 1;               // if this function\
          \ returns int\n    // or\n    throw std::runtime_error(\"AST construction\
          \ failed\");\n}\n```\n\nIf the `exit(0)` occurs inside `main`, change it\
          \ to:\n\n```cpp\nif (!ast_root) {\n    std::cerr << \"AST construction failed\
          \ \u2013 memory error detected.\\n\";\n    return 1;   // propagate failure\
          \ to the test runner\n}\n```\n\n**More thorough root\u2011cause fix**\n\n\
          The underlying issue is the unsafe manual memory handling in the PEG node\n\
          allocator. The robust fix involves:\n\n1. **Eliminate raw pointers** \u2013\
          \ Replace raw node allocations with\n`std::unique_ptr` or a custom smart\u2011\
          pointer class that automatically updates the\nreference count and cleans\
          \ up on failure.\n2. **Validate all allocations** \u2013 After each allocation,\
          \ check the result before\nusing the pointer; if allocation fails, propagate\
          \ an error code or exception\ninstead of continuing.\n3. **Bounds\u2011\
          check the rule actions** \u2013 Guard the buffer\u2011write that produced\
          \ the\noverflow with a runtime check (e.g., `if (offset >= buffer.size())\
          \ return\nError::OutOfBounds;`).\n4. **Use RAII for cleanup** \u2013 Ensure\
          \ that any partially\u2011constructed AST nodes\nare destroyed cleanly if\
          \ an error occurs mid\u2011parse.\n5. **Propagate error codes** \u2013 All\
          \ parsing functions should return a\n`bool`/`ErrorCode` that is propagated\
          \ up until a non\u2011zero error is detected, at\nwhich point the program\
          \ can exit with a non\u2011zero status or throw.\n6. **Add assertions /\
          \ sanitizers** \u2013 Compile with `-fsanitize=address,undefined`\nin debug\
          \ builds to catch the buffer overflow before it reaches the exit path.\n\
          \n**#### Recommendation**\n\nApply the minimal local fix shown above to\
          \ change the erroneous `exit(0)` to a\nproper non\u2011zero exit status\
          \ (or exception). For a long\u2011term solution, refactor\nthe AST builder\
          \ to use modern C++ memory\u2011management idioms and add proper\nerror\u2011\
          propagation throughout the parser, thereby preventing corrupted\ncontrol\u2011\
          flow flags from silently causing an early `exit()` with the wrong\nstatus.\n\
          \n```cpp\n// Example patch (minimal)\n- if (!ast_root) {\n-     exit(0);\
          \   // \u274C hides the bug\n- }\n+ if (!ast_root) {\n+     std::cerr <<\
          \ \"AST construction failed \u2013 memory error detected.\\n\";\n+     return\
          \ 1;   // \u2705 correctly signals failure to the test harness\n+ }\n```"
