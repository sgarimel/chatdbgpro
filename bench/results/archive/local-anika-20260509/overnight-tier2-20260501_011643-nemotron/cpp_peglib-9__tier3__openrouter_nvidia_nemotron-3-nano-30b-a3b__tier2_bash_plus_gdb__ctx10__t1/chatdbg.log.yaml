            #ifndef _CPPPEGLIB_PEGLIB_H_
            #define _CPPPEGLIB_PEGLIB_H_

            #include <algorithm>
            #include <cassert>
            #include <cstring>
            #include <functional>
            #include <initializer_list>
            #include <iostream>
            #include <limits>
            #include <map>
            #include <memory>
            #include <mutex>
            #include <set>
            #include <string>
            #include <unordered_map>
            #include <vector>

            namespace peg {

            extern void* enabler;

            /*-----------------------------------------------------------------------------
             *  any
             *---------------------------------------------------------------------------*/

            class any
            {
            public:
                any() : content_(nullptr) {}

                any(const any& rhs) : content_(rhs.clone()) {}

                any(any&& rhs) : content_(rhs.content_) {
                    rhs.content_ = nullptr;
                }

                template <typename T>
                any(const T& value) : content_(new holder<T>(value)) {}

                any& operator=(const any& rhs) {
                    if (this != &rhs) {
                        if (content_) {
                            delete content_;
                        }
                        content_ = rhs.clone();
                    }
                    return *this;
                }

                any& operator=(any&& rhs) {
                    if (this != &rhs) {
                        if (content_) {
                            delete content_;
                        }
                        content_ = rhs.content_;
                        rhs.content_ = nullptr;
                    }
                    return *this;
                }

                ~any() {
                    delete content_;
                }

                bool is_undefined() const {
                    return content_ == nullptr;
                }

                template <
                    typename T,
                    typename std::enable_if<!std::is_same<T, any>::value>::type*& = enabler
                >
                T& get() {
                    if (!content_) {
                        throw std::bad_cast();
                    }
                    auto p = dynamic_cast<holder<T>*>(content_);
                    assert(p);
                    if (!p) {
                        throw std::bad_cast();
                    }
                    return p->value_;
                }

                template <
                    typename T,
                    typename std::enable_if<std::is_same<T, any>::value>::type*& = enabler
                >
                T& get() {
                    return *this;
                }
