      - output: "**Root\u2011cause analysis**\n\n1. **What the test actually does**\n\
          \   The test file `tests/string.be` contains the following assertion that\
          \ is\nexecuted by the Berry REPL:\n\n```be\n   assert(s.format(\"%i%%%i\"\
