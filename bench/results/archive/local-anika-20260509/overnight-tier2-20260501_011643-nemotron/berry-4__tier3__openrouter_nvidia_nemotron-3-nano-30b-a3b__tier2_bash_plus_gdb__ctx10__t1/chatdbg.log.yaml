          \ conversion specifiers (`%i` and\n`%i`).\n   * Only **one** value (`12`)\
          \ is supplied in the call to `format`.\n\n2. **What the VM does when the\
          \ call is made**\n\n   * `str_format()` is called with `top == 1` (only\
          \ the format string is on the\nstack).\n   * The argument\u2011checking\
          \ code sees that `index == 2` (the second placeholder)\nis **greater** than\
          \ `top`.\n   * It raises a *runtime_error* with the message *\u201Cbad argument\
          \ #2 to 'format':\nno value\u201D*.\n   * The VM catches this exception\
          \ and terminates the interpreter by calling\n`exit(0)`.\n   * Because the\
          \ interpreter exits cleanly, the test harness records an\n**exit\u2011code\u2011\
          0** run.\n\n   The test harness, however, expects the run to *pass* only\
          \ when **no exception\nis raised**.\n   Consequently the test is marked\
          \ as a failure \u2013 the program exits\nsuccessfully, but it did **not**\
          \ produce the expected successful output.\n\n3. **Why this appears as a\
          \ \u201Ccrash\u201D in the bug\u2011scpp report**\n\n   * From the point\
          \ of view of the test harness the interpreter \u201Ccrashed\u201D in the\n\
          sense that it terminated unexpectedly (i.e. without returning a success\
          \ status\nthat the harness could interpret as a correct result).\n   * In\
          \ reality the termination is *intentional*: the VM aborts the current run\n\
          when it detects a runtime error.\n   * Since the abort is graceful (`exit(0)`),\
          \ the framework classifies it as a\n\u201Ccrash\u2011like\u201D situation\
          \ rather than a normal successful termination.\n\n4. **Where the bug lies**\n\
          \n   * The **defect** is **not** in the low\u2011level exit path (`exit()`\
          \ /\n`__libc_start_main`), but in the **scripted call to `format`** that\
          \ supplies\ninsufficient arguments.\n   * If we look at the C implementation\
          \ of `format` (`be_strlib.c`) the\nargument\u2011validation logic exists,\
          \ but it merely prints the error message; the VM\nstill terminates with\
          \ exit\u2011code\u202F0, which is the behaviour that the test harness\n\
          observes.\n\n5. **What must be fixed**\n\n   There are two ways to make\
          \ the test behave as it is supposed to:\n\n   * **Minimal local fix (test\u2011\
          level)** \u2013 supply the missing argument in the\ntest script.\n   * **More\
          \ thorough root\u2011cause fix (VM\u2011level)** \u2013 make the `format`\
          \ function\nabort the VM with a non\u2011zero exit status when the argument\
          \ count is\ninsufficient, and/or robustly handle empty\u2011pattern searches\
          \ that can lead to\ninfinite loops.\n\n---\n\n### 1. Minimal local fix (script\
          \ level)\n\nEdit `/work/tests/string.be` and change the offending line to\
          \ supply **both**\nrequired arguments:\n\n```diff\n- assert(s.format(\"\
