          \ ultimately invokes\nthe C library `exit()` uses the expression\n\n```c\n\
          \   exit((shell_exiting || exit_pending) ? exit_val : lastval);\n   ```\n\
          \n   When the shell is *not* already exiting and there is no pending explicit\
          \ exit\n(`shell_exiting == 0 && exit_pending == 0`), the fallback is `lastval`.\
          \ Because\n`lastval` can be any leftover status (in this case\u202F2), the\
          \ shell terminates with\nan arbitrary exit code, not with the intended default\
          \ of\u202F0.\n\n4. **Program state at the point of failure**\n\n   * `locallevel`\u202F\
