          \ a previous command (often a\nbackground job or a prior failure) finishes\
          \ with status\u202F2. That value remains in\n`lastval` when `exit` is invoked\
          \ without arguments. Consequently the shell\nfinally calls `exit(2)`, which\
          \ propagates to the `exit()` system call that the\nstack trace shows (frame\u202F\
