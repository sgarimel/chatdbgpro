          \ (2). That value is copied into `exit_val` and finally passed to\n`exit()`,\
          \ producing the observed exit code\u202F2.\n\n   In short: **the `exit`\
          \ builtin forwards an uninitialised \u201Cargument\u201D (`num`)\nthat may\
          \ contain a stale status value, and `realexit()` later chooses that stale\n\
