          \   if (*argv) {               /* an argument was supplied */\n       num\
          \ = mathevali(*argv++);\n       nump = 1;\n   }\n   ```\n\n   If no argument\
          \ is given, the block is skipped, `nump` stays\u202F0 and **`num`\nkeeps\
          \ the value of `lastval`**, i.e. the exit status of the previously\u2011\
