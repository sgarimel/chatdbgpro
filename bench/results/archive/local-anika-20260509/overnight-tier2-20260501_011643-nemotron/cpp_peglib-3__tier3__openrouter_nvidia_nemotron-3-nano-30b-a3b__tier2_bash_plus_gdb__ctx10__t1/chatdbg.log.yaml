            #include <peglib.h>

            using namespace peg;

            #ifdef DPP_ENABLE_GCOV
            #include <signal.h>
            void dpp_sighandler(int signum);
            static struct sigaction dpp_gcov_sigaction;
            extern "C" void __gcov_flush();
            void dpp_gcov_flush(int signum) {
               __gcov_flush();
               exit(1);
            }
            void dpp_gcov_handler(void(*dpp_gcov_flush)(int sig)) {
                dpp_gcov_sigaction.sa_handler = dpp_gcov_flush;
                for (int sig = 1; sig <= SIGRTMAX; ++sig) {
                    sigaction(sig, &dpp_gcov_sigaction, NULL);
                }
            }
            #endif

            #if !defined(PEGLIB_NO_UNICODE_CHARS)
            TEST_CASE("Simple syntax test (with unicode)", "[general]")
            {
                parser parser(
                    u8" ROOT  _ "
                    " _ <- ' ' "
                );

                bool ret = parser;
                REQUIRE(ret == true);
            }
            #endif

            TEST_CASE("Simple syntax test", "[general]")
            {
                parser parser(R"(
                    ROOT <- _
                    _ <- ' '
                )");

                bool ret = parser;
                REQUIRE(ret == true);
            }

            TEST_CASE("Empty syntax test", "[general]")
            {
                parser parser("");
                bool ret = parser;
                REQUIRE(ret == false);
            }

            TEST_CASE("Backslash escape sequence test", "[general]")
            {
                parser parser(R"(
                    ROOT <- _
                    _ <- '\\'
                )");

                bool ret = parser;
                REQUIRE(ret == true);
            }

            TEST_CASE("Invalid escape sequence test", "[general]")
            {
                parser parser(R"(
                    ROOT <- _
                    _ <- '\'
                )");

                bool ret = parser;
                REQUIRE(ret == false);
            }

            TEST_CASE("Action taking non const Semantic Values parameter", "[general]")
            {
                parser parser(R"(
                    ROOT <- TEXT
                    TEXT <- [a-zA-Z]+
                )");

                parser["ROOT"] = [&](SemanticValues& sv) {
                    auto s = any_cast<std::string>(sv[0]);
                    s[0] = 'H'; // mutate
                    return std::string(std::move(s)); // move
                };

                parser["TEXT"] = [&](SemanticValues& sv) {
                    return sv.token();
                };

                std::string val;
                auto ret = parser.parse("hello", val);
                REQUIRE(ret == true);
                REQUIRE(val == "Hello");
            }

            TEST_CASE("String capture test", "[general]")
            {
                parser parser(R"(
                    ROOT      <-  _ ('[' TAG_NAME ']' _)*
                    TAG_NAME  <-  (!']' .)+
                    _         <-  [ \t]*
                )");

                std::vector<std::string> tags;

                parser["TAG_NAME"] = [&](const SemanticValues& sv) {
                    tags.push_back(sv.str());
                };

                auto ret = parser.parse(" [tag1] [tag:2] [tag-3] ");

                REQUIRE(ret == true);
                REQUIRE(tags.size() == 3);
                REQUIRE(tags[0] == "tag1");
                REQUIRE(tags[1] == "tag:2");
                REQUIRE(tags[2] == "tag-3");
            }

            using namespace peg;

            TEST_CASE("String capture test2", "[general]")
            {
                std::vector<std::string> tags;

                Definition ROOT, TAG, TAG_NAME, WS;
                ROOT     <= seq(WS, zom(TAG));
                TAG      <= seq(chr('['), TAG_NAME, chr(']'), WS);
                TAG_NAME <= oom(seq(npd(chr(']')), dot())), [&](const SemanticValues& sv) { tags.push_back(sv.str()); };
                WS       <= zom(cls(" \t"));

                auto r = ROOT.parse(" [tag1] [tag:2] [tag-3] ");

                REQUIRE(r.ret == true);
                REQUIRE(tags.size() == 3);
                REQUIRE(tags[0] == "tag1");
                REQUIRE(tags[1] == "tag:2");
                REQUIRE(tags[2] == "tag-3");
            }

            TEST_CASE("String capture test3", "[general]")
            {
                parser pg(R"(
                    ROOT  <- _ TOKEN*
                    TOKEN <- '[' < (!']' .)+ > ']' _
                    _     <- [ \t\r\n]*
                )");


                std::vector<std::string> tags;

                pg["TOKEN"] = [&](const SemanticValues& sv) {
                    tags.push_back(sv.token());
                };

                auto ret = pg.parse(" [tag1] [tag:2] [tag-3] ");

                REQUIRE(ret == true);
                REQUIRE(tags.size() == 3);
                REQUIRE(tags[0] == "tag1");
                REQUIRE(tags[1] == "tag:2");
                REQUIRE(tags[2] == "tag-3");
            }

            TEST_CASE("Cyclic grammer test", "[general]")
            {
                Definition PARENT;
                Definition CHILD;

                PARENT <= seq(CHILD);
                CHILD  <= seq(PARENT);
            }

            TEST_CASE("Visit test", "[general]")
