          \    case 8:\n```\n\nFurther inspection of that file shows a `switch` statement\
          \ where `case 8` is\nfollowed only by statements and **no `break`**. In\
          \ C/C++ falling through cases\nis allowed only when it is intentional and\
          \ clearly documented; otherwise it can\nlead to unintended execution of\
          \ later cases and eventually to error paths that\nterminate the program\
          \ with a specific exit code.\n\nIn the Misra test case the fall\u2011through\
          \ from `case 8` leads into the next case\n(`case 9`), causing the test to\
          \ exercise an error path that the test harness\ninterprets as a failure,\
          \ resulting in an explicit `exit(8)` being called to\nsignal \u201Ctest\
          \ failed\u201D.\n\nThus the immediate defect is the missing `break` (or\
          \ an explicit `return`/`goto`\nthat makes the fall\u2011through intentional)\
          \ at the end of `case 8`. This causes\nundefined flow, leading to the unexpected\
          \ exit.\n\n---\n\n### Minimal fix\nAdd an explicit `break;` (or `return`/`/*\
          \ fallthrough */` comment) after the\nstatements in `case 8` so that execution\
          \ does not continue unintentionally.\n\n#### File: `/work/addons/test/misra/misra-test.c`\n\
