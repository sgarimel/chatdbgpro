          \ missing break\n```\n\nor, if the intent is to continue into the next case,\
          \ comment it explicitly:\n\n```cpp\n     case 8:\n         a = 4;\n    \
          \     /* fall through */\n         case 9: \u2026   // ensure this is intentional\n\
          ```\n\n### More thorough root\u2011cause fix\nIf the test case is meant\
          \ to handle all switch values without falling into the\nnext case, replace\
          \ the fall\u2011through with a proper `return` or move the shared\nlogic\
          \ into a separate helper function. This removes any possibility of\nunintended\
          \ control flow and guarantees that the function reaches its normal end,\n\
          eliminating the spurious `exit(8)`.\n\n```cpp\n     case 8:\n         a\
          \ = 4;\n         return;   // or appropriate final action\n```\n\nBoth fixes\
          \ ensure the program does not terminate with exit code\u202F8 under the\
          \ test\ninput that exercises `case 8`. They restore the expected execution\
          \ flow and let\nthe test pass."
