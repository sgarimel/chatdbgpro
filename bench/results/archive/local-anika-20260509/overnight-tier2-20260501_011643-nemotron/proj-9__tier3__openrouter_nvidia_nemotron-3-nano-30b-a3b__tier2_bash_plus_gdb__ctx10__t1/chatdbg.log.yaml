                            if (!arg[1] || arg[1] == 'p' || arg[1] == 'P') {
                                /* list projections */
                                const struct PJ_LIST *lp;
                                int do_long = arg[1] == 'P', c;
                                const char *str;

                                for (lp = proj_list_operations() ; lp->id ; ++lp) {
