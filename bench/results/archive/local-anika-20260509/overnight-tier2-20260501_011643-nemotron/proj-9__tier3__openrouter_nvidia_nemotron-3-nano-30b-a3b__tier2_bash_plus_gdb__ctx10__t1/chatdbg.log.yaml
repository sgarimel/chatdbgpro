      - output: "**Root\u2011cause analysis**\n\nThe only binary that matches the\
          \ stack trace \u2013 `proj` \u2013 is built from\n**`/work/src/apps/proj.cpp`**.\n\
          In its `main()` function (line\u202F291) the program contains the following\
          \ fragment:\n\n```c\nif (argc <= 1 ) {\n    (void)fprintf(stderr, usage,\
          \ pj_get_release(), emess_dat.Prog_name);\n    exit (0);               \
          \   // <-- 1\uFE0F\u20E3 early exit\n}\n```\n\nWhen the test driver invokes\
          \ the program with **no command\u2011line arguments**,\nthis block is executed:\n\
          \n1. `argc` is 1 \u2192 the condition `argc <= 1` is true.\n2. The usage\
          \ message is printed to `stderr`.\n3. `exit(0)` is called, terminating the\
          \ process **before** any of the\noption\u2011parsing or projection logic\
          \ runs.\n\nThe test suite that surrounds the program (the `exit_shell()`\
          \ wrapper used by\nthe `bugscpp` tests) expects the program to **continue\
          \ execution, consume input\nfrom `stdin` and ultimately produce the correct\
          \ projection result**. By exiting\nimmediately the program:\n\n* Returns\
          \ exit status **0**, which the oracle interprets as \u201Csuccessful\u201D\
          , but\nthe test oracle was written to treat *any* early termination without\
          \ processing\nas a failure.\n* Prevents later code that depends on the global\
          \ `PJ *Proj;` state from being\ninitialised (the normal path would initialise\
          \ `Proj` and then perform a\nprojection).\n* Causes the test to think the\
