                blist *list = cast_list(gco);
                if (list) {
                    size_t size = datasize(original->capacity);
                    list->count = original->count;
                    list->capacity = original->capacity;
                    var_setlist(vm->top, list);
                    be_incrtop(vm);
                    list->data = be_malloc(vm, size);
                    be_stackpop(vm, 1);
