          \ a call to\n`exit_shell()`.\n   - Frame\u202F0 \u2192 `exit()` \u2013 termination\
          \ point.\n   - Frame\u202F1 \u2192 `exit_shell()` \u2013 a helper that ultimately\
          \ performs the `exit`.\n   - Frame\u202F2 \u2192 `main()` \u2013 the entry\
          \ point that invoked `exit_shell()`\nincorrectly.\n\n2. **What `exit_shell()`\
          \ does**\n   `exit_shell()` is a support routine used by the test harness\
          \ to invoke an\nexternal *shell* (e.g. to run a script or a subshell for\
