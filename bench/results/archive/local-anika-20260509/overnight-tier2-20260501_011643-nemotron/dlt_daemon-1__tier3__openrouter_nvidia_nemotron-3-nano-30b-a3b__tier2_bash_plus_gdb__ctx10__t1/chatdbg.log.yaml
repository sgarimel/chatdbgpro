          Now it prints usage and says "Invalid argument for option -c." This suggests the
          command line is wrong: options -c and -f are having unexpected arguments.

          Original command line:
          ```
          ./install/bin/dlt-receive -c LD_LIBRARY_PATH=/home/workspace/install/lib\ install/bin/dlt-receive\ -f\ .dpp/poc.txt\ localhost
          ```

          The backslashes likely escaped incorrectly; they cause parsing issues. It seems
          that -c expects an argument (limit) but got LD_LIBRARY_PATH=... due to misuse.
          Actually -c expects a limit value, not a library path. So the syntax is wrong.

          But the original error is a crash due to memory error. They want root cause.
          Perhaps the original crash arises from use-after-free in reading filter file? Or
          maybe from overreading buffer while parsing filter file. Let's examine the
          filter parsing code.

          In dlt_filter_load, it opens file, then while (!feof(handle)) reads integers
          using fscanf("%s", str1). But there is no limit on length; but it reads "str1"
          and then does strcmp(str1, "----") to detect end-of-file marker. It prints "
          %s", str1; but does not check for buffer overflow or malformed input. If the
          filter file contains extremely long lines, could overflow str1 (size
          DLT_COMMON_BUFFER_LENGTH). That might cause memory corruption.

          But the immediate crash might be happening earlier, perhaps reading beyond
          bounds in fscanf leading to undefined behavior causing segmentation fault.

          Alternatively, maybe the crash occurs when using -c option incorrectly causing
          out-of-bounds memory access in processing of file size limit.

          Let's check usage of -c. Option -c expects a limit as string; they parse it
