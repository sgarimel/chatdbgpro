          \ `-1`). In `main()`, check the\nreturned status and invoke `exit(EXIT_FAILURE)`\
          \ if it indicates an error. Also\nadd a proper `#include <stdlib.h>` for\
          \ `EXIT_FAILURE`. | - Eliminates the direct\nuse of `exit()` inside the\
          \ library function, making the code more testable and\nreusable.<br>- Centralises\
          \ exit handling in `main()`, ensuring a single,\nconsistent exit path.<br>-\
          \ Guarantees that all error paths propagate a non\u2011zero\nstatus to the\
          \ test harness, preventing false\u2011positive \u201Csuccess\u201D reports.\
          \ |\n\n### Implementation of the minimal fix\n\n```cpp\n// /work/src/apps/cs2cs.cpp\
