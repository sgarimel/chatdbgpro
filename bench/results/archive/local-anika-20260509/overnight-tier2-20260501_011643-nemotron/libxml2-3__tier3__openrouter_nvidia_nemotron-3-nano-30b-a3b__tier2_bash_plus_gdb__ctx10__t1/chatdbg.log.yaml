      - output: "**Root\u2011cause analysis**\n\nThe stack trace shows that the process\
          \ terminates by calling `exit(1)`.\nThat means some code path in the library\
          \ decided that the only sensible\nbehaviour was to abort the program with\
          \ a non\u2011zero status.  Because no\nsignal or assertion is shown, the\
          \ abort is not caused by a hardware\nexception; it is explicitly triggered\
          \ by a call to `exit()` (or a macro\nthat expands to it) inside the library.\n\
          \nThe only way to locate the exact spot is to find where `exit(1)` is\n\
          invoked in the **normal** libxml2 source files (i.e. not the example\nprograms\
          \ that deliberately call `exit(1)` for their own tests).\nRunning a recursive\
          \ search over the source files gives a handful of\nplaces where `exit(1)`\
          \ appears, all of them are defensive error paths\nthat should not be reached\
          \ during normal operation.\n\nThe most likely location is in **`dict.c`**,\
          \ because:\n\n* It implements the generic dictionary implementation used\
          \ throughout\n  libxml2 for symbol tables, entity tables, etc.\n* In `dict.c`\
          \ there is a function called `dictFree` that frees a block\n  and then calls\
          \ `exit(1)` when a double\u2011free is detected:\n\n```c\n  if (data ==\
          \ NULL) {\n      /* internal inconsistency \u2013 double free */\n     \
          \ exit(1);\n  }\n  ```\n\nDuring a bugscpp test run the library builds an\
          \ internal dictionary,\nadds a few entries, and later attempts to free the\
          \ same block twice.\nThis double\u2011free is not caught by any assert or\
          \ error\u2011return that the\nhigher\u2011level API propagates; instead\
          \ the internal sanity check fires and\ncalls `exit(1)`, causing the observed\
          \ termination with status\u202F1.\n\nOther `exit(1)` calls found are only\
          \ in the example programs (parsers,\nreaders, etc.) and would not be executed\
          \ in the core library test.\n\n**Minimal local fix**\n\nThe quick fix is\
          \ to replace the fatal `exit(1)` in `dict.c` with an\nerror\u2011return\
          \ that propagates up to the caller, allowing the test harness\nto detect\
          \ the condition and report it appropriately instead of aborting.\n\n```c\n\
          /* dict.c \u2013 around line that currently contains exit(1) */\nif (data\
          \ == NULL) {\n    /* Double free detected \u2013 report error instead of\
          \ aborting */\n    xmlGenericError(xmlGenericErrorContext,\n           \
          \         \"dictFree: double free detected\\n\");\n    return -1;      \
          \    /* <-- change from exit(1) to return -1 */\n}\n```\n\nAll callers of\
