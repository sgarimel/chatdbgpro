          \ (or a more specific non\u2011zero code).\n- **Long\u2011term improvement**\
          \ \u2013 Refactor the code to avoid calling `exit()`\ndirectly from within\
          \ library logic; instead return status codes and let `main()`\nhandle termination.\
          \ This eliminates ambiguity for test harnesses and improves\noverall code\
          \ maintainability.\n\n##### Recommendation\n*Minimal fix*: Change all early\
