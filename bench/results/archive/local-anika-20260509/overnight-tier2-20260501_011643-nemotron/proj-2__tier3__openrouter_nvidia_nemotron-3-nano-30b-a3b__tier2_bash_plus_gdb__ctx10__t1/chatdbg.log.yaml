            #else

            #include <pthread.h>
            #include <stdio.h>
            #include <assert.h>
            #include <unistd.h>

            static volatile int run = 0;
            static volatile int started = 0;

            static void* thread_main(void* unused)
            {
                projCtx p_proj_ctxt;
