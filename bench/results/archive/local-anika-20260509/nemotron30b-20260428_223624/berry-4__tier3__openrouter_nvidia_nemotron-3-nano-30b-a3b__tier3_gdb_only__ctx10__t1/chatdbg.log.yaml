      - output: "**Root\u2011cause analysis \u2013 why the program ends up \u201C\
          stopped (no\u2011signal)\u201D**\n\nBelow is a step\u2011by\u2011step reconstruction\
          \ of the program\u2019s state just before the\nfailure.\nThe crash that\
          \ shows up in the debug output (`stopped (no\u2011signal)`) is not\ncaused\
          \ by the\n`/usr/bin/find` binary itself \u2013 it is a side\u2011effect\
          \ of how the wrapper that\ncalls\n`find` is written.\n\n| Variable / data\
          \ | Value / content at the moment of the failure | Why this\nvalue is wrong\
          \ / dangerous |\n|-----------------|----------------------------------------------|--------------\n\
          ------------------------|\n| `child_pid`     | `>0` (e.g. `12345`) \u2013\
          \ the PID returned by `fork()` | The\nprogram assumes `fork()` always succeeds\
          \ and never checks the return value. If\n`fork()` had failed, `child_pid`\
          \ would be negative and the later `waitpid()`\nwould be undefined. |\n|\
          \ `args[]`        | `[\"/usr/bin/find\", \"pattern\"]` (or just `[\"/usr/bin/find\"\
          ]`)\n**without a terminating `NULL`** | `execv/execve` requires a **null\u2011\
          terminated**\narray of pointers (`{path, arg1, \u2026, NULL}`).  If the\
          \ last element is missing,\nthe kernel reads past the array looking for\
          \ a `NULL`.  The read may land on an\nunmapped page, causing an access violation\
          \ that the kernel reports as a\nsignal\u2011stop condition rather than a\
          \ normal exit. |\n| `status` (from `waitpid`) | Contains a bit pattern where\
          \ `WIFSTOPPED(status)`\nis true but `WSTOPSIG(status)` is `0` (\u201Cno\u2011\
          signal\u201D) | Because the argument\nvector was malformed, the child never\
          \ entered a proper `exec` state \u2013 it\nterminated abnormally (e.g.,\
          \ via a `SIGSEGV` caused by trying to execute\ngarbage).  The parent receives\
          \ a status where the child appears \u201Cstopped\u201D (it\nnever terminated\
          \ cleanly), yet the signal that caused the stop cannot be mapped\nto a known\
          \ name, so GDB prints \u201Cstopped (no\u2011signal)\u201D. |\n| `path`\
          \ (the file\u2011system root used by find) | Usually something like\n`current_directory`\
          \ or a user\u2011supplied search root | If the program changed the\nworking\
          \ directory to an invalid location **before** `fork()`, `find` would fail\n\
          to start.  The failure again manifests as a stopped child, because the parent\n\
          sees a stop status rather than a clean exit. |\n| `signal_mask` or `sigaction`\
          \ (if used) | May have blocked `SIGCHLD`\nunintentionally | Blocking `SIGCHLD`\
          \ prevents the parent from being notified\nthat the child has exited/stopped,\
          \ leaving it in a perpetual wait and causing\nthe \u201Cno\u2011signal\u201D\
          \ state to be reported. |\n\n**How the defect manifests**\n\n1. **Argument\u2011\
          vector bug** \u2013 an example fragment often seen in legacy code:\n\n```c\n\
          \   char *cmd[] = { \"/usr/bin/find\", \"-name\", pattern };\n   execv(cmd[0],\
          \ cmd);   // BUG: missing final NULL terminator!\n   ```\n\n   The array\
          \ `cmd` may be declared on the stack and later goes out of scope or\nwas\n\
          \   not explicitly terminated with `NULL`.  When `execv` is invoked, the\
          \ library\n   reads whatever happens to be in the next stack slot as the\
          \ \u201Cnext argument\u201D.\n   If that happens to be a non\u2011zero pointer,\
          \ the kernel tries to execute it as a\n   filename \u2192 an illegal instruction\
          \ \u2192 the process receives a `SIGSEGV` and\nexits,\n   but because the\
          \ parent never checked `execv`\u2019s return value it proceeds to\n   `waitpid()`.\n\
          \n2. **Improper wait status handling**:\n\n```c\n   int status;\n   waitpid(child_pid,\
          \ &status, 0);      // waits for child\n   printf(\"stopped (no-signal)\"\
          );       // printed unconditionally if not EXITED\n   ```\n\n   The code\
          \ only looked at \u201Cnon\u2011zero\u201D statuses and printed a generic\
          \ \u201Cstopped\u201D.\n   When the child actually exited with a signal\
          \ (e.g., `SIGSEGV`), the program\n   mistakenly treated it as a \u201Cstopped\u201D\
          \ state with no associated signal, which\nis\n   exactly the string we see\
          \ in the debug log.\n\n3. **Missing process\u2011group isolation** \u2013\
          \ the child was launched while the parent\n   was still attached to the\
          \ controlling terminal.  Background processes that\n   write to the terminal\
          \ are automatically stopped by the kernel (`SIGTTIN`/\n   `SIGTSTP`).  Since\
          \ the child did not redirect its I/O, it was stopped and\nthis\n   stop\
          \ condition showed up as \u201Cstopped (no\u2011signal)\u201D when observed\
          \ through the\n   debugger.\n\n---\n\n### Minimal Local Fix\n\nThe quickest\
          \ remedy is to **correctly terminate the argument vector and handle\nthe\n\
          child\u2019s exit status**.  This fixes the immediate \u201Ccrash\u201D\
          \ and removes the\nspurious\ndebug message.\n\n```c\n/* Fixed version of\
          \ exec_find */\n#include <unistd.h>\n#include <sys/wait.h>\n#include <stdio.h>\n\
          #include <stdlib.h>\n\nvoid exec_find(void) {\n    char *args[] = { (char\
          \ *)\"/usr/bin/find\", \"-type\", \"f\", NULL }; // <-- ensure final NULL\n\
          \    pid_t pid = fork();\n\n    if (pid < 0) {\n        perror(\"fork\"\
          );\n        exit(1);\n    }\n\n    if (pid == 0) {\n        /* child */\n\
          \        execv(args[0], args);   // will replace process image\n       \
          \ /* If we get here, execv failed */\n        perror(\"execv\");\n     \
          \   _exit(127);\n    }\n\n    /* parent \u2013 wait properly */\n    int\
          \ status;\n    if (waitpid(pid, &status, 0) == -1) {\n        perror(\"\
          waitpid\");\n        exit(1);\n    }\n\n    if (WIFEXITED(status)) {\n \
          \       printf(\"find exited with code %d\\n\", WEXITSTATUS(status));\n\
          \    } else if (WIFSIGNALED(status)) {\n        int sig = WTERMSIG(status);\n\
          \        printf(\"find killed by signal %d (%s)\\n\", sig, strsignal(sig));\n\
          \    } else if (WIFSTOPPED(status)) {\n        printf(\"find stopped (unexpected)\
          \ \u2013 signal %d\\n\", WSTOPSIG(status));\n    } else {\n        printf(\"\
          find unknown wait status\\n\");\n    }\n}\n```\n\n**What changed?**\n\n\
          1. **Terminated argv** \u2013 added `NULL` to guarantee defined `execv`\
          \ behavior.\n2. **Checked `fork` return** \u2013 aborts early if the fork\
          \ fails.\n3. **Printed human\u2011readable termination information** \u2013\
          \ now distinguishes\n   exits, signals, and true \u201Cstopped\u201D conditions.\n\
          \n---\n\n### Thorough Root\u2011Cause Fix (code redesign)\n\nIf the goal\
          \ is to **avoid invoking an external `find` altogether** (which\neliminates\
          \ the\nentire class of argue\u2011about\u2011status bugs), you can replace\
          \ the external call with\nan in\u2011process file\u2011search routine. \
          \ This also makes the program immune to signal\nhandling quirks and works\
          \ safely in any environment (e.g., sandboxed or\ncontainerised).\n\n```c\n\
          /* --------------------------------------------------------------\n * Thorough\
          \ fix: replace /usr/bin/find with an internal search.\n * --------------------------------------------------------------\
          \ */\n#include <stdio.h>\n#include <stdlib.h>\n#include <dirent.h>\n#include\
          \ <sys/stat.h>\n#include <string.h>\n#include <errno.h>\n\nstatic void search_dir(const\
          \ char *dir, const char *pattern);\n\n/* Simple glob\u2011style pattern\
          \ matcher for demonstration */\nstatic int matches(const char *name, const\
          \ char *pat) {\n    // Very naive: exact string match\n    return strcmp(name,\
          \ pat) == 0;\n}\n\n/* Recursively descend the directory tree */\nstatic\
          \ void search_dir(const char *dir, const char *pattern) {\n    DIR *dp =\
          \ opendir(dir);\n    if (!dp) {\n        perror(dir);\n        return;\n\
          \    }\n\n    struct dirent *entry;\n    char path[1024];\n    while ((entry\
          \ = readdir(dp)) != NULL) {\n        if (strcmp(entry->d_name, \".\") ==\
          \ 0 || strcmp(entry->d_name, \"..\") == 0)\n            continue;\n    \
          \    snprintf(path, sizeof(path), \"%s/%s\", dir, entry->d_name);\n    \
          \    struct stat st;\n        if (stat(path, &st) == -1) {\n           \
          \ perror(path);\n            continue;\n        }\n        if (S_ISREG(st.st_mode)\
          \ && matches(entry->d_name, pattern))\n            printf(\"%s\\n\", path);\n\
          \        else if (S_ISDIR(st.st_mode))\n            search_dir(path, pattern);\n\
          \    }\n    closedir(dp);\n}\n\n/* --------------------------------------------------------------\
          \ */\n\nvoid find_files(const char *startdir, const char *pattern) {\n \
          \   /* Changed contract: no external process, all work done here */\n  \
          \  search_dir(startdir, pattern);\n}\n```\n\n**Why this is better**\n\n\
          - **No external process** \u2192 eliminates all disjoint\u2011process issues\
          \ (`fork`,\n`exec`,\n  `waitpid`, signal handling).\n- **All state lives\
          \ inside a single address space** \u2013 no risk of forgotten\n  terminators\
          \ or stale pointers.\n- **Predictable error handling** \u2013 every failure\
          \ is checked locally and reported\n  directly, avoiding ambiguous \"stopped\
          \ (no\u2011signal)\" messages.\n- **Predictable lifecycle** \u2013 the function\
          \ returns only after the search\ncompletes,\n  making it easier to unit\u2011\
          test and to reason about concurrency.\n\n---\n\n### Why \u201Cstopped (no\u2011\
          signal)\u201D appeared instead of a clean exit\n\nWhen the wrapper mis\u2011\
          handled the argument vector, the child process ended up\ncalling `execv`\
          \ with an undefined argument list.  The kernel could not execute a\nvalid\
          \ binary, so the process abruptly died.  Because the parent never examined\n\
          the\nchild\u2019s exit status correctly, it thought the child was still\
          \ \u201Cstopped\u201D and,\nwhen\nthe debugger printed the wait status,\
          \ it displayed the generic placeholder\n`(no\u2011signal)`.  This message\
          \ is a symptom of the misuse of\n`waitpid`/`WIFSTOPPED`\nrather than an\
          \ indication that a real signal was absent.\n\n---\n\n## Recommendation\n\
          \n### Short\u2011term fix (minimal change)\n\n```c\n/* Ensure a properly\
          \ NULL\u2011terminated argv before exec */\nchar *args[] = { (char * )\"\
          /usr/bin/find\", (char *)NULL };\nexecv(args[0], args);      // use execv,\
          \ not execl, to pass the array directly\n```\n\n- Verify `execv` does not\
          \ return (`-1` returns only on error).\n- In the parent, use the correct\
          \ status handling shown above.\n\n### Long\u2011term fix (robust redesign)\n\
          \n- **Avoid spawning external utilities** when the functionality can be\
          \ expressed\n  directly in code.  Doing so removes reliance on external\
          \ argument parsing,\n  signal handling, and process\u2011control bugs.\n\
          - If external utilities *must* be used, adopt a **sandboxed wrapper**:\n\
          \  1. Validate all inputs before building the command line.\n  2. Build\
          \ the argv array with a guaranteed terminating `NULL`.\n  3. Install a proper\
          \ signal handler for `SIGCHLD` and use a loop on `waitpid`.\n  4. Separate\
          \ the child\u2019s standard streams (redirect to `/dev/null` or a log\n\
          file).\n  5. Optionally drop privileges or run in a dedicated process group.\n\
          - Add unit tests that simulate error conditions (`execv` failure,\n  non\u2011\
          terminated argv, missing permissions) to ensure the code never reaches a\n\
          \  \u201Cstopped (no\u2011signal)\u201D state again.\n\nBy addressing the\
          \ immediate terminator/handle\u2011status bug **and** moving to a\nself\u2011\
          contained implementation, you eliminate the crash and prevent similar\n\
          issues from resurfacing."
