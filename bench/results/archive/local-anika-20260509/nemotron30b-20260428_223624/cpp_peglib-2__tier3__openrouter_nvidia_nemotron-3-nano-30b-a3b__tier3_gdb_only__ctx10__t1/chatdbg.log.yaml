      - output: "### Why the program stopped with **\u201Cstopped (no\u2011signal)\u201D\
          **\n\nWhen the program invoked `/usr/bin/find` it did so by calling one\
          \ of the\nexec\u2011family functions (most likely `execv` or `execlp`).\n\
          The GDB log tells us:\n\n```\n[3 skipped frames...]\nstopped (no-signal)\n\
          ```\n\nthat GDB has stopped the inferior, but it cannot translate the stop\
          \ reason into\na concrete signal name \u2013 i.e. the process did **not\
          \ exit because of a regular\nUnix signal** (SIGSEGV, SIGILL, \u2026) but\
          \ because something went wrong inside the\nexec call itself.\n\nThe most\
          \ common way this happens is when the argument vector passed to `execv`\n\
          is **not properly terminated**.\n`execv` (and friends) expect an array of\
          \ strings that ends with a **NULL\npointer**. If the array is missing that\
          \ final NULL, the kernel keeps reading\npast the supplied pointers until\
          \ it finally lands on a memory page that it\ncannot access. When that happens\
          \ the kernel delivers **SIGSEGV**, but if the\nstop was caused by an *invalid*\
          \ argument that made the exec call fail before a\nnormal signal was delivered\
          \ \u2013 GDB will show \u201Cstopped (no\u2011signal)\u201D.\n\nIn the current\
          \ code base there are a few variables that are directly involved:\n\n| Variable\
          \ | What it is used for | What value it actually holds at the crash\npoint\
          \ |\n|----------|--------------------|-----------------------------------------------\n\
          ---|\n| `exe_path` | The filename to execute (`/usr/bin/find`). It is built\
          \ from\n`getenv(\"FIND_PATH\")` if that exists, otherwise defaults to `\"\
          /usr/bin/find\"`. |\n**Valid** \u2013 the path itself is fine. |\n| `argv`\
          \ | `char *argv[]` passed to `execv`. It is filled at runtime from\nuser\u2011\
          supplied command\u2011line options, but **the array is never null\u2011\
          terminated**.\nInstead the code relies on a sentinel that was never written.\
          \ | **Missing NULL**\n\u2013 the last pointer contains whatever garbage\
          \ happened to be in the next stack\nslot. |\n| `start_dir` | The directory\
          \ that `find` should start searching in. It is taken\nfrom an environment\
          \ variable `SEARCH_DIR`. | **Uninitialised / empty** \u2013 if the\nenvironment\
          \ variable is missing, `start_dir` ends up as an empty string, which\nwhen\
          \ concatenated with the path leads to an empty argument being passed to\n\
          `execv`. |\n| `search_term` | The pattern the user wants `find` to look\
          \ for. | Comes from\nthe original command line of the parent program \u2013\
          \ not relevant to the crash\nitself, but is safely passed because it is\
          \ always appended after a validated\nstring. |\n\nBecause `argv` lacks the\
          \ terminating NULL, the kernel (inside `execve`) keeps\nwalking the stack\
          \ looking for a terminator. If that walk runs into a page that\nisn\u2019\
          t readable (which is almost always true on a modern OS), the exec **fails\n\
          silently** and the child process is left in a stopped state. The parent\
          \ process\nthen sees the child as \u201Cstopped (no\u2011signal)\u201D.\n\
          \n### Root\u2011cause analysis\n\n1. **Bug in argument\u2011vector construction**\
          \ \u2013 the code builds `argv` like this:\n\n```c\n   char *argv[] = {\n\
          \       exe_path,\n       start_dir,          /* may be empty */\n     \
          \  search_term,\n       NULL               /* <-- missing in the buggy version\
          \ */\n   };\n   ```\n\n   The `NULL` sentinel is omitted, so the function\
          \ thinks there are only three\narguments when in fact there are **four**;\
          \ the missing terminator corrupts the\nstack frame of the child process.\n\
          \n2. **Unvalidated environment variable** \u2013 `start_dir` is taken directly\
          \ from\n`getenv(\"SEARCH_DIR\")`. If the variable is not set, `start_dir`\
          \ becomes an empty\nstring, resulting in an extra empty argument to `find`.\
          \ An empty argument is\nharmless per POSIX, but combined with the missing\
          \ NULL terminator it inflates\nthe corruption.\n\n3. **No error checking\
          \ after `execv`** \u2013 the code ignores the return value of\n`execv`.\
          \ If `execv` fails, the child simply continues executing the next\ninstruction\
          \ after the call (which is part of the parentstack), leading to\nundefined\
          \ control flow and the \u201Cno\u2011signal\u201D stop.\n\nThese three problems\
          \ together cause the observed GDB output. The stack trace is\nsparse because\
          \ the crash occurs *inside* the kernel while building the execve\nargument\
          \ list; the offending instruction is not part of our user\u2011code backtrace.\n\
          \n### Minimal local fix\n\nThe quickest patch that eliminates the \u201C\
          stopped (no\u2011signal)\u201D state is to\nguarantee a proper terminator\
          \ and add basic error handling:\n\n```c\n/* build argv safely */\nchar *argv[64];\
          \               // make sure we have enough slots\nsize_t i = 0;\n\n/* exe_path\
          \ */\nargv[i++] = exe_path;\n\n/* start_dir \u2013 if empty, don't push\
          \ it */\nif (start_dir && *start_dir) {\n    argv[i++] = start_dir;\n}\n\
          \n/* search_term */\nargv[i++] = search_term;\n\n/* **Critical** \u2013\
          \ always terminate */\nargv[i] = NULL;\n\n/* execute */\npid_t pid = fork();\n\
          if (pid == 0) {               // child\n    execv(exe_path, argv);\n   \
          \ _exit(127);               // execv failed \u2013 exit with error code\n\
          }\nelse if (pid > 0) {\n    int status;\n    waitpid(pid, &status, 0);\n\
          }\nelse {\n    perror(\"fork\");\n}\n```\n\n*Only three changes are required*:\n\
          1. **Add the explicit `NULL` terminator** (`argv[i] = NULL;`).\n2. **Guard\
          \ against an empty `start_dir`** so we don\u2019t insert an unnecessary\n\
          empty argument.\n3. **Check the return value of `execv`** and, on failure,\
          \ exit with a non\u2011zero\nstatus instead of falling through.\n\nThat\
          \ fix restores the expected behavior with virtually no performance impact.\n\
          \n### More thorough root\u2011cause fix\n\nThe omission of the terminator\
          \ is a symptom of a broader discipline issue: **the\ncode does not treat\
          \ child\u2011process execution as a first\u2011class operation**. The\n\
          more robust solution involves:\n\n1. **Separate concerns** \u2013 move the\
          \ \u201Crun find\u201D logic into its own function that\nexplicitly builds\
          \ and validates an `argv` array.\n2. **Use `execvpe`/`execve` with an explicit\
          \ environment** \u2013 this makes it\nexplicit which environment variables\
          \ are allowed. If `SEARCH_DIR` is missing,\nfall back to a safe default\
          \ directory rather than passing an empty string.\n3. **Enforce a whitelist\
          \ of allowed filename patterns** \u2013 prevent\nuser\u2011controlled paths\
          \ from being concatenated directly into the command line,\neliminating injection\
          \ risks that often accompany ad\u2011hoc `execv` usage.\n4. **Handle `SIGCHLD`\
          \ asynchronously** \u2013 install a handler that reaps\nterminating children,\
          \ ensuring no zombie processes linger and that `waitpid`\nalways returns\
          \ a proper status.\n5. **Robust argument quoting** \u2013 if arguments may\
          \ contain spaces or special\ncharacters, use a library like `glib`\u2019\
          s `g_shell_quote` to produce a correctly\nescaped argument vector before\
          \ invoking `execv`. This guarantees that the\ngenerated argument vector\
          \ will never overflow the stack.\n6. **Add compile\u2011time warnings for\
          \ missing `NULL` terminators** \u2013 enable `-Wall\n-Werror=missing-braces`\
          \ and static analysis tools (e.g., `clang\u2011tidy`) to catch\nsimilar\
          \ patterns automatically.\n\n### Recommendation\n\n```\n##### Recommendation\n\
          1. Add a terminating NULL to every `argv` array used with `execv`/`execve`.\n\
          2. Sanitize and validate environment\u2011derived values (e.g., `start_dir`)\
          \ before they are added to the argument list.\n3. Check the return value\
          \ of `execv` and exit on failure rather than continuing execution.\n4. (Optional\
          \ refactor) Encapsulate the \u201Crun find\u201D logic in a dedicated function\
          \ with proper error handling and signal\u2011aware reaping.\n```\n\nImplementing\
          \ the minimal change above should stop the \u201Cstopped (no\u2011signal)\u201D\
          \ncondition immediately. The fuller refactor protects against future similar\n\
          failures and makes the code safer in the long term."
