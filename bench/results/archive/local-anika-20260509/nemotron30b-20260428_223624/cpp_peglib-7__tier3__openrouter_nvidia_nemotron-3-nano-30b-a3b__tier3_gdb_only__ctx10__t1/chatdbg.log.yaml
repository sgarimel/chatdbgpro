          \ jump to `exit()`; the back\u2011trace is truncated after two frames that\
          \ GDB\ncannot translate to symbols.\n\n2. **What likely happened before\
          \ `exit()`?**\n   * Some code path earlier in `find` allocated a resource\
          \ (e.g., a buffer, a\n`DIR *`, a dynamically\u2011created argument vector)\
          \ **without initializing it**.\n   * That corrupted value was later placed\
