          ---\n\n### Summary\n\n- The crash is not a low\u2011level memory violation\
          \ but an *explicit* termination\nvia Bash\u2019s internal `exit_shell()`\
          \ \u2192 `exit()` pathway.\n- The underlying defect is that Bash incorrectly\
          \ identified a condition as fatal\nand aborted, leading to a stopped\u2011\
