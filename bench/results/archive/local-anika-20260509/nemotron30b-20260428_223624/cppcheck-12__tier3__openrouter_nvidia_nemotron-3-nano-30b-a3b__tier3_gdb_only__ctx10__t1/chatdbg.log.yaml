          \n```c\n   #ifndef NDEBUG\n   assert(some_condition && \"unexpected fatal\
          \ condition\");\n   #endif\n   ```\n\n2. **Improve diagnostics**\n   - When\
          \ Bash encounters a condition that might lead to `exit_shell()`, print a\n\
          detailed diagnostic before aborting. This helps users understand why the\
          \ shell\nthinks it must quit.\n\n```c\n   if (fatal_error) {\n       fprintf(stderr,\
          \ \"Bash internal error: %s (errno=%d)\\n\",\n               strerror(errno),\
          \ errno);\n       exit_shell(EXIT_FAILURE);\n   }\n   ```\n\n3. **Avoid\
          \ implicit fall\u2011through to exit**\n   - Refactor code so that each\
          \ logical path explicitly returns an error code or\nproceeds to cleanup,\
          \ rather than relying on an implicit `exit_shell()` path\nbeing reached\
          \ via a cascade of `if/else` statements.\n   - Example refactor:\n\n```c\n\
          \   int status = handle_builtin(argc, argv);\n   if (status != 0) {\n  \
