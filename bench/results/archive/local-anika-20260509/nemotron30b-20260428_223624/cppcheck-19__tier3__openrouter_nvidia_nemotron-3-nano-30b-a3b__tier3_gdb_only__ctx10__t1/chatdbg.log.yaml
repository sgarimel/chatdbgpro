          \ synchronize properly. |\n| **Signal handling / `sigaction` misuse** |\
          \ If a signal handler calls `exit()`\ndirectly, it can abort the process\
          \ without a proper signal being delivered,\nleading to the \u201Cstopped\
          \ (no\u2011signal)\u201D state. | Use async\u2011signal\u2011safe functions\n\
