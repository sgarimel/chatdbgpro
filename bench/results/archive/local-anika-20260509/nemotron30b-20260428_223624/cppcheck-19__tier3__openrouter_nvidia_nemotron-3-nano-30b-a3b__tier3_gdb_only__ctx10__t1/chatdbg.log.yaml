          \ true even though it should be false,\nleading directly to the unconditional\
          \ `exit()`.\n\n4. **Root cause**\n   - The underlying defect is **logic\
          \ that unconditionally terminates the\nprogram** after spawning a shell,\
          \ instead of continuing normal execution or\nhandling errors gracefully.\n\
          \   - This is manifested as an **uninitialized/incorrect flow control variable**\n\
          that drives the call to `exit()`.\n\n---\n\n### Minimal local fix (code\u2011\
          level)\n\nIf the offending code looks roughly like this:\n\n```c\nvoid exit_shell(void)\n\
          {\n    /* Oops \u2013 we call exit unconditionally */\n    exit(0);    \
          \             // <-- bug\n}\n```\n\nReplace the unconditional `exit()` with\
          \ a conditional one, or simply return to\nlet `main` handle the flow:\n\n\
          ```c\nvoid exit_shell(void)\n{\n    /* Remove the unconditional exit */\n\
          \    /* exit(0); */          // <-- comment out the buggy line\n\n    /*\
