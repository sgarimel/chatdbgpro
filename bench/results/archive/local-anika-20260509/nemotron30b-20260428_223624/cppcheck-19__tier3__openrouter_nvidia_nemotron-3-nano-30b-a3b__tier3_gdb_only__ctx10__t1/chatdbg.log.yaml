          \ is made to launch a Bash shell\n(`system(\"bash\")` or similar).\n   -\
          \ Right after that launch the program reaches `exit_shell`, which apparently\n\
          calls `exit()` **unconditionally** (or with an illegal status).\n   - Because\
          \ `exit()` terminates the process, control never returns to the\ndebugger\
          \ after the call, and GDB sees the inferior as \u201Cstopped (no\u2011signal)\u201D\
          .\n\n3. **Variables that are \u201Ccontributing\u201D**\n   - The **status\
          \ argument** passed to `exit()` (or the lack thereof) is\neffectively undefined\
          \ in the code that leads to `exit_shell`.\n   - If the code intended to\
