          \ to exit only when a boolean `should_exit` is true:\n\n```c\nstatic bool\
          \ should_exit = false;   // make sure this is initialized\n\nvoid exit_shell(void)\n\
          {\n    if (should_exit) {\n        exit(0);               // now only exits\
          \ when the flag is set\n    }\n}\n```\n\nA **one\u2011line fix** to stop\
          \ the immediate crash would be:\n\n```c\n/* In whatever function calls exit_unconditionally():\
          \ */\nexit(0);   // change to  return;   // or  exit(0); /* only after proper\
          \ condition */\n```\n\n---\n\n### More thorough root\u2011cause fix\n\n\
          A robust solution should address the *why* behind the unconditional exit:\n\
          \n| Issue | Why it matters | Fix |\n|-------|----------------|-----|\n|\
          \ **Uninitialized flow control** (`should_exit` or similar flag) | Leads\
