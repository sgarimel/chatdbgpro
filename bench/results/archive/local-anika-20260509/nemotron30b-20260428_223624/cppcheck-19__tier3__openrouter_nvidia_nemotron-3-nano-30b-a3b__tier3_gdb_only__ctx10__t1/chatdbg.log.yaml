          if (pid > 0) {\n    waitpid(pid, &status, 0);   // wait for child to finish\n\
          \    /* Continue normal execution */\n}\n```\n\n---\n\n### Recommendation\n\
          The crash originates from an **unconditional `exit()` call** in `exit_shell()`\n\
