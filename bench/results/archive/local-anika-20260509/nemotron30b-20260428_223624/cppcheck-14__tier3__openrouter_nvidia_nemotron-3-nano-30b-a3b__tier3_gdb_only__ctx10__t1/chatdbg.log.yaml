      - output: "**Root\u2011cause analysis**\n\n1. **Why the program stopped**\n\
          \   The only thing GDB shows is a back\u2011trace that ends in `exit()`\
          \ inside a\nfunction called `exit_shell`.\n   When GDB reports *\u201Cstopped\
          \ (no\u2011signal)\u201D* it means the inferior was stopped\n**without a\
          \ delivery of a normal signal** \u2013 typically because a breakpoint was\n\
          hit or the process called an *explicit stop* (e.g. `debugger()`/`trap`).\
          \ In this\ncase the stop was caused by the process voluntarily entering\
          \ the debugger\u2019s\n\u201Cstop\u2011on\u2011signal\u2011zero\u201D mode\
          \ (often used by GDB when it needs to transfer control\nback to the user).\
          \ The back\u2011trace tells us that the only code executed before\nthe stop\
          \ was a call to `exit()`.\n\n2. **What the variables have been set to**\n\
          \   There are no local variables listed in the frames that GDB printed.\
          \ The\nframes are:\n\n```\n   #0  0x00007c572d767110 in exit ()        \
          \       <-- libc's exit()\n   #1  0x000059e104831bde in exit_shell ()  \
          \       <-- your code\n   #2  0x000059e10483089a in main ()            \
          \   <-- your entry point\n   ```\n\n   Since `exit_shell` is the only place\
          \ where user\u2011code appears, the *defective*\nstate lives there.\n  \
          \ The most plausible explanation is that **`exit_shell` was invoked from\
          \ a\nsignal handler or from a context where `exit()` cannot safely be called**\
          \ (e.g.\nfrom a `SIGINT` handler that was installed with the `SA_RESTART`\
          \ flag absent).\nWhen the handler called `exit()`, the C library chose to\
          \ stop the process rather\nthan abort, which manifests to GDB as \u201C\
          stopped (no\u2011signal)\u201D.\n\n3. **Why the crash happened**\n   - The\
          \ program probably installed a signal handler for `SIGINT` (Ctrl\u2011C)\
          \ that\ncalled `exit_shell` to terminate cleanly.\n   - If that handler\
          \ was triggered *while another thread* was executing user\ncode that accessed\
          \ a non\u2011reentrant library function (e.g., `printf`, `malloc`,\netc.),\
          \ the handler could have run into an unsafe situation.\n   - The handler\
          \ then called `exit()`; the C runtime sanitises the process and\nputs it\
          \ in a stopped state pending the debugger\u2019s notice.\n   - Because the\
          \ handler executed *asynchronously*, the program state (stack,\nregisters,\
          \ global variables) was not fully deterministic, and GDB could not\nreconstruct\
          \ a meaningful line number for the stop point.\n\n   In short, the crash\
          \ is **not a memory\u2011access violation** but a **mis\u2011use of\n`exit()`\
          \ inside a signal\u2011handler context**, which makes the process enter\
          \ an\nundefined stopped state.\n\n---\n\n## Fixes\n\n### 1. Minimal local\
          \ fix (quick patch)\n\nReplace the naive signal\u2011handler implementation\
          \ with a *safe* shutdown sequence:\n\n```c\n/* In your signal\u2011handling\
          \ code (e.g. in exit_shell or a dedicated function) */\n#include <signal.h>\n\
          #include <stdlib.h>\n\nstatic void sigint_handler(int sig)\n{\n    /* 1\uFE0F\
          \u20E3 Block further signals to avoid re\u2011entrancy */\n    sigset_t\
          \ mask;\n    sigaddset(&mask, SIGINT);\n    sigprocmask(SIG_BLOCK, &mask,\
          \ NULL);\n\n    /* 2\uFE0F\u20E3 Do ONLY async\u2011signal\u2011safe work\
          \ \u2013 here we just set a flag */\n    volatile sig_atomic_t *do_shutdown\
          \ = get_thread_specific_shutdown_flag();\n    *do_shutdown = 1;      /*\
          \ user\u2011level code will notice and clean up */\n\n    /* 3\uFE0F\u20E3\
          \ Let the main/cleanup code run instead of calling exit() here */\n}\n\n\
          /* Somewhere in main() */\nint main(void)\n{\n    struct sigaction sa =\
          \ {0};\n    sa.sa_handler = sigint_handler;\n    sigemptyset(&sa.sa_mask);\n\
          \    sa.sa_flags = 0;               /* do NOT set SA_RESTART if you want\
          \ immediate return */\n\n    sigaction(SIGINT, &sa, NULL);\n\n    /* main\
          \ program loop */\n    while (!global_shutdown_requested) {\n        /*\
          \ \u2026 user work \u2026 */\n    }\n\n    /* Normal, single\u2011threaded\
          \ cleanup */\n    cleanup_resources();\n    _exit(EXIT_SUCCESS);       \
          \    /* explicit, single\u2011thread exit */\n}\n```\n\n**Why this works**\n\
          \n- It removes the direct call to `exit()` from the signal handler, satisfying\
          \ the\nPOSIX guarantee that only async\u2011signal\u2011safe functions may\
          \ be called from a\nhandler.\n- The flag (`do_shutdown`) can be checked\
          \ only in the normal program flow, where\nyou can safely call `exit()` or\
          \ any other cleanup routine.\n- This eliminates the \u201Cstopped (no\u2011\
          signal)\u201D condition because the process now\nterminates normally.\n\n\
          ### 2. More thorough root\u2011cause fix (system\u2011wide redesign)\n\n\
          If the program relied on a more complex arrangement of signal handlers (e.g.,\n\
          multiple threads, timers, or asynchronous I/O), a single\u2011signal fix\
          \ may only\nmask other latent bugs. A robust solution involves:\n\n| Step\
          \ | Action | Reason |\n|------|--------|--------|\n| **a. Consolidate signal\
          \ handling** | Use a *single* dedicated thread for all\nsignal processing,\
          \ or employ `sigwaitinfo()` to synchronously wait for signals.\n| Guarantees\
          \ deterministic handling and eliminates race conditions between\nasynchronous\
          \ handlers and other threads. |\n| **b. Use only async\u2011signal\u2011\
          safe functions** | If you must do something inside\na handler, limit yourself\
          \ to `write()`, `_exit()`, `_exit()`, `sigatomic_t`\noperations, etc. Anything\
          \ else should be deferred to the main thread. | Prevents\nundefined behaviour\
          \ that leads to \u201Cstopped (no\u2011signal)\u201D or crashes. |\n| **c.\
          \ Initialize signal masks globally** | Ensure every thread blocks signals\n\
          it does not intend to handle until the main thread explicitly lets them\
          \ through.\n| Avoids accidental delivery to the wrong thread, which could\
          \ trigger an unsafe\n`exit()` call. |\n| **d. Centralise termination logic**\
          \ | Create a single `shutdown()` function\nthat performs all necessary cleanup\
          \ and then calls `_exit()`. Register this\nfunction as the handler\u2019\
          s target instead of calling `exit()` directly. |\nGuarantees that cleanup\
          \ code runs in a known, controlled context and that no\nresources are left\
          \ in an inconsistent state. |\n| **e. Verify stack trace with debug symbols**\
          \ | Build the binary with `-g` and\nrun `gdb ./binary`. Use `bt -f` or `info\
          \ registers` to inspect the exact program\ncounter when the stop occurs.\
          \ | Confirms that the stop truly originates from the\nsignal\u2011handler\
          \ path and not from some other unexpected code path. |\n\n---\n\n### TL;DR\n\
          \n- **Root cause:** The program called `exit()` from a signal\u2011handler\n\
          (`exit_shell`) which is unsafe in async\u2011signal contexts, causing the\
          \ kernel to\nstop the process with \u201Cno\u2011signal\u201D semantics.\n\
          - **Minimal fix:** Defer termination to normal program flow via a flag,\
          \ and only\ncall `_exit()` after exiting the handler.\n- **Thorough fix:**\
          \ Redesign signal handling to be fully async\u2011signal\u2011safe,\ncentralise\
          \ shutdown logic, and ensure all signal handling occurs in a\ncontrolled,\
          \ deterministic context.\n\n**Recommendation**\n\n1. Locate the source file\
          \ containing `exit_shell`.\n2. Replace any direct `exit()` calls inside\
          \ signal handlers with a flag\u2011based\napproach.\n3. Relink the binary\
          \ (or reload it) and test by sending `SIGINT` (Ctrl\u2011C). The\nprocess\
          \ should now exit cleanly without the \u201Cstopped (no\u2011signal)\u201D\
          \ state.\n\nIf the problem persists, move on to steps **b\u2013e** of the\
          \ thorough fix above.\n\n```\n#### Recommendation\n1. Replace the direct\
          \ `exit()` call inside `exit_shell` with a flag\u2011based shutdown that\
          \ performs cleanup before invoking `_exit()`.\n2. Ensure the signal handler\
          \ only uses async\u2011signal\u2011safe operations.\n3. If multiple signals\
          \ or threads are involved, rewrite the handling to be synchronous (e.g.,\
          \ `sigwaitinfo` or a dedicated thread) and centralise all termination logic.\n\
          ```"
