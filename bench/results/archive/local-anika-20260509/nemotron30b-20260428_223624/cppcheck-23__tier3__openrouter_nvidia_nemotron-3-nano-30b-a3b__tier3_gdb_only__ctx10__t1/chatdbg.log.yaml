      - output: |-
          The stack trace indicates the program crashed during shutdown, with `exit()`
          being called from `exit_shell()`, which was invoked from `main()`. This suggests
          the crash occurred during the shutdown sequence of a shell-like program. The
          "stopped (no-signal)" state implies the process was terminated unexpectedly,
          likely due to an unhandled signal or resource conflict during exit.

          A likely root cause is improper resource cleanup in `exit_shell()`. For example,
          if the program maintains a list of open file descriptors or background processes
          that are not properly terminated before exiting, this could lead to undefined
          behavior (e.g., dangling file handles or memory corruption).

          **Minimal fix**:
          Ensure `exit_shell()` explicitly closes all resources (e.g., files, sockets) and
          kills child processes before calling `exit()`. Example:
          ```c
          void exit_shell() {
              // Close all open resources
              for (int i = 0; i < MAX_FDS; i++) {
                  if (fds[i] != -1) close(fds[i]);
              }
              // Kill child processes
              kill(0, SIGTERM);
              exit(0); // Normal exit
          }
          ```

          **Thorough fix**:
          Investigate why `exit_shell()` is being invoked at all. If the program is a
          shell, it should handle `exit` built-in commands gracefully. The crash may stem
          from an invalid state (e.g., trying to exit without a proper context). Audit all
          code paths leading to `exit_shell()` to ensure robust state management, and add
          error handling for cleanup operations. For example:
          ```c
          void exit_shell(int status) {
              // Safely close resources
              for (int i = 0; i < MAX_FDS; i++) {
                  if (fds[i] != -1) {
                      if (close(fds[i]) != 0) {
                          perror("close failed");
                      }
                  }
              }
              // Handle child processes
              int status;
              while (waitpid(-1, &status, WNOHANG) > 0);
              exit(status);
          }
          ```

          This addresses both the symptom (crash during exit) and potential underlying
          resource management flaws.
