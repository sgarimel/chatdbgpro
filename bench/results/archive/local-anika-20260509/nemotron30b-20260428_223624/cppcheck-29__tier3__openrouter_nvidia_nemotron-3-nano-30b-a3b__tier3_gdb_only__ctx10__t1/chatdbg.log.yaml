      - output: "### 1.\u202FWhat the back\u2011trace is telling us\n\n```\n#0  0x00007ba40662e110\
          \ in exit ()                \u2190 we are inside libc\u2019s exit()\n#1\
          \  0x0000615e42231bde in exit_shell ()          \u2190 our own helper that\
          \ eventually calls exit()\n#2  0x0000615e4223089a in main ()           \
          \     \u2190 the entry point called exit_shell()\n```\n\n*The program never\
          \ reaches any of the \u201Cskipped frames\u201D.*\nThe stopped state is\
          \ reported as **\u201Cno\u2011signal\u201D**, which is GDB\u2019s way of\
          \ saying\nthe inferior halted for a reason GDB cannot map onto a normal\
          \ POSIX signal (e.g.\nan illegal instruction, a stack overflow, or undefined\
          \ behaviour inside a\nlibrary routine).\n\nIn practice this pattern almost\
          \ always means:\n\n1. **`exit_shell()` was invoked from `main`.**\n2. **`exit_shell()`\
          \ called the C library `exit()`**, but something in the\nprocess state was\
          \ already corrupted (wrong stack pointer, overwritten return\naddress, or\
          \ an illegal instruction caused by earlier misuse of memory).\n3. When the\
          \ libc `exit()` routine tried to perform its terminating work it hit\nthat\
          \ corrupted state and the kernel forced the process to a \u201Cstopped\u201D\
          \ state with\nno observable signal \u2013 the only observable symptom GDB\
          \ could report.\n\nThe usual culprit for this pattern in programs that embed\
          \ Bash or invoke it from\na custom shell is **calling `exit()` (or any non\u2011\
          async\u2011signal\u2011safe termination\nroutine) from inside a signal handler\
          \ or from a context where the process\u2019s\nexecution context has already\
          \ been invalidated**.\n\nWhen a signal handler runs, the program\u2019s\
          \ execution context is paused; after the\nhandler returns control is restored\
          \ *to the point where the signal was taken*.\nIf the handler then calls\
          \ `exit()`, the normal unwind logic of the C library is\nbroken, and the\
          \ kernel ends up with an inconsistent execution state that GDB\nshows as\
          \ \u201Cstopped (no\u2011signal)\u201D.\n\n### 2.\u202FProgram state at\
          \ the crash point\n\n| Variable / state | Likely value / condition |\n|------------------|--------------------------|\n\
          | Call stack      | `main \u2192 exit_shell \u2192 exit` (the real execution\
          \ path) |\n| Program counter | Pointing into `libc.so`\u2019s `exit` wrapper\
          \ \u2013 corrupted enough\nthat the unwind tables cannot unwind further\
          \ |\n| Stack pointer   | Potentially overwritten (often the case when a\
          \ buffer\noverflow or out\u2011of\u2011bounds write happens just before\
          \ the call) |\n| Registers       | May contain garbage that makes the next\
          \ instruction\nunintelligible to GDB |\n| Execution context | Inside a signal\
          \ handler or other unsafe context |\n\nBecause the *exit* routine itself\
          \ is not async\u2011signal\u2011safe, calling it from\ninside a handler\
          \ (or from anyplace where the chain of execution is already\nsuspect) is\
          \ **undefined behaviour**. The undefined behaviour manifested as\n\u201C\
          stopped (no\u2011signal)\u201D is the observable symptom we get when the\
          \ kernel cannot\nsafely deliver a real signal to the process.\n\n### 3.\u202F\
          Root\u2011cause analysis\n\nThe root cause is **the use of `exit()` (or\
          \ `std::exit` in C++) from a context\nthat is not the normal program flow**.\
          \ Typical patterns that produce this exact\nstack trace are:\n\n* A signal\
          \ handler that calls `exit()` (e.g. handling `SIGINT`/`SIGTERM` and\ncalling\
          \ `exit(1)` directly).\n* A destructor or cleanup function that calls `exit()`\
          \ while unwinding, after a\nprevious unwind already left the process in\
          \ a partially\u2011destroyed state.\n* A custom \u201Cshell\u201D function\
          \ that calls `exit()` after having already returned an\nerror code, and\
          \ that function is invoked multiple times (e.g., via a callback\nregistered\
          \ after the first error).\n\nIn all of these cases the underlying defect\
          \ is **the program\u2019s assumption that\nit is safe to terminate at that\
          \ moment**. The crash is therefore not a bug in\nthe C library but a bug\
          \ in the program\u2019s termination logic.\n\n### 4.\u202FProposed fixes\n\
          \n#### Minimal local fix\n\nReplace any `exit()` calls that appear *inside*\
          \ a signal handler or inside a\nfunction that may be invoked from a signal\
          \ handler with the async\u2011signal\u2011safe\ncounterpart `_exit()` (or,\
          \ in C++, use a controlled shutdown flag).\n\n```c\n/* Before (problematic)\
          \ */\nstatic void sigint_handler(int sig) {\n    // \u2026 some cleanup\
          \ \u2026\n    exit(1);          // <-- unsafe\n}\n\n/* After (minimal) */\n\
          static void sigint_handler(int sig) {\n    // \u2026 some cleanup \u2026\
          \n    _exit(1);         // <-- async\u2011signal\u2011safe termination\n\
          ```\n\n* `_exit()` terminates the process immediately without running any\
          \ atexit\nhandlers, destructors, or flushing streams \u2013 exactly what\
          \ we need when we are\nalready inside an unsafe context.*\n\nIf the program\
          \ uses C++ and needs to run destructors, a safer pattern is to\n**set a\
          \ global atomic flag from the signal handler and let `main` perform the\n\
          actual exit after the handler returns**:\n\n```c\nstatic sig_atomic_t terminate_requested\
          \ = 0;\n\nstatic void sigint_handler(int) { terminate_requested = 1; }\n\
          \nint main() {\n    struct sigaction sa = { .sa_handler = sigint_handler\
          \ };\n    sigaction(SIGINT, &sa, NULL);\n    \u2026\n    while (!terminate_requested)\
          \ { /* main loop */ }\n    _exit(0);   // safe now that we are back in normal\
          \ context\n}\n```\n\n#### More thorough root\u2011cause fix\n\n1. **Audit\
          \ every place where `exit()` is called.**\n   - Ensure none of them live\
          \ inside signal handlers, async callbacks, or\ndestructor chains that may\
          \ be triggered while unwinding from another exception.\n   - Replace each\
          \ such call with *either*:\n     * a call to `_exit()` **only** if you are\
          \ certain you want immediate\ntermination, **or**\n     * a design change\
          \ that uses a **deferred\u2011exit flag** and lets the normal\ncontrol flow\
          \ call `exit()` *once* from the main execution path.\n\n2. **Add defensive\
          \ checks before invoking `exit_shell()`.**\n   - Guard the call with a boolean\
          \ that indicates whether we are already in a\nclean shutdown state.\n  \
          \ - Example:\n\n```c\n   static bool shutting_down = false;\n\n   void exit_shell(void)\
          \ {\n       if (shutting_down) return;          // already on the way out\n\
          \       shutting_down = true;\n       // \u2026 cleanup (if any) \u2026\n\
          \       _exit(0);                             // safe termination\n   }\n\
          \   ```\n\n3. **Make signal handlers async\u2011signal\u2011safe** by restricting\
          \ them to only\nsetting `sig_atomic_t` variables, queueing work to the main\
          \ loop, and avoiding\nany library calls that might allocate memory or perform\
          \ I/O.\n\n4. **Re\u2011compile with `-Wall -Werror -pedantic` (or equivalent)\
          \ and enable\nsanitizers** (`-fsanitize=address,undefined`) during development.\
          \ This will\nsurface the \"illegal exit from signal context\" pattern at\
          \ compile\u2011time or\nruntime, preventing the crash from ever reaching\
          \ production.\n\n5. **Unit\u2011test the exit path.**\n   - Write tests\
          \ that deliberately raise a signal and verify that the process\nterminates\
          \ cleanly without hitting the \u201Cstopped (no\u2011signal)\u201D state.\n\
          \   - Use tools like `valgrind --tool=memcheck` or `address sanitizer` to\
          \ detect\nuse\u2011after\u2011free or stack corruption that might have paved\
          \ the way for the illegal\n`exit()` call.\n\n### 5.\u202FWhy the two fixes\
          \ differ\n\n* A **minimal fix** merely swaps `exit()` for `_exit()` in the\
          \ hot\u2011spot, which\nstops the immediate crash but does not address the\
          \ underlying design problem\n(multiple exit points, lack of explicit shutdown\
          \ coordination).\n* A **thorough fix** rewrites the termination flow so\
          \ that exit handling is\n*centralised* and *async\u2011signal\u2011safe*.\
          \ This eliminates the possibility of\nre\u2011entering `exit()` from an\
          \ unsafe context, removes race conditions, and makes\nthe shutdown behavior\
          \ deterministic and testable.\n\n### 6.\u202FRecommendation\n\nThe safest\
          \ path is to adopt the more thorough approach because it removes the\nfundamental\
          \ undefined\u2011behaviour source rather than just masking a symptom. If\
          \ a\nquick patch is required, start with the minimal fix of swapping `exit()`\
          \ for\n`_exit()` in any signal\u2011handler or callback that may be reached\
          \ via an\nunexpected stack unwind, and then progressively refactor toward\
          \ the\ncomprehensive solution.\n\n#### Recommendation\n- **Immediate**:\
          \ Replace unsafe `exit()` calls in signal contexts with\n`_exit()`.\n- **Long\u2011\
          term**: Refactor the program to avoid calling termination functions\nfrom\
          \ async\u2011signal\u2011unsafe locations, using flag\u2011based graceful\
          \ shutdowns and\ncomprehensive testing with sanitizers.\n\n##### Recommendation\n\
          - Use `_exit()` (or a flag\u2011based shutdown) wherever `exit()` is invoked\
          \ from\nsignal handlers or other async\u2011unsafe contexts; otherwise restructure\
          \ the code\nto centralise termination logic and ensure only the main thread\
          \ calls `exit()`."
