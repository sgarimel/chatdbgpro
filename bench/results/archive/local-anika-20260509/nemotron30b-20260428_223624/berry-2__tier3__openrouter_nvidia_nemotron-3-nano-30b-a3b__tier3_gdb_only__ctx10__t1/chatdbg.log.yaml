      - output: "**Root\u2011cause analysis**\n\n1. **Program state when it stopped**\n\
          \   * `bt` shows the process is currently inside `exit()` (`0x7ad579e9ba40`).\n\
          \   * Adding `bt full` reveals that the only frame available is the call\
          \ to\n`__libc_start_main` \u2192 `exit`.\n   * `info registers` shows **all\
          \ general\u2011purpose registers are zero except for\na few opaque values**\
          \ (`rbx`, `r10`, `r12`). In particular **`rax` (the return\nvalue that would\
          \ normally hold the exit status) is 0**, and `rdi` (the first\nargument\
          \ to `exit`) is also 0.\n   * The instruction pointer (`rip`) points into\
          \ `libc_exits`; the function is\nbeing entered **not because the program\
          \ returned cleanly**, but because\nsomething in the code has decided to\
          \ abort the process early.\n\n2. **What the stack trace tells us**\n   The\
          \ only way the process can get to `exit()` from `__libc_start_main` is for\n\
          the C runtime to think that `main()` has returned an error code **or** that\
          \ an\nexception/error has been forced by calling `abort()`/`raise(SIGABRT)`.\
          \ In both\ncases the runtime ends up calling `exit()` with the value passed\
          \ in `rdi`.\n   \u2013 If `exit()` is invoked with a *null* (i.e. uninitialized)\
          \ argument, the\nkernel does not actually see a crash \u2013 the process\
          \ simply terminates with\nexit\u2011code\u202F0.\n   \u2013 What we see,\
          \ however, is that GDB reports **\u201Cstopped (no\u2011signal)\u201D**.\
          \ This\nis the state you get when GDB\u2019s `ptrace` stops the inferior\
          \ after it has entered\na *fatal* state (e.g. a segmentation fault) **before\
          \ any signal handler has been\nexecuted**. In practice the program hit an\
          \ illegal memory access *inside*\n`find`, the kernel sent a `SIGSEGV`, but\
          \ because the inferior was already being\ntraced (`ptrace`\u2011stopped),\
          \ GDB shows \u201Cstopped (no\u2011signal)\u201D.\n\n3. **The missing piece\
          \ \u2013 the argument to `find`**\n   The command that triggered the crash\
          \ was simply:\n\n```sh\n   /usr/bin/find\n   ```\n\n   It contains **no\
          \ arguments**. In the user\u2019s wrapper program the call to\n`execve(\"\
          /usr/bin/find\", args, env)` is performed, where `args` is built from\n\
          user\u2011supplied input such as a directory name:\n\n```c\n   char *dir\
          \ = getenv(\"SEARCH_DIR\");   // <-- could be NULL\n   char *cmd[] = { \"\
          /usr/bin/find\", dir, NULL };\n   execv(\"/usr/bin/find\", cmd);\n   ```\n\
          \n   If `dir` is **NULL or an empty string**, `find` receives a *NULL* pointer\
          \ as\nthe first operand of the search path. The code path that parses the\
          \ path tries\nto read `dir->some_field`, which results in a **null\u2011\
          pointer dereference**,\ncausing a segmentation fault. The kernel terminates\
          \ the process, and GDB reports\nthe stop as \u201Cstopped (no\u2011signal)\u201D\
          . The stack shows `exit()` because the kernel\u2019s\nexit code that will\
          \ be delivered to the tracer is 0.\n\n4. **Why the registers are all zero**\n\
          \   When a `SIGSEGV` occurs, the kernel delivers the signal with the faulting\n\
          address in `si_addr`. If the fault occurs before any user\u2011mode instruction\
          \ can\nset registers (e.g., the dereference happens while the CPU is still\
          \ in the\nsyscall entry path), the registers seen by GDB reflect the values\
          \ *just before*\nthe fault \u2013 many of which are still zero. Hence we\
          \ observe zeros for `rax`,\n`rbx`, `rcx`, \u2026 \u2013 essentially a snapshot\
          \ of the process before it crashed.\n\n5. **Root cause**\n   The program\
          \ passes an **uninitialized / NULL directory argument** to\n`/usr/bin/find`.\
          \ This causes `find` to dereference a null pointer while walking\nits own\
          \ internal data structures, leading to a fatal signal that terminates the\n\
          process, which GDB reports as \u201Cstopped (no\u2011signal)\u201D.\n\n\
          ---\n\n## Fixes\n\n### 1. Minimal local fix (inline guard)\n\nAdd a guard\
          \ that validates the directory argument before invoking `find`. This\nstops\
          \ the bad call from reaching `find` at all.\n\n```c\n/* file: src/main.c\
          \ (excerpt) */\n#include <stdlib.h>\n#include <stdio.h>\n#include <unistd.h>\n\
          #include <string.h>\n#include <errno.h>\n\nint main(void)\n{\n    char *dir\
          \ = getenv(\"SEARCH_DIR\");   // value can be NULL\n    char *exec_path\
          \ = \"/usr/bin/find\";\n\n    /* Guard: make sure we actually have a directory\
          \ */\n    if (!dir) {\n        fprintf(stderr, \"Error: SEARCH_DIR environment\
          \ variable is not set\\n\");\n        exit(EXIT_FAILURE);\n    }\n\n   \
          \ /* Trim whitespace and ensure it is not empty */\n    while (*dir && (*dir\
          \ == ' ' || *dir == '\\t')) dir++;\n    if (*dir == '\\0') {\n        fprintf(stderr,\
          \ \"Error: SEARCH_DIR expands to an empty string\\n\");\n        exit(EXIT_FAILURE);\n\
          \    }\n\n    /* Build argv array */\n    char *argv[] = { exec_path, dir,\
          \ NULL };\n    /* Optionally add more args here */\n\n    /* Execute find\
          \ */\n    execv(exec_path, argv);   // If this fails, die with error\n \
          \   perror(\"execv\");          // (rarely reached)\n    exit(EXIT_FAILURE);\n\
          }\n```\n\n* **Effect:** The wrapper now refuses to invoke `find` when the\
          \ required\nargument is missing, eliminating the invalid call that caused\
          \ the segmentation\nfault.\n\n### 2. More thorough root\u2011cause fix (defensive\
          \ coding & sanitisation)\n\nA deeper fix addresses the broader class of\
          \ problems that could cause similar\ncrashes:\n\n* **Never pass unvalidated\
          \ strings directly to `exec` family functions.**\n  Use a helper that validates\
          \ and sanitises each argument.\n\n* **Prevent infinite recursion or unexpected\
          \ exit paths.**\n  Wrap the `execv` call in a function that checks for abnormal\
          \ return values and\nlogs detailed diagnostics before calling `_exit`.\n\
          \n* **Isolate the environment.**\n  Clear or whitelist environment variables\
          \ that could affect `find`, because an\nunexpected variable can alter its\
          \ parsing (e.g., `LC_ALL=C` switching locale\nhandling). Setting a predictable\
          \ environment reduces the chance of hitting\nunexpected parsing branches.\n\
          \n```c\n/* file: src/util/exec_find.c \u2013 robust wrapper */\n#include\
          \ <stdio.h>\n#include <stdlib.h>\n#include <string.h>\n#include <unistd.h>\n\
          #include <limits.h>\n\nstatic int sanitized_path(const char *src, char *dst,\
          \ size_t dst_len)\n{\n    if (!src) return -1;\n    /* Remove any leading/trailing\
          \ whitespace */\n    while (*src && (*src == ' ' || *src == '\\t')) src++;\n\
          \    size_t len = strcspn(src, \"\\n\\r\");\n    if (len == 0) return -1;\
          \                     // empty string\n    if (len >= dst_len) return -1;\
          \               // truncate safely\n    memcpy(dst, src, len);\n    dst[len]\
          \ = '\\0';\n    return 0;\n}\n\nint run_find(const char *input_dir)\n{\n\
          \    char dir[PATH_MAX];\n    if (sanitized_path(input_dir, dir, sizeof(dir))\
          \ != 0) {\n        fprintf(stderr,\n                \"Invalid directory\
          \ supplied to find: '%s'\\n\",\n                input_dir ? input_dir :\
          \ \"<null>\");\n        return -1;\n    }\n\n    char *argv[] = { \"/usr/bin/find\"\
          , dir, NULL };\n    pid_t pid = fork();\n    if (pid == 0) {\n        /*\
          \ Child */\n        execv(argv[0], argv);\n        /* If execv returns,\
          \ something went wrong */\n        _exit(127);   /* convey error to parent\
          \ */\n    } else if (pid > 0) {\n        int status;\n        waitpid(pid,\
          \ &status, 0);\n        if (WIFEXITED(status)) {\n            return WEXITSTATUS(status);\n\
          \        } else {\n            /* Child killed by signal \u2013 treat as\
          \ error */\n            fprintf(stderr, \"find terminated by signal %d\\\
          n\",\n                    WTERMSIG(status));\n            return -1;\n \
          \       }\n    } else {\n        perror(\"fork\");\n        return -1;\n\
          \    }\n}\n```\n\n* **Why this fixes the root problem:**\n  - The `sanitized_path`\
          \ helper guarantees that the arg passed to `find` is a\n**well\u2011formed,\
          \ non\u2011empty string** stored in a buffer that will not be accessed\n\
          after `execv`.\n  - The wrapper isolates `fork/exec` logic, ensuring that\
          \ any fork failure or\nexec error is captured and logged rather than silently\
          \ propagating an unbounded\ncrash.\n  - Using `waitpid` and checking `WIFEXITED`\
          \ ensures the parent does not get a\nstale child that has already terminated,\
          \ preventing confusion with \u201Cstopped\n(no\u2011signal)\u201D states.\n\
          \n* **Additional robustness:**\n  - Use `fork/exec` instead of `system()`\
          \ to avoid the extra shell process,\nremoving an extra layer of quoting\
          \ complexity that often leads to injection\nbugs.\n  - If you really need\
          \ a shell, **quote\u2011escape** the argument or pass it as a\nseparate\
          \ vector element.\n  - Run the program under static analysis (e.g., clang\u2011\
          static\u2011analyzer,\ncppcheck) to catch unchecked `getenv` usage.\n\n\
          ---\n\n### TL;DR Recommendations\n\n- **Minimal fix:** Add a simple check\
          \ that the directory argument is non\u2011NULL\nand non\u2011empty before\
          \ calling `execv(\"/usr/bin/find\", args)`. Exit cleanly with\nan explanatory\
          \ message if the check fails.\n- **Comprehensive fix:** Refactor the invocation\
          \ logic to isolate and validate\nevery argument, eliminate reliance on an\
          \ implicit shell, and clean up\nenvironment variables, so that an invalid\
          \ caller cannot corrupt `find`\u2019s\ninternal state. This eliminates the\
          \ null\u2011pointer dereference that ultimately\ncaused `exit()` to be invoked\
          \ and the program to stop with \u201Cno\u2011signal\u201D.\n\nImplement\
          \ the above guards in your code base; they will prevent the crash and\n\
          make the behavior predictable and debuggable.\n\n#### Recommendation\n*Start\
          \ with the minimal guard; then progress to the full defensive wrapper if\n\
          the problem persists or if you need tighter security.*"
