      - output: |-
          The crash at line 33 is caused by an undersized allocation in `make_records`,
          due to 32-bit integer overflow when computing the allocation size.

          At the crash:

          ```cpp
          uint32_t n = 70'000'000u;
          Record *rs = make_records(n);
          ...
          rs[n - 1].id = 42;
          ```

          `n` is `70,000,000`, and `rs` is non-null:

          ```text
          n  = 70000000
          rs = 0x0000000102504800
          ```

          `Record` is defined as:

          ```cpp
          struct Record {
              uint64_t id;         // 8 bytes
              uint64_t score;      // 8 bytes
              uint64_t payload[6]; // 48 bytes
          };                       // total: 64 bytes
          ```

          So the requested allocation size should be:

          ```text
          70,000,000 * 64 = 4,480,000,000 bytes
          ```

          But `make_records` computes the size using a `uint32_t`:

          ```cpp
          static Record *make_records(uint32_t count) {
              uint32_t bytes = count * (uint32_t)sizeof(Record);
              Record *r = (Record *)std::malloc(bytes);
              if (!r) return nullptr;
              std::memset(r, 0, bytes);
              return r;
          }
          ```

          `4,480,000,000` is larger than `UINT32_MAX`, which is `4,294,967,295`, so the
          multiplication wraps modulo `2^32`.

          The actual value assigned to `bytes` is:

          ```text
          4,480,000,000 - 4,294,967,296 = 185,032,704 bytes
          ```

          That is enough space for only:

          ```text
          185,032,704 / 64 = 2,891,136 records
          ```

          But `main` believes it has space for `70,000,000` records.

          Then line 33 writes to:

          ```cpp
          rs[n - 1].id
          ```

          That is index:

          ```text
          69,999,999
          ```

          The byte offset of that element is:

          ```text
          69,999,999 * 64 = 4,479,999,936 bytes
          ```

          So the program writes approximately `4.48 GB` past the start of the allocation,
          while the allocation is only about `185 MB`.

          The bad address matches this calculation:

          ```text
          rs base address:        0x102504800
          offset for rs[n - 1]:   0x10b075fc0
          computed address:       0x20d57a7c0
          crash address:          0x20d57a7c0
          ```

          So line 33 is not inherently wrong if the allocation were correct. The root
          defect is here:

          ```cpp
          uint32_t bytes = count * (uint32_t)sizeof(Record);
          ```

          The allocation size is computed in 32-bit arithmetic and overflows.

          ### Minimal local fix

          Use `size_t` for the allocation size and check for multiplication overflow
          before allocating:

          ```cpp
          #include <limits>

          static Record *make_records(uint32_t count) {
              size_t n = static_cast<size_t>(count);

              if (n > std::numeric_limits<size_t>::max() / sizeof(Record)) {
                  return nullptr;
              }

              size_t bytes = n * sizeof(Record);

              Record *r = static_cast<Record *>(std::malloc(bytes));
              if (!r) return nullptr;

              std::memset(r, 0, bytes);
              return r;
          }
          ```

          On a typical 64-bit platform, this correctly computes:

          ```text
          bytes = 4,480,000,000
          ```

          Then either the allocation succeeds and `rs[n - 1]` is valid, or `malloc`
          returns `nullptr` and the existing `OOM` path in `main` runs.

          An even shorter version could use `calloc`, which performs zero-initialization
          and may detect multiplication overflow in some implementations:

          ```cpp
          static Record *make_records(uint32_t count) {
              return static_cast<Record *>(std::calloc(static_cast<size_t>(count), sizeof(Record)));
          }
          ```

          However, relying only on `calloc` for overflow detection is less explicit than
          doing the check yourself.

          ### More thorough root-cause fix

          The deeper issue is that the code represents sizes and counts using `uint32_t`
          even though the byte size of the allocation can exceed 32 bits. Allocation sizes
          should use `size_t`, and the API should avoid truncating large counts.

          A more robust C++ version would be:

          ```cpp
          #include <cstddef>
          #include <cstdio>
          #include <cstdlib>
          #include <cstring>
          #include <limits>

          struct Record {
              uint64_t id;
              uint64_t score;
              uint64_t payload[6];
          };

          static Record *make_records(size_t count) {
              if (count > std::numeric_limits<size_t>::max() / sizeof(Record)) {
                  return nullptr;
              }

              size_t bytes = count * sizeof(Record);

              Record *r = static_cast<Record *>(std::malloc(bytes));
              if (!r) return nullptr;

              std::memset(r, 0, bytes);
              return r;
          }

          int main() {
              size_t n = 70'000'000ull;

              Record *rs = make_records(n);
              if (!rs) {
                  std::fprintf(stderr, "OOM\n");
                  return 1;
              }

              rs[n - 1].id = 42;

              std::printf("wrote id=%llu at index %zu\n",
                          static_cast<unsigned long long>(rs[n - 1].id),
                          n - 1);

              std::free(rs);
              return 0;
          }
          ```

          In modern C++, the better design would be to use `std::vector<Record>` and let
          the standard library manage the allocation size:

          ```cpp
          #include <vector>
          #include <cstdio>
          #include <cstdint>
          #include <exception>

          struct Record {
              uint64_t id;
              uint64_t score;
              uint64_t payload[6];
          };

          int main() {
              size_t n = 70'000'000ull;

              try {
                  std::vector<Record> rs(n);

                  rs[n - 1].id = 42;

                  std::printf("wrote id=%llu at index %zu\n",
                              static_cast<unsigned long long>(rs[n - 1].id),
                              n - 1);
              } catch (const std::bad_alloc &) {
                  std::fprintf(stderr, "OOM\n");
                  return 1;
              }

              return 0;
          }
          ```

          This avoids manual byte-count arithmetic and prevents this specific integer-
          overflow allocation bug.

          ##### Recommendation

          Fix `make_records` so the allocation size is computed in `size_t`, not
          `uint32_t`, and check for multiplication overflow before calling `malloc`. For a
          more complete fix, change count/size APIs to use `size_t` throughout or replace
          the raw allocation with `std::vector<Record>`.
