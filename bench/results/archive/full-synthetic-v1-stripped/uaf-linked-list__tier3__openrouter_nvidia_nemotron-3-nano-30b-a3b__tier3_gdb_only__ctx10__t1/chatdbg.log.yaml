          \ | Uninitialized / freed memory. | The\npointer is used **after** the node\
          \ it points to has been deallocated, causing\nundefined behaviour that the\
          \ sanitizer reports as \u201CUse of deallocated memory\u201D. |\n\nThe stack\
          \ trace confirms that the crash happens precisely at the statement `cur\n\
          = cur->next;` inside `destroy_list`. The program has already called `delete\n\
          cur;` on line\u202F13, freeing the memory, and then immediately tries to\
          \ read from\nthat memory in the increment step.\n\n---\n\n### Minimal local\
          \ fix\n\nChange the body of `destroy_list` so that the *next* pointer is\
          \ saved **before**\nthe current node is deleted:\n\n```cpp\nstatic void\
          \ destroy_list(Node *head) {\n    while (head) {\n        Node *next = head->next;\
          \   // save next node\n        delete head;               // free current\
          \ node\n        head = next;               // advance to saved next node\n\
          \    }\n}\n```\n\n*Why this works*: `next` holds a valid pointer to the\
          \ next node **before** the\ndelete, so the loop can safely advance without\
          \ ever dereferencing freed memory.\n\nA one\u2011line alternative (still\
          \ safe) is:\n\n```cpp\nfor (Node *cur = head; cur; cur = cur->next) {\n\
          \    Node *tmp = cur;\n    delete tmp;\n}\n```\n\nHere `cur->next` is accessed\
          \ **before** the delete, eliminating the UAF.\n\n---\n\n### More thorough\
          \ root\u2011cause fix\n\nWhile the minimal fix resolves the immediate crash,\
