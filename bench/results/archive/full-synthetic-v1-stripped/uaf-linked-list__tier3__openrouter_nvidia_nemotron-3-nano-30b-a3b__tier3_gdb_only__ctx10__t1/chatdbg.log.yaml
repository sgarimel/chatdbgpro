          \ wrapper to ensure deterministic cleanup.\n\n2. **Double\u2011free protection**\
          \ \u2013 ensure `destroy_list` is not called on a list\nthat has already\
          \ been destroyed. A common pattern is to set the head pointer to\n`nullptr`\
          \ after destruction or to provide a separate \u201Cis_destroyed\u201D flag.\n\
          \n3. **Interface design** \u2013 instead of raw `Node*`, expose a container\
          \ (e.g., a\nsingly\u2011linked `List` class) that manages its own lifetime,\
          \ providing `clear()`\nthat internally uses the safe deletion pattern. This\
          \ isolates the unsafe logic\nto a single well\u2011tested place.\n\n4. **Testing\
          \ with sanitizers** \u2013 compile with `-fsanitize=address,undefined` and\n\
          run the program under Valgrind or ASan to catch similar UAF bugs automatically.\n\
          \nA more thorough rewrite might look like:\n\n```cpp\nstruct Node {\n  \
          \  int   value;\n    Node *next;\n    ~Node() = default;               //\
          \ no special work needed\n};\n\nclass LinkedList {\n    Node *head_;\npublic:\n\
          \    explicit LinkedList(Node *h = nullptr) : head_(h) {}\n    ~LinkedList()\
          \ { clear(); }\n\n    void clear() {\n        while (head_) {\n        \
          \    Node *next = head_->next;\n            delete head_;\n            head_\
          \ = next;\n        }\n    }\n\n    // non\u2011copyable, move\u2011able\
          \ if desired\n    LinkedList(const LinkedList&) = delete;\n    LinkedList&\
          \ operator=(const LinkedList&) = delete;\n    LinkedList(LinkedList&& other)\
