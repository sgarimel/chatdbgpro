          because `argc` is `4`.

          Then:

          ```c
          double m = mean_of_args(argc - 1, argv + 1);
          ```

          passes:

          ```c
          n == 3
          argv == &original_argv[1]
          argv[0] == "10"
          argv[1] == "20"
          argv[2] == "30"
          ```

          Inside `mean_of_args()`:

          ```c
          double sum;
          ```

          `sum` has automatic storage duration and no initializer, so its value is
          indeterminate.

          Then the loop executes:

          ```c
          for (int i = 0; i < n; i++) {
              sum += atof(argv[i]);
          }
          ```

          Iteration by iteration:

          ```c
          i == 0
          atof(argv[0]) == atof("10") == 10.0
          sum = garbage + 10.0
          ```

          ```c
          i == 1
          atof(argv[1]) == atof("20") == 20.0
          sum = garbage + 30.0
          ```

          ```c
          i == 2
          atof(argv[2]) == atof("30") == 30.0
          sum = garbage + 60.0
          ```

          Then:

          ```c
          return sum / (double)n;
          ```

          returns:

          ```c
          m == (garbage + 60.0) / 3.0
          ```

          That value is then printed and checked:

          ```c
          printf("mean = %f\n", m);

          if (m < 0.0 || m > 100.0) {
              fprintf(stderr, "assertion failed: mean=%f out of range\n", m);
              abort();
          }
          ```

          The check is intended to catch impossible percentage means. The command-line
          inputs are valid percentages, so the mean should be in range. The fact that it
          is not comes from the uninitialized `sum`, not from the input.

          Minimal local fix:

          ```c
          static double mean_of_args(int n, char **argv) {
              double sum = 0.0;        /* running total of the parsed values */
              for (int i = 0; i < n; i++) {
                  sum += atof(argv[i]);
              }
              return sum / (double)n;
          }
          ```

          A more thorough root-cause fix would also avoid `atof()`, because `atof()` gives
          no reliable way to detect invalid input. Since the program assumes inputs are
          percentages in `[0, 100]`, it should parse with `strtod()`, validate the full
          string was consumed, validate the range of each input, and avoid computing a
          mean from bad data.

          Example:

          ```c
          #include <errno.h>
          #include <stdio.h>
          #include <stdlib.h>

          static int parse_percentage(const char *s, double *out) {
              char *end = NULL;

              errno = 0;
              double value = strtod(s, &end);

              if (errno != 0 || end == s || *end != '\0') {
                  return 0;
              }

              if (value < 0.0 || value > 100.0) {
                  return 0;
              }

              *out = value;
              return 1;
          }

          static int mean_of_args(int n, char **argv, double *out_mean) {
              if (n <= 0) {
                  return 0;
              }

              double sum = 0.0;

              for (int i = 0; i < n; i++) {
                  double value;

                  if (!parse_percentage(argv[i], &value)) {
                      fprintf(stderr, "invalid percentage: %s\n", argv[i]);
                      return 0;
                  }

                  sum += value;
              }

              *out_mean = sum / (double)n;
              return 1;
          }

          int main(int argc, char **argv) {
              if (argc < 2) {
                  fprintf(stderr, "usage: %s v1 v2 ...\n", argv[0]);
                  return 2;
              }

              double m;

              if (!mean_of_args(argc - 1, argv + 1, &m)) {
                  return 2;
              }

              printf("mean = %f\n", m);
              return 0;
          }
          ```

          The minimal fix is sufficient for the immediate crash. The more thorough fix
          addresses the underlying input-handling assumptions and makes the program fail
          cleanly on malformed or out-of-range input.

          ##### Recommendation

          Initialize the accumulator immediately:

          ```c
          double sum = 0.0;
          ```

          Then, as a stronger follow-up, replace `atof()` with checked `strtod()` parsing
          and validate each argument is a percentage in `[0, 100]`.
