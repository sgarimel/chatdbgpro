          \ free. |\n\n---\n\n## Minimal local fix\n\nThe **quickest** change that\
          \ stops the crash is to **eliminate the premature\n`free(b->name)`** in\
          \ the error path of `load_blob`:\n\n```c\nstatic blob_t *load_blob(const\
          \ char *name) {\n    blob_t *b = malloc(sizeof(blob_t));\n    if (!b) return\
          \ 0;\n    b->name = strdup(name);\n    if (!b->name) {               /*\
          \ out\u2011of\u2011memory */\n        free(b);\n        return 0;\n    }\
