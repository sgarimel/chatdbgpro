          \    return b;\n}\n```\n\n*Effect*: The name buffer remains owned by the\
          \ returned `blob_t`. The sole place\nthat frees it is `destroy_blob`, so\
          \ it is freed exactly once.\n\n---\n\n## More thorough root\u2011cause fix\n\
          \nA deeper, safer redesign would avoid returning a partially\u2011initialized\
          \ blob from\na function that has already encountered an unrecoverable condition:\n\
          \n```c\n/* Revised load_blob */\nstatic blob_t *load_blob(const char *name)\
