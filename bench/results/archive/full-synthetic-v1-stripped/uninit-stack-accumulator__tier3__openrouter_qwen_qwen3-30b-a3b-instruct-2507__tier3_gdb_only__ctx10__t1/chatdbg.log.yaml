          \ code is not in the current directory.\n   - The build directory does not\
          \ contain the source.\n   - The binary is compiled without debug symbols\
          \ or with stripped symbols.\n\n---\n\n### Root Cause Analysis:\n\nGiven\
          \ the evidence:\n\n- A `SIGSTOP` signal was delivered, which is **not a\
          \ crash** but a **manual\nsuspension**.\n- The program immediately stopped\
          \ with no stack trace, likely before `main()`\ncould be entered.\n- The\
          \ instruction pointer (`rip`) is set to `0xffffffffffffffff`, which is not\
