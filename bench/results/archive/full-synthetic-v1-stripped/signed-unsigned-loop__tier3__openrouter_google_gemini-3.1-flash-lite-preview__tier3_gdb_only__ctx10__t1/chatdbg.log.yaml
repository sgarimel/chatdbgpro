      - output: |-
          The root cause of the crash is an integer underflow in the loop termination
          condition within `print_reverse`.

          ### Program State Analysis

          1.  **The Loop Termination Condition:**
              The loop is defined as: `for (size_t i = v.size() - 1; i >= 0; i--)`
              *   `i` is declared as a `size_t`, which is an **unsigned** integer type.
              *   When the function is called with an empty vector (`empty`), `v.size()`
          is `0`.
              *   The initialization `size_t i = v.size() - 1` results in `i = 0 - 1`.
          Since `i` is an unsigned integer, this causes an underflow, wrapping `i` around
          to the maximum possible value for `size_t` (e.g., `18446744073709551615` on a
          64-bit system).
              *   The loop condition `i >= 0` is always true for an unsigned integer,
          leading the loop to attempt to access memory at `v[i]` where `i` is a huge
          value, causing an out-of-bounds memory access (heap buffer overflow).

          2.  **The Defect:**
              Even when the vector is not empty, this loop design is fragile. For `v =
          {10, 20, 30}`, `i` starts at `2`. The loop executes for `i = 2, 1, 0`. When `i`
          is `0`, the loop body executes, and then `i--` is performed. `0 - 1` underflows
          the unsigned `size_t` variable `i`, setting it to the maximum `size_t` value.
          The loop continues to run infinitely (or until a crash occurs) instead of
          terminating.

          ### Root Cause

          The use of an unsigned integer (`size_t`) for a loop variable that needs to
          represent negative values or be compared against `0` in a decrementing loop is a
          common programming error. In C++, unsigned arithmetic wraps around, and unsigned
          values can never be less than zero.

          ### Recommendation

          #### Minimal Fix
          Change the loop to check the condition before decrementing, or use a signed
          integer (though `size_t` is preferred for indexing).

          ```cpp
          static void print_reverse(const std::vector<int>& v) {
              if (v.empty()) return; // Handle empty case explicitly
              for (size_t i = v.size(); i-- > 0; ) {
                  std::printf("%d\n", v[i]);
              }
          }
          ```

          #### Thorough Fix
          The most robust approach is using reverse iterators, which are specifically
          designed to handle traversal from the end to the beginning without needing
          manual index calculation and avoiding underflow issues entirely.

          ```cpp
          static void print_reverse(const std::vector<int>& v) {
              for (auto it = v.rbegin(); it != v.rend(); ++it) {
                  std::printf("%d\n", *it);
              }
          }
          ```
