          \ happened?**\n   * `make_records` most likely does something equivalent\
          \ to\n```c\n     Record *make_records(uint32_t n) {\n         return malloc(n\
          \ * sizeof(Record));\n     }\n     ```\n   * The multiplication `n * sizeof(Record)`\
          \ is performed in **`size_t`**\n(typically 64\u2011bit on macOS) but the\
          \ intermediate cast from `uint32_t` to the\nmultiplication type can still\
          \ overflow if the product exceeds the addressable\nrange of the underlying\
          \ type, or if the library uses a 32\u2011bit `size_t`.\n   * With `n = 70\u202F\
          000\u202F000` and `sizeof(Record)` (e.g., 16\u202Fbytes), the product is\n\
          ~1.12\u202FGB, which **does not overflow a 64\u2011bit size_t**, but on\
          \ many embedded or\n32\u2011bit\u2011compatible builds the size type may\
          \ be 32\u2011bit. In a 32\u2011bit `size_t` the\nproduct overflows, producing\
          \ a *much smaller* allocation size (often wrapping to\na few kilobytes).\n\
          \   * The returned pointer therefore points to a tiny block (e.g., a few\n\
          kilobytes).\n   * Writing to `rs[n\u20111]` indexes far beyond that block\
          \ (`n\u20111 \u2248 70\u202FM`). The\naddress `0x20d57a7c0` belongs to a\
          \ guard page or unmapped region, triggering\n`EXC_BAD_ACCESS (code=2)`.\n\
          \n3. **Why the check `if (!rs)` does not catch it**\n   * The allocation\
          \ succeeded (returned a non\u2011null pointer), even though the\nrequested\
          \ size was reduced by the overflow. Therefore the OOM guard never fired.\n\
          \n4. **Conclusion**\n   The crash is an **integer overflow in the allocation\
          \ calculation** that\nresults in a too\u2011small buffer, leading to an\
          \ out\u2011of\u2011bounds write to `rs[n\u20111]`.\n\n---\n\n## Minimal\
          \ local fix\n\nPatch the allocation site to detect overflow before calling\
          \ `make_records`:\n\n```cpp\nuint32_t n = 70'000'000u;\n\n/* Compute the\
          \ required byte size safely */\nsize_t bytes_needed = static_cast<size_t>(n)\
          \ * sizeof(Record);\nif (bytes_needed / sizeof(Record) != static_cast<size_t>(n)\
