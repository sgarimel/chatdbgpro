      - output: "The crash occurs in the `destroy_list` function when attempting to\
          \ access memory\nafter it has already been freed. The stack trace and program\
          \ logic suggest a\nclassic **use-after-free (UAF)** bug.\n\nLet\u2019s analyze\
          \ the root cause step by step:\n\n---\n\n### **1. Understanding the Program\
          \ Flow**\n- `main()` creates a linked list:\n  - `a -> b -> c -> nullptr`\n\
          - `a` has value 1, `b` has value 2, `c` has value 3.\n- `destroy_list(a)`\
          \ is called to free all nodes.\n\n---\n\n### **2. The Bug in `destroy_list`**\n\
          The function is:\n```cpp\nstatic void destroy_list(Node *head) {\n    for\
          \ (Node *cur = head; cur != nullptr; cur = cur->next) {\n        delete\
          \ cur;\n    }\n}\n```\n\n#### **Problem**:\n- `cur = cur->next` is executed\
          \ **after** `delete cur`.\n- After `delete cur`, the memory pointed to by\
          \ `cur` is **freed**.\n- But `cur->next` is still being accessed **after\
          \ the memory has been\ndeallocated**, which leads to **undefined behavior**.\n\
          \n#### **When does this happen?**\n- In the **first iteration**: `cur =\
          \ a`.\n  - `delete a` is called.\n  - Now `a` is freed.\n  - Then, `cur\
          \ = cur->next` \u2192 `cur = a->next` \u2192 `cur = b`.\n- In the **second\
          \ iteration**: `cur = b`.\n  - `delete b`.\n  - Then, `cur = b->next` \u2192\
          \ `cur = c`.\n- In the **third iteration**: `cur = c`.\n  - `delete c`.\n\
          \  - Then, `cur = c->next` \u2192 `cur = nullptr`.\n\nSo far, it seems okay?\
          \ But **the key issue is not in the logic but in the data\naccess after\
          \ deletion**.\n\nWait \u2014 the **crash happens on the `delete cur`** line\
          \ **in the loop**, not on\naccessing `cur->next`. But **ASan (AddressSanitizer)**\
          \ detected **use-after-\nfree**, implying that some memory was accessed\
          \ after being freed \u2014 which\nsuggests `cur->next` might be accessed\
          \ *before* the `delete` line? No \u2014 it\u2019s\naccessed *after* the\
          \ `delete`.\n\nWait \u2014 let's revisit: `cur = cur->next` is evaluated\
          \ **before** the next\niteration, **after** `delete cur`. That means the\
          \ program is trying to read\n`cur->next` **from memory that was just freed**.\n\
          \nThat is the **actual bug**:\n> **The access to `cur->next` is invalid**\
          \ because `cur` was just freed via\n`delete cur`.\n> Accessing `cur->next`\
          \ after `delete cur` is **undefined behavior** due to use-\nafter-free.\n\
          \n### **Why the crash occurs:**\n- After `delete cur`, the memory is freed.\n\
          - Then, `cur = cur->next` attempts to access the `next` pointer of a freed\n\
          object.\n- Even though that memory is technically still present (until it\u2019\
          s reused), ASan\ndetects this access as **use-after-free** and crashes.\n\
          \nSo the loop structure:\n```cpp\nfor (Node *cur = head; cur != nullptr;\
          \ cur = cur->next) {\n    delete cur;  // cur is now invalid\n}\n```\nIs\
          \ incorrect because:\n- After `delete cur`, `cur` is a dangling pointer.\n\
          - The `cur = cur->next` expression attempts to read `cur->next` from a dangling\n\
          pointer \u2192 **UB \u2192 ASan crashes**.\n\n---\n\n### **Root Cause Summary**\n\
          The loop attempts to read `cur->next` **after** the object has been deallocated.\n\
          Even though the next node (`b`, `c`) is still valid, the pointer `cur` is\
          \ now\ndangling, and `cur->next` is **dereferenced after deletion**, triggering\
          \ a use-\nafter-free error.\n\nThis is **not** a double-free or null-check\
          \ error, but a **misordering of\noperations in a loop**.\n\n---\n\n### **Minimal\
          \ Fix (Local Fix)**\nChange the order of operations: **save the next pointer\
          \ before deleting**.\n\n```cpp\nstatic void destroy_list(Node *head) {\n\
          \    for (Node *cur = head; cur != nullptr; ) {\n        Node *next = cur->next;\
          \  // Save next *before* deleting cur\n        delete cur;\n        cur\
          \ = next;             // Move to next node\n    }\n}\n```\n\nThis fix **prevents**\
          \ reading `cur->next` from a freed object, because `cur` is\nno longer accessed\
          \ after `delete`.\n\n---\n\n### **Thorough Fix (Best Practice)**\nThis is\
          \ also a classic case where RAII and smart pointers would prevent the\n\
          whole issue. However, since this is a manual memory management context,\
          \ the\nminimal fix above is sufficient.\n\nBut if you want to avoid manual\
          \ `new/delete` entirely, use `std::unique_ptr`:\n\n```cpp\n#include <memory>\n\
          \nstruct Node {\n    int value;\n    std::unique_ptr<Node> next;  // Smart\
          \ pointer\n};\n\nstatic void destroy_list(std::unique_ptr<Node>& head) {\n\
          \    while (head) {\n        head = std::move(head->next);  // Automatically\
          \ deletes the node\n    }\n    // No need for explicit loop: the unique_ptr\
          \ handles deletion\n}\n\nint main() {\n    auto c = std::make_unique<Node>(Node{3,\
          \ nullptr});\n    auto b = std::make_unique<Node>(Node{2, std::move(c)});\n\
          \    auto a = std::make_unique<Node>(Node{1, std::move(b)});\n\n    destroy_list(a);\n\
          \    std::printf(\"done\\n\");\n    return 0;\n}\n```\n\nThis eliminates\
          \ the risk of use-after-free entirely.\n\n---\n\n### **Conclusion**\n- **Root\
          \ cause**: The loop accesses `cur->next` **after** deleting `cur`, even\n\
          though it\u2019s not directly on a freed node, the pointer `cur` becomes\
          \ dangling and\naccessing its member triggers ASan.\n- **Minimal fix**:\
          \ Save `cur->next` before `delete cur`.\n- **Recommended fix**: Use `std::unique_ptr`\
          \ for safe, RAII-based memory\nmanagement.\n\n---\n\n##### Recommendation\n\
          1. Apply the minimal fix by saving `cur->next` before `delete cur`:\n```cpp\n\
          \   static void destroy_list(Node *head) {\n       for (Node *cur = head;\
          \ cur != nullptr; ) {\n           Node *next = cur->next;\n           delete\
          \ cur;\n           cur = next;\n       }\n   }\n   ```\n2. For a more robust\
          \ and safe fix, refactor the code to use\n`std::unique_ptr<Node>` to eliminate\
          \ manual memory management entirely."
