      - output: |-
          The root cause of the crash is a "Use-After-Free" error occurring within the
          `destroy_list` function.

          ### Walkthrough of the program state:

          1.  **Initialization**: In `main`, a linked list is constructed: `a` -> `b` ->
          `c`.
              * `a` (value 1) points to `b`.
              * `b` (value 2) points to `c`.
              * `c` (value 3) points to `nullptr`.
          2.  **`destroy_list(a)`**: Called from `main` at line 21.
          3.  **The Loop (`for` loop at line 12)**:
              * **First iteration**: `cur` points to `a`. `delete cur` (line 13) frees the
          memory pointed to by `a`.
              * **Loop increment**: The loop attempts to evaluate `cur = cur->next`.
          Because `cur` (the node `a`) has already been deallocated in the previous line,
          accessing `cur->next` is a Use-After-Free. The memory where `a->next` was stored
          is no longer valid or accessible as a `Node` object.

          ### The Defect:
          The loop structure `for (Node *cur = head; cur != nullptr; cur = cur->next)`
          attempts to access the `next` pointer of the current node *after* the current
          node has already been deleted.

          ### Fixes:

          #### Minimal Local Fix:
          To fix this, you must store the address of the next node *before* deleting the
          current node, so that you can continue the loop safely.

          ```cpp
          static void destroy_list(Node *head) {
              Node *cur = head;
              while (cur != nullptr) {
                  Node *next_node = cur->next; // Store next before deleting
                  delete cur;
                  cur = next_node; // Move to the stored next node
              }
          }
          ```

          #### Root-Cause Fix:
          The root cause is a pattern that is inherently unsafe for manual memory
          management. Using raw pointers and manual `delete` calls is error-prone. The
          better, more robust approach is to:
          1.  **Use Modern C++ containers**: Use `std::unique_ptr` for node ownership or
          `std::list` / `std::forward_list` from the standard library to manage memory
          automatically. If you use `std::unique_ptr<Node>`, you would not need to
          manually delete nodes in a loop, as the destructor would handle the cleanup
          recursively.

          ##### Recommendation

          I have identified the root cause of the crash. To resolve it, apply the "minimal
          local fix" provided above: cache the `next` pointer before calling `delete` on
          the current node. For long-term maintainability, consider refactoring the code
          to use smart pointers (`std::unique_ptr`) to avoid manual memory management
          errors entirely.
