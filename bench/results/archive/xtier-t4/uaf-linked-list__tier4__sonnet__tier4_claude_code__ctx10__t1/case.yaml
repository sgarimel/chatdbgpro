id: uaf-linked-list
language: cpp
source_file: program.cpp
description: >
  destroy_list uses the standard `for` loop increment clause to read
  `cur->next` *after* deleting `cur`. AddressSanitizer reports a
  heap-use-after-free inside destroy_list on the second iteration.

build:
  compiler: clang++
  flags: ["-g", "-O0", "-std=gnu++17", "-fno-omit-frame-pointer", "-fsanitize=address"]

run:
  args: []
  stdin: ""
  env: {}
  expected_crash: true

bug:
  category: use_after_free
  error_type: iterator_invalidation
  root_cause_lines: [12]
  related_lines: [13]

criteria:
  root_cause: >
    The response must identify that the `for` loop's increment expression
    `cur = cur->next` evaluates after `delete cur` has already freed the
    node, so the `->next` read on the next iteration dereferences freed
    memory. Simply saying "use-after-free" without identifying the
    interaction between `delete cur` and the subsequent `cur->next`
    access is insufficient.

  local_fix: >
    Save the next pointer before deleting. For example:
      while (cur) { Node *n = cur->next; delete cur; cur = n; }
    Equivalent variants with an explicit temporary inside the for-loop
    body are also acceptable.

  global_fix: >
    A root-cause fix replaces the hand-written pointer dance with an
    abstraction where this class of mistake is inexpressible. Acceptable:
      - use std::unique_ptr<Node> for `next`, so the destructor handles
        the walk automatically,
      - use std::forward_list / std::list and rely on its destructor,
      - or factor a correct `next_and_delete` helper and use it at
        every call site.
    A bare temporary save in the loop counts as a local fix, not a
    global one.
