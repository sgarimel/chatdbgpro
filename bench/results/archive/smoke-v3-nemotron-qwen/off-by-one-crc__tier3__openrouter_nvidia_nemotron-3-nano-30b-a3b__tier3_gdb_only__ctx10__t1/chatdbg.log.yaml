      - output: "### 1.  Program state at the moment of the crash\n\n| Variable /\
          \ Symbol | Value (from the back\u2011trace & source) | Meaning |\n|-------------------|--------------------------------------|---------|\n\
          | `buf`             | `{0x01,0x02,0x03,0x04,0x05,0x06,0x07}` (7 bytes) |\
