          The later check is too late:

          ```c
          if (((size_t)(input_end - input_buffer->content) >= input_buffer->length) || (*input_end != '\"'))
          {
              goto fail;
          }
          ```

          That check occurs only after the `while` loop exits. But for an unterminated
          string, the loop never reaches a closing quote, so it attempts the out-of-bounds
          read before this check can run.

          ## Root cause

          The root cause is not merely that the input JSON is malformed. Malformed JSON is
          expected input for a parser and should be handled safely.

          The actual defect is that `parse_string()` scans for the closing quote without
          checking whether the scan pointer is still within `input_buffer->length`.

          Specifically, this line is unsafe:

          ```c
          while (*input_end != '\"')
          ```

          It should not dereference `input_end` until after confirming that `input_end`
          points inside the parse buffer.

          ## Minimal local fix

          Change the first scan loop in `parse_string()` so it checks bounds before
          dereferencing `input_end`.

          For example:

          ```c
          {
              /* calculate approximate size of the output (overestimate) */
              size_t allocation_length = 0;
              size_t skipped_bytes = 0;

              while (((size_t)(input_end - input_buffer->content) < input_buffer->length) &&
                     (*input_end != '\"'))
              {
                  /* is escape sequence */
                  if (input_end[0] == '\\')
                  {
                      if ((size_t)(input_end + 1 - input_buffer->content) >= input_buffer->length)
                      {
                          /* prevent buffer overflow when last input character is a backslash */
                          goto fail;
                      }
                      skipped_bytes++;
                      input_end++;
                  }
                  input_end++;
              }

              if (((size_t)(input_end - input_buffer->content) >= input_buffer->length) ||
                  (*input_end != '\"'))
              {
                  goto fail; /* string ended unexpectedly */
              }

              allocation_length = (size_t)(input_end - buffer_at_offset(input_buffer)) - skipped_bytes;
              output = (unsigned char*)input_buffer->hooks.allocate(allocation_length + sizeof(""));
              if (output == NULL)
              {
                  goto fail; /* allocation failure */
              }
          }
          ```

          This preserves the existing behavior but prevents the out-of-bounds read. With
          the bad input `"abc`, the loop reaches the end of the buffer and then cleanly
          goes to `fail`.

          A slightly cleaner version avoids repeated pointer arithmetic:

          ```c
