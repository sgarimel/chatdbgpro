                  (*input_end != '\"'))
              {
                  goto fail;
              }

              allocation_length = (size_t)(input_end - buffer_at_offset(input_buffer)) - skipped_bytes;
              output = (unsigned char*)input_buffer->hooks.allocate(allocation_length + sizeof(""));
              if (output == NULL)
              {
                  goto fail;
              }
          }
          ```

          ## More thorough root-cause fix

          The deeper issue is that `parse_string()` mixes raw pointer walking with a
          length-tracked parse buffer. The parser already has helpers like:

          ```c
          can_access_at_index(buffer, index)
          cannot_access_at_index(buffer, index)
          buffer_at_offset(buffer)
          ```

          But this string-scanning loop bypasses them.

          A more robust fix would rewrite the scan to use offsets rather than unchecked
          raw pointer dereferences:

          ```c
          static cJSON_bool parse_string(cJSON * const item, parse_buffer * const input_buffer)
          {
              const unsigned char *input_pointer = NULL;
              const unsigned char *input_end = NULL;
              unsigned char *output_pointer = NULL;
              unsigned char *output = NULL;
              size_t skipped_bytes = 0;
              size_t input_end_offset = 0;

              if ((input_buffer == NULL) || (input_buffer->content == NULL))
              {
                  goto fail;
              }

              if (cannot_access_at_index(input_buffer, 0) ||
                  (buffer_at_offset(input_buffer)[0] != '\"'))
              {
                  goto fail;
              }

              input_pointer = buffer_at_offset(input_buffer) + 1;
              input_end_offset = input_buffer->offset + 1;

              while (input_end_offset < input_buffer->length)
              {
                  const unsigned char current = input_buffer->content[input_end_offset];

                  if (current == '\"')
                  {
                      break;
                  }

                  if (current == '\\')
                  {
                      if ((input_end_offset + 1) >= input_buffer->length)
                      {
                          goto fail;
                      }

                      skipped_bytes++;
                      input_end_offset++;
                  }

                  input_end_offset++;
              }

              if (input_end_offset >= input_buffer->length)
              {
                  goto fail;
              }

              input_end = input_buffer->content + input_end_offset;

              {
                  size_t allocation_length =
                      (size_t)(input_end - buffer_at_offset(input_buffer)) - skipped_bytes;

                  output = (unsigned char*)input_buffer->hooks.allocate(allocation_length + sizeof(""));
                  if (output == NULL)
                  {
                      goto fail;
                  }
              }

              /*
               * Existing second-pass unescaping logic follows here.
               */

              ...
          }
          ```

          That style makes the invariant explicit: every byte read from
          `input_buffer->content[...]` is guarded by `index < input_buffer->length`.

          For the driver, since it reads raw bytes from `stdin`, a better API call would
          also be:

          ```c
          cJSON *item = cJSON_ParseWithLengthOpts(buf, n, &err, 0);
          ```

          instead of:

          ```c
          cJSON *item = cJSON_ParseWithOpts(buf, &err, 0);
          ```

          `cJSON_ParseWithOpts()` uses `strlen()`, which means embedded NUL bytes in input
          would truncate the parse length. That is not the direct cause of this crash,
          because the input here has no embedded NULs, but using the explicit-length API
          is more correct for data read with `fread()`.

          So in `bench_driver.c`:

          ```c
          const char *err = NULL;
          cJSON *item = cJSON_ParseWithLengthOpts(buf, n, &err, 0);
          ```

          This driver change is good hygiene, but it does not replace the required parser
          fix. The parser must still reject unterminated strings safely.

          ##### Recommendation

          Fix `parse_string()` so the scan for the closing quote checks
          `input_buffer->length` before dereferencing `input_end`. As an additional
          cleanup, change the benchmark driver to call `cJSON_ParseWithLengthOpts(buf, n,
          &err, 0)` so the parser receives the actual byte length read from `stdin`.
