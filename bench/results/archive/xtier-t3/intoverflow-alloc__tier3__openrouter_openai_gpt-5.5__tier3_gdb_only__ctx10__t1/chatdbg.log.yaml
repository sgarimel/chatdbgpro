      - output: |-
          The crash is caused by an integer overflow in the allocation-size calculation
          inside `make_records`, which causes the program to allocate far less memory than
          `main` later indexes.

          Relevant code:

          ```cpp
          struct Record {
              uint64_t id;
              uint64_t score;
              uint64_t payload[6];     /* 64 bytes total */
          };

          static Record *make_records(uint32_t count) {
              uint32_t bytes = count * (uint32_t)sizeof(Record);
              Record *r = (Record *)std::malloc(bytes);
              if (!r) return nullptr;
              std::memset(r, 0, bytes);
              return r;
          }
          ```

          In `main`:

          ```cpp
          uint32_t n = 70'000'000u;
          Record *rs = make_records(n);
          ...
          rs[n - 1].id = 42;
          ```

          Program state at the crash:

          ```text
          n  = 70000000
          rs = 0x0000000102504800
          ```

          `sizeof(Record)` is 64 bytes:

          ```cpp
          id         8 bytes
          score      8 bytes
          payload   48 bytes
          ------------------
          total     64 bytes
          ```

          So the correct allocation size should be:

          ```text
          70,000,000 * 64 = 4,480,000,000 bytes
          ```

          But `make_records` stores the result in a `uint32_t`:

          ```cpp
          uint32_t bytes = count * (uint32_t)sizeof(Record);
          ```

          `uint32_t` can only hold values up to:

          ```text
          4,294,967,295
          ```

          So the multiplication wraps modulo `2^32`:

          ```text
          4,480,000,000 - 4,294,967,296 = 185,032,704
          ```

          Therefore `malloc` only allocates:

          ```text
          185,032,704 bytes
          ```

          That is enough for only:

          ```text
          185,032,704 / 64 = 2,891,136 records
          ```

          But `main` writes to:

          ```cpp
          rs[n - 1].id
          ```

          which is:

          ```text
          rs[69,999,999].id
          ```

          The byte offset of that element is:

          ```text
          69,999,999 * 64 = 4,479,999,936 bytes
          ```

          So the write targets:

          ```text
          rs + 4,479,999,936
          ```

          With `rs = 0x0000000102504800`, that gives:

          ```text
          0x0000000102504800 + 0x10b075fc0 = 0x20d57a7c0
          ```

          which matches the bad access address:

          ```text
          EXC_BAD_ACCESS address=0x20d57a7c0
          ```

          So the pointer itself is non-null, but it points to a much smaller allocation
          than the caller believes. The crash occurs when `main` writes far beyond the
          allocated buffer.

          ##### Recommendation

          Minimal local fix: change the allocation-size calculation in `make_records` to
          use `size_t` and check for overflow before multiplying.

          In `/Users/ibraheemamin/Documents/cos484-final-
          project/chatdbgpro/bench/cases/intoverflow-alloc/program.cpp`, replace line 17:

          ```cpp
          uint32_t bytes = count * (uint32_t)sizeof(Record);
          ```

          with:

          ```cpp
          if (count > SIZE_MAX / sizeof(Record)) {
              return nullptr;
          }

          size_t bytes = (size_t)count * sizeof(Record);
          ```

          The full fixed function would be:

          ```cpp
          #include <limits>
          // or <stdint.h>/<cstdint> plus SIZE_MAX availability depending on platform

          static Record *make_records(uint32_t count) {
              if (count > SIZE_MAX / sizeof(Record)) {
                  return nullptr;
              }

              size_t bytes = (size_t)count * sizeof(Record);

              Record *r = (Record *)std::malloc(bytes);
              if (!r) return nullptr;

              std::memset(r, 0, bytes);
              return r;
          }
          ```

          An even cleaner version is to use `calloc`, still with an overflow check:

          ```cpp
          static Record *make_records(uint32_t count) {
              if (count > SIZE_MAX / sizeof(Record)) {
                  return nullptr;
              }

              return (Record *)std::calloc((size_t)count, sizeof(Record));
          }
          ```

          More thorough root-cause fix: avoid `uint32_t` for allocation sizes and array
          counts in allocation APIs. Use `size_t` consistently for counts and byte sizes:

          ```cpp
          static Record *make_records(size_t count) {
              if (count > SIZE_MAX / sizeof(Record)) {
                  return nullptr;
              }

              return (Record *)std::calloc(count, sizeof(Record));
          }
          ```

          and in `main`:

          ```cpp
          size_t n = 70'000'000u;
          Record *rs = make_records(n);
          ```

          This prevents silent truncation/wraparound in allocation calculations and makes
          oversized allocations fail safely instead of producing undersized buffers.
