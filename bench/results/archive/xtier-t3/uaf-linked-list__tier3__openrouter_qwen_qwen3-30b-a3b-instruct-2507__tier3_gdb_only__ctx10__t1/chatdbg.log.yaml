      - output: "The root cause of the crash is a **use-after-free error** in the\
          \ `destroy_list`\nfunction due to incorrect order of operations in the loop.\n\
          \n### Walkthrough of Program State and Why the Crash Happens\n\n1. **Initial\
          \ Setup in `main()`**:\n   - `a` points to a node with value `1`, `next`\
          \ pointing to `b`.\n   - `b` points to value `2`, `next` pointing to `c`.\n\
          \   - `c` points to value `3`, `next` is `nullptr`.\n   - The list: `a ->\
          \ b -> c -> nullptr`\n\n2. **Entering `destroy_list(a)`**:\n   - `head =\
          \ a` (the first node).\n   - The loop runs: `for (Node *cur = head; cur\
          \ != nullptr; cur = cur->next)`\n\n3. **First Iteration**:\n   - `cur =\
          \ a` (valid pointer).\n   - `delete cur;` is called \u2192 **`a` is deallocated**.\n\
          \   - Now, `a` is no longer a valid object.\n   - But `cur` is updated via\
          \ `cur = cur->next` \u2192 `cur = a->next = b`.\n   - Even though `a` is\
          \ deleted, the `next` pointer from `a` is still accessible\nat this moment\
          \ (since it's part of the data structure before deallocation).\n\n   \u2705\
          \ So far, this may seem okay \u2014 `a->next` is still a valid pointer because\
          \ the\n`next` member is a `Node*` and wasn't overwritten.\n\n4. **Second\
          \ Iteration**:\n   - `cur = b` (valid pointer).\n   - `delete cur;` \u2192\
          \ `b` is deallocated.\n   - Then `cur = cur->next` \u2192 `cur = b->next\
          \ = c`.\n\n5. **Third Iteration**:\n   - `cur = c` (valid).\n   - `delete\
          \ cur;` \u2192 `c` is deallocated.\n   - Then `cur = cur->next` \u2192 `cur\
          \ = c->next = nullptr`.\n\n6. **Loop Ends**: `cur` is `nullptr`, so loop\
          \ exits.\n\nSo far, everything seems okay?\n\n### \u2705 Wait \u2014 Why\
          \ the \"Use of deallocated memory\" Error?\n\nThe **fatal issue** is not\
          \ in the listed `destroy_list` function, but in **how\nthe `cur->next` is\
          \ accessed after deletion**.\n\nLet\u2019s re-examine the loop:\n```cpp\n\
          for (Node *cur = head; cur != nullptr; cur = cur->next) {\n    delete cur;\n\
          }\n```\n\n- The loop **uses `cur->next` during the iteration**, even **after**\
          \ `cur` has\nbeen deleted.\n\nBut `cur->next` is accessed in the loop condition\
          \ **only** at the **end** of the\nloop body via `cur = cur->next`.\n\nSo\
          \ the **real flaw** is: **`cur` is a pointer to a deleted object, yet we\
          \ still\naccess `cur->next` after deletion**.\n\nBut that access happens\
          \ **after `delete cur`** \u2014 **within the same iteration**,\nduring the\
          \ assignment:\n```cpp\ncur = cur->next\n```\n\nWhich is **after** the `delete\
          \ cur` call.\n\nThat means:\n- `cur` points to a deleted object (`a` in\
          \ first iteration),\n- Then we do `cur = cur->next` \u2192 but **`cur` is\
          \ no longer valid**, so accessing\n`.next` is **undefined behavior**, and\
          \ may trigger a use-after-free error.\n\nSo even though `a->next` might\
          \ still be a valid pointer in memory,\n**dereferencing `cur` (which points\
          \ to a deleted object) to read `next`** is the\nproblem.\n\nThis is **exactly**\
          \ what the `use-after-free` error reports.\n\n---\n\n### \U0001F50D Why\
          \ weren't `cur` or `head` visible in `frame variable`?\n\nBecause `debug`\
          \ was run at line 12, **before** the loop body starts. The `cur`\nand `head`\
          \ variables haven\u2019t been initialized in the debugger's scope **at that\n\
          point**, so `frame variable` fails.\n\nBut `print head` also failed \u2014\
          \ likely because it was called on the wrong line or\ndebug info is missing\
          \ \u2014 but we observed the program's behavior.\n\n---\n\n### \u2705 Root\
          \ Cause\n\n```cpp\nfor (Node *cur = head; cur != nullptr; cur = cur->next)\
          \ {\n    delete cur;  // Deletes the node, making cur invalid\n} // Then\
          \ `cur` is updated via `cur = cur->next`, but cur is already invalid!\n\
          ```\n\n\U0001F449 The **`cur->next` is accessed after `delete cur`**, meaning\
          \ **we read from a\ndeallocated object**.\n\nThis violates the strict aliasing\
          \ and safety rules of `delete`. Even if the\n`next` pointer was preserved,\
          \ **reading it from a deleted object is undefined\nbehavior**.\n\n---\n\n\
          ### \U0001F527 Fix: Use Temporary Pointer to Save `next` Before Deletion\n\
          \nWe must **save the next pointer before deleting the current node**.\n\n\
          ### \u2705 Minimal Local Fix (Direct Fix to `destroy_list`)\n```cpp\nstatic\
          \ void destroy_list(Node *head) {\n    for (Node *cur = head; cur != nullptr;\
          \ ) {\n        Node *next = cur->next;  // Save next *before* deletion\n\
          \        delete cur;\n        cur = next;              // Move to next node\n\
          \    }\n}\n```\n\nThis avoids accessing `cur->next` after deletion.\n\n\
          ### \u2705 Thorough Root-Cause Fix\n\nAlso consider:\n- **Never access fields\
          \ of a `delete`d object**.\n- Encapsulate safe destruction logic in a helper\
          \ function.\n- Avoid manual memory management when possible (use smart pointers).\n\
          \nBut since this is a linked list example with raw pointers, the minimal\
          \ fix\nsuffices.\n\n---\n\n### ##### Recommendation\nReplace the `destroy_list`\
          \ function with:\n```cpp\nstatic void destroy_list(Node *head) {\n    for\
          \ (Node *cur = head; cur != nullptr; ) {\n        Node *next = cur->next;\n\
          \        delete cur;\n        cur = next;\n    }\n}\n```\n\nThis fixes the\
          \ use-after-free by ensuring that `cur->next` is accessed\n**before** `delete\
          \ cur`."
