      - output: "The crash is caused by an off-by-one read in `crc8`.\n\nAt the time\
          \ of the crash:\n\n```c\nuint8_t buf[7] = {0x01, 0x02, 0x03, 0x04, 0x05,\
          \ 0x06, 0x07};\nuint8_t c = crc8(buf, sizeof(buf));\n```\n\n`buf` is a stack\
          \ array with exactly 7 bytes. Its valid indices are:\n\n```c\nbuf[0] through\
          \ buf[6]\n```\n\n`sizeof(buf)` is `7`, so `main` calls:\n\n```c\ncrc8(buf,\
          \ 7);\n```\n\nInside `crc8`:\n\n```c\nstatic uint8_t crc8(const uint8_t\
          \ *buf, size_t len) {\n    uint8_t crc = 0x00;\n\n    for (size_t i = 0;\
          \ i <= len; i++) {\n        crc ^= buf[i];\n        ...\n    }\n\n    return\
          \ crc;\n}\n```\n\nThe loop condition is:\n\n```c\ni <= len\n```\n\nSince\
          \ `len == 7`, the loop runs for:\n\n```c\ni = 0, 1, 2, 3, 4, 5, 6, 7\n```\n\
          \nThe first seven iterations are valid:\n\n```c\nbuf[0] ... buf[6]\n```\n\
          \nBut the final iteration tries to read:\n\n```c\nbuf[7]\n```\n\nThat is\
          \ one byte past the end of the stack array. AddressSanitizer reports this\n\
          as a stack buffer overflow at:\n\n```c\ncrc ^= buf[i];\n```\n\nbecause it\
          \ is reading one byte beyond the valid bounds of `buf`.\n\nThe important\
          \ variable values are:\n\n```c\nbuf = stack array of 7 uint8_t values\n\
          sizeof(buf) = 7\nlen = 7\ni = 7 at the crashing iteration\nbuf[i] = buf[7],\
          \ invalid out-of-bounds read\n```\n\nThe root cause is that `len` is being\
          \ treated inconsistently. The caller passes\n`len` as a byte count, but\
          \ the loop treats it like the last valid index by using\n`<=`.\n\nA length/count\
          \ of `7` means there are 7 elements, indexed `0` through `6`.\nTherefore\
          \ the loop must use `< len`, not `<= len`.\n\nMinimal local fix:\n\n```c\n\
          static uint8_t crc8(const uint8_t *buf, size_t len) {\n    uint8_t crc =\
          \ 0x00;\n\n    for (size_t i = 0; i < len; i++) {\n        crc ^= buf[i];\n\
          \        for (int b = 0; b < 8; b++) {\n            crc = (crc & 0x80)\n\
          \                ? (uint8_t)((crc << 1) ^ 0x07)\n                : (uint8_t)(crc\
          \ << 1);\n        }\n    }\n\n    return crc;\n}\n```\n\nWith that change,\
          \ `crc8(buf, sizeof(buf))` processes exactly `buf[0]` through\n`buf[6]`.\n\
          \nA more thorough root-cause fix is to make the API contract explicit: `len`\n\
          should mean \u201Cnumber of bytes to process\u201D, not \u201Clast valid\
          \ index\u201D. Rename it if\nhelpful and guard against invalid input:\n\n\
          ```c\n#include <stddef.h>\n#include <stdint.h>\n\nstatic uint8_t crc8(const\
          \ uint8_t *buf, size_t nbytes) {\n    uint8_t crc = 0x00;\n\n    if (buf\
          \ == NULL && nbytes != 0) {\n        return 0; // or handle error differently\n\
          \    }\n\n    for (size_t i = 0; i < nbytes; i++) {\n        crc ^= buf[i];\n\
          \n        for (int b = 0; b < 8; b++) {\n            if (crc & 0x80) {\n\
          \                crc = (uint8_t)((crc << 1) ^ 0x07);\n            } else\
          \ {\n                crc = (uint8_t)(crc << 1);\n            }\n       \
          \ }\n    }\n\n    return crc;\n}\n\nint main(void) {\n    uint8_t buf[7]\
          \ = {0x01, 0x02, 0x03, 0x04, 0x05, 0x06, 0x07};\n\n    uint8_t c = crc8(buf,\
          \ sizeof(buf));\n\n    printf(\"crc = 0x%02x\\n\", c);\n    return 0;\n\
          }\n```\n\nIf instead the intended API were \u201Cpass the final valid index\u201D\
          , then the call\nwould need to be:\n\n```c\ncrc8(buf, sizeof(buf) - 1);\n\
          ```\n\nBut that would be a poor design here because the parameter is named\
          \ `len`, and\ncallers normally expect length parameters to be counts. The\
          \ better fix is to\nkeep the caller unchanged and fix the loop condition.\n\
          \n##### Recommendation\n\nChange the loop condition in `crc8` from:\n\n\
          ```c\nfor (size_t i = 0; i <= len; i++)\n```\n\nto:\n\n```c\nfor (size_t\
          \ i = 0; i < len; i++)\n```\n\nOptionally rename `len` to `nbytes` and document\
          \ that it is the number of bytes\nto checksum."
