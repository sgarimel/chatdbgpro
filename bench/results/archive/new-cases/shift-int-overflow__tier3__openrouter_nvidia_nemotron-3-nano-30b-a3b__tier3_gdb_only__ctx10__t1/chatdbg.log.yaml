      - output: "#### 1.\u202FProgram state when the crash occurs\n\n| Step | What\
          \ the program does | Variable values |\n|------|-----------------------|-----------------|\n\
          | 1\uFE0F\u20E3 | In `main()` a local `int width = 64;` is created. | `width\
          \ == 64` |\n| 2\uFE0F\u20E3 | `high_bit_mask(width)` is called. The argument\
          \ is passed by value, so\nthe callee receives the literal value `64`. |\
          \ `width` (parameter) = 64 |\n| 3\uFE0F\u20E3 | Inside `high_bit_mask` the\
          \ expression ` (unsigned long long)(1 << width)\n` is evaluated. | The left\
          \ operand `1` is an **int** (typically 32\u2011bit on the\ntarget). The\
          \ shift operator `<<` is applied with a right\u2011hand operand of `64`.\
          \ |\n\nThe C standard (C11 \xA76.5.7/3) says:\n\n> The behavior is undefined\
          \ if the right operand (shift count) is negative, or\ngreater than or equal\
          \ to the width of the promoted left operand.\n\nOn a 64\u2011bit system\
          \ `unsigned long long` is 64\u202Fbits wide. Because the left\noperand is\
          \ an `int`, it is first promoted to `int` (still 32\u2011bit) and then to\n\
          `unsigned long long` *after* the shift. The shift is performed on the **int**\n\
          value `1` with a count of **64**. Since 64 \u2265 the width of an `int`\
          \ (32) \u2013 and\nalso \u2265 the width of the *promoted* left operand\
          \ (which is still 32 bits until\nthe cast) \u2013 the shift is undefined.\n\
          \nIn practice the processor would attempt to shift a 32\u2011bit register\
          \ by 64\npositions, which most CPUs treat as a \u201Cshift by zero\u201D\
          \ or silently wrap, but the\n**sanitizer** inserted by the compiler detects\
          \ that the count is out of range\nand aborts with the diagnostic message:\n\
          \n```\nInvalid shift exponent\n```\n\nThus the *runtime* error is not a\
          \ seg\u2011fault or memory violation; it is an\nintentional trap inserted\
          \ by the compiler to protect against undefined\nbehaviour.\n\n---\n\n####\
          \ 2.\u202FRoot\u2011cause defect\n\n- **Defect:** The function `high_bit_mask`\
          \ attempts to compute `2^width` by\nshifting the integer literal `1` left\
          \ by `width` bits, **without constraining\n`width` to be strictly less than\
          \ the width of the shift operand**.\n- **Why it crashes:** When `width ==\
          \ 64` on a platform where `unsigned long\nlong` has 64 bits, the shift count\
          \ equals the word size, making the shift\noperation undefined. The compiler\u2019\
          s Undefined\u2011Behavior Sanitizer (UBSan) stops\nexecution and prints\
          \ \u201CInvalid shift exponent\u201D.\n\n---\n\n#### 3.\u202FMinimal local\
          \ fix\n\nThe smallest change that eliminates the UB while preserving the\
          \ intended\nsemantics (produce a mask with the low `width` bits set to `1`)\
          \ is:\n\n```c\nstatic unsigned long long high_bit_mask(int width)\n{\n \
          \   /* Guard against the illegal shift count */\n    if (width <= 0)   \
          \             return 0;\n    if (width < 64)                  /* width must\
          \ be < 64 for a defined 1 << width */\n        return (unsigned long long)1\
          \ << width;\n    /* width == 64: the mask that has all 64 bits set */\n\
          \    return (unsigned long long) -1;   /* all bits 1 */\n}\n```\n\n*Why\
          \ this works*\n- The shift only happens when `width < 64`, guaranteeing\
          \ the count is strictly\nsmaller than the width of the left operand (now\
          \ `unsigned long long`).\n- When `width == 64`, the desired mask (`2^64`)\
          \ cannot be represented in a\n64\u2011bit type, but the logical \u201Cmask\
          \ of 64 bits\u201D is all\u2011ones, which is obtained\nvia `(unsigned long\
          \ long)-1`. The comment in the original code already\nacknowledges that\
          \ for `width=64` the shift is UB, so returning the all\u2011ones mask\n\
          is a sensible safe replacement.\n\n---\n\n#### 4.\u202FMore thorough root\u2011\
          cause fix\n\nA deeper, more robust implementation addresses the design assumption\
          \ that\n`width` may be **any non\u2011negative integer** up to the bit\u2011\
          width of the mask\ntype. It also protects against negative inputs and makes\
          \ the intent (produce a\nmask of `width` consecutive 1\u2011bits) explicit:\n\
          \n```c\nstatic unsigned long long high_bit_mask(int width)\n{\n    if (width\
          \ <= 0) return 0;                 /* no bits \u2192 mask 0 */\n    if (width\
          \ > 64)  width = 64;              /* clamp to maximum representable width\
          \ */\n\n    /* Produce a mask of `width` low bits set to 1.\n       The\
          \ expression uses only well\u2011defined shifts. */\n    return (width ==\
          \ 64) ? ~0ULL : (1ULL << width);\n}\n```\n\n*Advantages of this approach*\n\
          \n1. **Input sanitisation** \u2013 rejects non\u2011positive widths and\
          \ caps at the maximum\nsupported width, preventing future UB if callers\
          \ accidentally pass larger\nvalues.\n2. **Uniform mask semantics** \u2013\
          \ the function now always returns a mask\nconsisting of exactly `width`\
          \ contiguous 1\u2011bits, which matches the comment\u2019s\nintent.\n3.\
          \ **Explicit handling of the edge case** \u2013 `width == 64` is dealt with\n\
          directly, avoiding any reliance on undefined shift behaviour.\n4. **Future\u2011\
          proof** \u2013 if the implementation is later ported to a 128\u2011bit\n\
          unsigned type, the same pattern (`(width == BITWIDTH) ? ~0U : (1ULL << width)`)\n\
          will still be correct.\n\n---\n\n#### 5.\u202FHow to proceed with debugging\
          \ (if you need a staged investigation)\n\n1. **Run without sanitizers**\
          \ \u2013 comment out `-fsanitize=undefined` in the build\nflags and re\u2011\
          run. The program will now execute, but the value of `m` will be\nwhatever\
          \ the compiler produced (most likely `0`). This confirms that the crash\n\
          was solely due to the sanitizer tripwire, not a downstream use\u2011after\u2011\
          free or\nsimilar.\n2. **Inspect the generated assembly** (`objdump -d build/prog`)\
          \ \u2013 you\u2019ll see\nthat the shift instruction is never emitted for\
          \ `width == 64` when the fixed\nversion is compiled; instead the constant\
          \ `-1ULL` is loaded.\n3. **Add runtime assertions** \u2013 e.g. `assert(width\
          \ > 0 && width <= 64);` in\n`high_bit_mask` to make the contract explicit.\n\
          \n---\n\n### ##### Recommendation\n\n**Fix:**\nApply the minimal safe guard\
          \ shown above, i.e.:\n\n```c\nstatic unsigned long long high_bit_mask(int\
          \ width)\n{\n    if (width <= 0) return 0;\n    if (width < 64)   return\
          \ (unsigned long long)1 << width;\n    return (unsigned long long)-1;  \
          \ /* width == 64 */\n}\n```\n\n**Alternative thorough fix:**\n\n```c\nstatic\
          \ unsigned long long high_bit_mask(int width)\n{\n    if (width <= 0) return\
          \ 0;\n    if (width > 64)   width = 64;\n    return (width == 64) ? ~0ULL\
          \ : (1ULL << width);\n}\n```\n\nBoth eliminate the \u201CInvalid shift exponent\u201D\
          \ crash. The first is sufficient for\nthe specific case at hand; the second\
          \ is more defensive and clarifies the\nintended mask semantics.\n\n**Next\
          \ steps:** Re\u2011compile the project with the fix, run the test case again,\n\
          and verify that the printed mask is now `18446744073709551615` (all 64 bits\
          \ set)\ninstead of the abort. If the program later uses `m` as a divisor,\
          \ ensure that\nthe divisor is checked for zero as an additional safety measure."
