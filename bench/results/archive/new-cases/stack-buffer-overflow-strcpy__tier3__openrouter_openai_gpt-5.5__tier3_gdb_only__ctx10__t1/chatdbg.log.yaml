      - output: |-
          The crash is caused by writing past the end of the stack array `buf` in `greet`.

          At the failing line:

          ```c
          strcat(buf, who);
          ```

          the program state is:

          ```c
          static void greet(const char *who)
          {
              char buf[16];
              strcpy(buf, "Hello, ");
              strcat(buf, who);
              strcat(buf, "!");
              puts(buf);
          }
          ```

          `main` calls:

          ```c
          greet("ProfessorAdrieneDelmarre");
          ```

          So inside `greet`:

          ```c
          who == "ProfessorAdrieneDelmarre"
          ```

          That string is 24 characters long.

          `buf` has only 16 bytes total:

          ```c
          char buf[16];
          ```

          After this line:

          ```c
          strcpy(buf, "Hello, ");
          ```

          `buf` contains:

          ```text
          "Hello, "
          ```

          That is 7 visible characters plus the terminating `'\0'`, so 8 bytes are already
          used.

          Then this line runs:

          ```c
          strcat(buf, who);
          ```

          `strcat` appends `who` starting where the current null terminator is. It needs
          to store:

          ```text
          "Hello, "                  7 bytes
          "ProfessorAdrieneDelmarre" 24 bytes
          '\0'                       1 byte
          ```

          Total needed after the second line:

          ```text
          7 + 24 + 1 = 32 bytes
          ```

          But `buf` only has 16 bytes.

          So `strcat(buf, who)` writes beyond the end of `buf`, overflowing the stack
          buffer. AddressSanitizer detects that overflow inside its wrapped `strcat`
          implementation and stops the program.

          The third append:

          ```c
          strcat(buf, "!");
          ```

          would require even more space:

          ```text
          "Hello, "                  7 bytes
          "ProfessorAdrieneDelmarre" 24 bytes
          "!"                        1 byte
          '\0'                       1 byte
          ```

          Total:

          ```text
          7 + 24 + 1 + 1 = 33 bytes
          ```

          So the final intended message needs 33 bytes, but the program only allocated 16.

          The root defect is using unbounded string-copying functions, `strcpy` and
          `strcat`, with a fixed-size stack buffer that is too small for the possible
          input.

          ##### Recommendation

          Minimal local fix for this exact input:

          ```c
          static void greet(const char *who)
          {
              char buf[33];

              strcpy(buf, "Hello, ");
              strcat(buf, who);
              strcat(buf, "!");
              puts(buf);
          }
          ```

          However, that only fixes this one name. If `who` can vary, this is still unsafe.

          A safer local fix is to use `snprintf`:

          ```c
          #include <stdio.h>

          static void greet(const char *who)
          {
              char buf[16];

              snprintf(buf, sizeof buf, "Hello, %s!", who);
              puts(buf);
          }
          ```

          This prevents overflow, but it may truncate long names.

          A more thorough root-cause fix is to allocate enough space based on the actual
          input length:

          ```c
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>

          static void greet(const char *who)
          {
              const char *prefix = "Hello, ";
              const char *suffix = "!";

              size_t needed =
                  strlen(prefix) +
                  strlen(who) +
                  strlen(suffix) +
                  1; // null terminator

              char *buf = malloc(needed);
              if (buf == NULL) {
                  perror("malloc");
                  return;
              }

              snprintf(buf, needed, "%s%s%s", prefix, who, suffix);
              puts(buf);

              free(buf);
          }
          ```

          This removes the fixed-size stack buffer and avoids unsafe `strcpy`/`strcat`
          usage.
        type: text
      type: chat
