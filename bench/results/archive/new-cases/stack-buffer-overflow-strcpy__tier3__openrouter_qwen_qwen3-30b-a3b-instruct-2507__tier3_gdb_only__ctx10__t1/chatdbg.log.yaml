          flags (common in macOS `<secure/_string.h>`).\n- These functions perform\
          \ **runtime bounds checking**.\n- When an overflow is detected (e.g., writing\
          \ beyond `buf[16]`), they **trigger\na failure** \u2014 in this case, AddressSanitizer\
