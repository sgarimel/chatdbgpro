          **9 bytes of space** will immediately overflow.\n\nEven before `strcat(buf,\
          \ \"!\")`, the stack memory of `buf` is overwritten. The\nextra data from\
          \ `who` overflows into adjacent stack memory, corrupting the stack\nframe.\n\
          \n### 3. **Why `who` is `NULL` in the `debug` output?**\nThe `print who`\
          \ command failed because the symbol `who` couldn\u2019t be resolved at\n\
