          ROUTINE ROOT CAUSE:
          The program in `src/be_code.c` calls `exit()` prematurely in its execution flow,
          causing it to terminate without completing its intended processing. This results
          in the program exiting with code 0 (successful exit) but without producing the
          expected output or side effects that the test oracle validates. This indicates a
          logic error where error handling or input validation improperly triggers an
          early exit, even though no actual crash occurs.

          ---

          LOCAL FIX:
          To address the immediate symptom, locate the premature `exit()` call in
          `src/be_code.c`. Based on the stack trace, this likely occurs in the `main()`
          function or an early-initialized routine. A minimal fix would be to remove or
          conditionally guard the `exit()` call to allow execution to continue. For
          example:

          ```diff
          - exit(0); // BAD: Exits immediately
          + if (/* condition */) exit(1); // Only exit on critical fatal errors
          ```

          Or ensure that `exit()` is only called when appropriate, such as after
          confirming all required resources (e.g., file handles) are properly initialized.

          ---

          GLOBAL FIX:
          To prevent this class of bug, restructure error handling to avoid abrupt
          termination. Use return codes instead of `exit()` for non-fatal errors, allowing
          the program to clean up state and proceed. For instance:
          1. Replace unconditional `exit()` calls with conditional error handling.
          2. Implement RAII-like resource management (e.g., ensure files or allocations
          are cleaned up even on error).
          3. Add assertions or validations early in execution to catch bugs during
          development, not at runtime.

          This ensures the program adheres to expected behavior and correctly signals
          failures without masking logic errors.

          ---

