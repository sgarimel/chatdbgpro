      - output: "**ROOT CAUSE**\nIn the function `convert_fileName()` a fixed\u2011\
          size stack buffer `char\nnewname[MAX]` (where `MAX` is defined as 2048)\
          \ is filled by a manual `for`\u2011loop\nthat copies each character of the\
          \ argument `original` until the terminating\n`'\\0'` is seen. The loop iterates\
          \ blindly on the length of `original` without\never verifying that the index\
          \ `i` stays below `MAX`. When a filename longer than\n2047 characters is\
          \ supplied, the copy writes past the end of `newname`,\noverwriting adjacent\
          \ stack slots such as the saved frame pointer and return\naddress. The corrupted\
          \ return address no longer points to valid code, so when\nthe function returns\
          \ control is transferred to an unmapped address, causing the\nprocess to\
          \ receive a segmentation fault (the \u201Ccrash\u201D observed). This is\
          \ exactly\nwhat the sanitizer / crash report describes: a *stack buffer\
          \ overflow* caused by\nmissing bounds checking on the input length.\n\n\
          **LOCAL FIX**\nThe simplest change that stops the immediate crash is to\
          \ enforce a hard limit on\nthe number of characters copied and to guarantee\
          \ null\u2011termination:\n\n```diff\n // original code (simplified)\n- for\
          \ (size_t i = 0; original[i] != '\\0'; ++i) {\n-     newname[i] = original[i];\n\
          - }\n- newname[i] = '\\0';\n\n+ // bounded copy \u2013 never write more\
          \ than MAX\u20111 characters\n+ size_t max_copy = strlen(original);\n+ if\
          \ (max_copy >= MAX) {\n+     // Option 1: truncate (most benign for a CLI\
          \ tool)\n+     max_copy = MAX - 1;\n+ }\n+ // strncpy does not guarantee\
          \ null\u2011termination if source length == max_copy\n+ memcpy(newname,\
          \ original, max_copy);\n+ newname[max_copy] = '\\0';\n```\n\nor even more\
          \ idiomatic:\n\n```cpp\n    strncpy(newname, original, MAX - 1);\n    newname[MAX\
          \ - 1] = '\\0';          // ensure terminator\n```\n\nBoth modifications\
          \ guarantee that no more than `MAX\u20111` bytes are written to\n`newname`,\
          \ preventing overflow of the stack and protecting the return address.\n\n\
          **GLOBAL FIX**\nThe deeper design flaw is the reliance on a fixed\u2011\
          size stack buffer for an\narbitrarily sized filename. A robust design would\
          \ eliminate that stack\u2011allocated\nbuffer altogether, for example by:\n\
          \n1. **Using a length\u2011safe abstraction** \u2013 accept or return a\
          \ `std::string` (or a\nbounded view type) instead of a raw C\u2011style\
          \ buffer.\n```cpp\n   std::string convert_fileName(const std::string& original)\
          \ {\n       // Reserve at most MAX\u20111 characters, or fail / truncate\
          \ as policy\n       size_t max_len = std::min(original.size(), MAX - 1);\n\
          \       return original.substr(0, max_len);\n   }\n   ```\n2. **Explicit\
          \ input validation at the entry point** \u2013 before calling\n`convert_fileName()`\
          \ verify that the supplied filename length conforms to policy\n(e.g., reject\
          \ >\u202FMAX\u20111 characters and return an error code). This moves the\n\
          responsibility of size limiting out of the utility function into the layer\
          \ that\nparses command\u2011line arguments.\n3. **Adopting safer string\
          \ utilities** \u2013 replace manual loops with functions\nthat perform bounds\
          \ checking (`strlcpy`, `snprintf`, or C++20\n`std::ranges::copy_n`). These\
          \ functions either truncate automatically or return\nan error when the source\
          \ does not fit.\n4. **Compile\u2011time enforcement** \u2013 add a `static_assert(MAX\
          \ > 0, \"MAX must be\npositive\")` and possibly `constexpr size_t MaxFilename\
          \ = 2048;` to centralize\nthe limit, making it obvious to future maintainers\
          \ that any change must be\nreviewed.\n\nBy removing the raw stack buffer\
          \ and enforcing a clear invariant on filename\nlength, the program can no\
          \ longer overflow its own stack, eliminating the class\nof bugs that lead\
          \ to crashes when users supply unusually long filenames. This\nglobal redesign\
          \ also improves code clarity, testability, and future\nmaintainability."
