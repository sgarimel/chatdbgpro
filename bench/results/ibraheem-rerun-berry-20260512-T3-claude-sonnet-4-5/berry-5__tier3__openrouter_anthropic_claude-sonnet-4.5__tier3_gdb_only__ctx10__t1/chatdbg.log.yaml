          **GLOBAL FIX**: The deeper issue is that `exp2anyreg` and `var2reg` have side
          effects that mutate their input expression descriptors, making the order of
          operations critical and error-prone. A more robust design would be:

          1. **Separate conversion from mutation**: Have `exp2anyreg` return the register
          index without modifying the expression type until explicitly requested, or use a
          separate output parameter for the new type.

          2. **Use a const-correct API**: Make the expression parameter `const` where it
