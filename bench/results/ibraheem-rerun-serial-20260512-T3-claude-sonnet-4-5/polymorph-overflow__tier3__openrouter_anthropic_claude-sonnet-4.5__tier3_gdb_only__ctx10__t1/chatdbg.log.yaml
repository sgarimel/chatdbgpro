          ## GLOBAL FIX

          The fundamental design problem is using fixed-size buffers with unsafe string
          operations throughout the codebase. A proper architectural fix would include:

          1. **Use bounded string operations systematically**: Replace all uses of
          `strcpy`, `sprintf`, and manual character-by-character copying with bounded
          alternatives:
             - Use `strncpy` with explicit size limits
             - Use `snprintf` instead of `sprintf`
             - Always validate string lengths before copying

          2. **Dynamic memory allocation**: Instead of stack buffers with arbitrary fixed
          sizes, allocate memory dynamically based on actual input length:
          ```c
             char *newname = malloc(strlen(original) + 1);
             if (!newname) {
                 perror("malloc");
                 return;
             }
             // ... use newname ...
             free(newname);
             ```

          3. **Use safer string types**: Consider using a string library that encapsulates
          length checking (e.g., BSD's `struct bstring`, GLib's `GString`, or C++'s
          `std::string` if migrating to C++).

          4. **Compile-time enforcement**: Enable compiler warnings (`-Wformat-security`,
          `-Wstringop-overflow`) and use static analysis tools that detect buffer
          overflows. Consider using `-D_FORTIFY_SOURCE=2` which adds runtime checks for
          common buffer overflow scenarios.

          5. **API contract specification**: Document maximum supported path lengths and
          validate inputs at program boundaries (command-line parsing, file system
          operations) rather than deep within the call stack.

          6. **Consider using PATH_MAX**: On POSIX systems, use the `PATH_MAX` constant
          (typically 4096) rather than an arbitrary 2048, or better yet, dynamically
          determine the system's path length limits via `pathconf()`.
