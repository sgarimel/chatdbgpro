          ---

          ## ROOT CAUSE

          **File: polymorph.c, lines 191-198**

          The `convert_fileName()` function contains a classic stack buffer overflow
          vulnerability. The function declares a fixed-size stack buffer `newname[MAX]`
          where MAX is 2048 bytes (defined in polymorph_types.h:9).

          At line 191, there is a for-loop that iterates through every character of the
          input string `original`:
          ```c
          for(i=0;i<strlen(original);i++)
          ```

          Inside this loop, characters are written to `newname[i]` at lines 193 and 196
          without any bounds checking to ensure `i < MAX`. When the input filename exceeds
          2048 characters (as in the test case with ~3000+ 'A' characters), the loop
          continues writing past the end of the `newname` buffer, overwriting adjacent
          stack memory including saved frame pointers and the return address.

          The loop iterates `strlen(original)` times, and when `strlen(original) > 2048`,
          indices from 2048 onwards write beyond the allocated buffer. Line 198 then
          writes a null terminator at `newname[i]` (where i == strlen(original)), further
          corrupting the stack.

          Additionally, line 200 in the else branch uses `strcpy(newname, original)` which
          also lacks bounds checking and will overflow when original exceeds MAX bytes.

          ---

          ## LOCAL FIX

          Replace the unbounded loop and strcpy with bounded operations:

          ```c
          void convert_fileName(char *original){
              char newname[MAX];
              char *bslash;
              int i, error;

              error = 0;
              strcpy( newname, "" );

              if( is_fileHidden( original ) && !hidden ) return;

            if( does_nameHaveUppers( original ) ){
                      /* convert the filename */
                      size_t len = strlen(original);
                      if (len >= MAX) {
                          fprintf(stderr, "filename too long (max %d): %s\n", MAX-1, original);
                          return;
                      }
                      for(i=0;i<len;i++){
                              if( isupper( original[i] ) ){
                                      newname[i] = tolower( original[i] );
                                      continue;
                              }
                              newname[i] = original[i];
                      }
                      newname[i] = '\0';
            }else{
              if (strlen(original) >= MAX) {
                  fprintf(stderr, "filename too long (max %d): %s\n", MAX-1, original);
                  return;
              }
              strcpy( newname, original );
              error = -1;
            }
            /* rest of function continues... */
          ```

