      - output: |-
          The `info frame` command shows the current frame is at line 22 in `program.c`.
          The `get_code_surrounding` tool returns the source code around line 22:
          ```c
          21  int main(int argc, char **argv) {
          22    char *s = argv[1];
          23    printf("%s\n", s);
          24  }
          ```
          The `info locals` command shows that the variable `s` has a value of `AAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          AAAAAAAAAAAAAAAAAAAAAAAAAAAAA`.

          The bug appears to be a buffer overflow in the `main` function. The `printf`
          statement at line 23 is attempting to print a string that is too long for the
          buffer allocated for the `s` variable, causing a buffer overflow.

          ROOT CAUSE: <program.c:22: Buffer overflow caused by printing a string that is
          too long for the allocated buffer>

          LOCAL FIX: Replace the `printf` statement with a safer version that prevents
          buffer overflows:
          ```diff
          - printf("%s\n", s);
          + printf("%.*s\n", 100, s);
          ```
          This fix uses the `printf` format specifier `%.*s` to limit the number of
          characters printed to 100, preventing the buffer overflow.

          GLOBAL FIX: Change the type of the `s` variable from `char *` to `char[]` to
          prevent buffer overflows:
          ```diff
          - char *s = argv[1];
          + char s[100] = argv[1];
          ```
          This fix changes the type of `s` to a fixed-size array, preventing buffer
          overflows by ensuring that the string is not longer than the allocated buffer.
