          corrupt the stack pointer.

          The local fix for this issue would be to increase the size of the stack buffer
          allocated for structCharVoid.charFirst to accommodate the large value assigned
          to it.

          LOCAL FIX:

          ```c
          struct CharVoid {
              char charFirst[64];
              void *voidSecond;
          };
          ```

          The global fix for this issue would be to change the type of
          structCharVoid.charFirst to a dynamically allocated buffer to prevent stack
          overflow.

          GLOBAL FIX:

          ```c
          struct CharVoid {
              char *charFirst;
              void *voidSecond;
          };

          struct CharVoid *allocateStruct() {
              struct CharVoid *s = malloc(sizeof(struct CharVoid));
              s->charFirst = malloc(64);
              s->voidSecond = NULL;
              return s;
          }
          ```

          This fix would prevent the stack overflow by dynamically allocating the buffer
          for structCharVoid.charFirst, rather than allocating it on the stack.
