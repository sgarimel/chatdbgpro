          ```

          GLOBAL FIX:
          Replace `printf("%s\n", str + len);` with `printf("%s\n", str);`. The `strlen`
          function already calculates the length of the string, including the null-
          terminator. Accessing `str + len` skips the null-terminator and leads to
          undefined behavior.

          This is due to the null-terminator being included in the `strlen` count. The
          correct fix is to print the original `str` pointer, not the pointer to the
          character after the last valid character.
