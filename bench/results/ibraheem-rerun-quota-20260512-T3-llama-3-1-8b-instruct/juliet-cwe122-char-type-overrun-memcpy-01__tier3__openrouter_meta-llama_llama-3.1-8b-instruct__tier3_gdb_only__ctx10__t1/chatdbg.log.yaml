          class CharArrayPtr {
          public:
              CharArrayPtr(char *ptr) : ptr_(ptr) {}
              ~CharArrayPtr() { free(ptr_); }

              char *get() const { return ptr_; }

          private:
              char *ptr_;
          };
          ```
