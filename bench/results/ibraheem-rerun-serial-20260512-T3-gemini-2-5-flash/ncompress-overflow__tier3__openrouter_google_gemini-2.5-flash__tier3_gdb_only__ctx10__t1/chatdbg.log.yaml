          +    strncpy(tempname, *fileptr, MAXPATHLEN - 1);
          +    tempname[MAXPATHLEN - 1] = '\0'; // Ensure null termination
               // ... rest of the function
           }
          ```

          GLOBAL FIX:
          Avoid fixed-size buffers on the stack for input that can be arbitrarily large.
          Instead, use dynamically allocated memory (e.g., `malloc` or `strdup`) or C++
          containers like `std::string` that handle memory allocation and resizing
          automatically based on input length. This prevents buffer overflows regardless
          of the input size. Additionally, consistent use of bounded string copy functions
          (`strncpy`, `strlcpy` if available, or safer alternatives) or safer string
          manipulation libraries should be enforced throughout the codebase.

          Alternatively, if a fixed-size buffer is strictly necessary, ensure that all
          input strings are properly validated *before* being copied into the buffer,
          rejecting or truncating inputs that exceed the buffer's capacity. However,
          simply truncating long filenames might lead to other issues if the program then
          attempts to open a file with the truncated name. Therefore, dynamic allocation
          or error handling for over-long names is preferred.
