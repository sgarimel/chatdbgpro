          ROOT CAUSE: compress42.c:881 (approximate, based on symbol info)
          The `comprexx` function in `compress42.c` declares a fixed-size stack buffer
          `tempname` of size `MAXPATHLEN`. The program then copies the input filename,
          `*fileptr`, into `tempname` using `strcpy`. When the input filename provided on
          the command line (e.g., the long string of 'a's) exceeds `MAXPATHLEN`, `strcpy`
          writes beyond the allocated bounds of `tempname`. This causes a stack buffer
          overflow, corrupting the stack and ultimately leading to a crash (observed as a
          signal/sanitizer report due to return address corruption). The issue is that
          `strcpy` does not perform bounds checking.

          LOCAL FIX:
          Change the `strcpy` call that copies `*fileptr` into `tempname` to use `strncpy`
          and ensure that no more than `MAXPATHLEN - 1` bytes (to account for the null
          terminator) are copied.

          ```diff
