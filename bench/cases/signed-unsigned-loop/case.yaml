id: signed-unsigned-loop
language: cpp
source_file: program.cpp
description: >
  A reverse-print loop uses an unsigned loop counter with the condition
  `i >= 0`, which is always true for size_t. Under AddressSanitizer this
  crashes with a container-overflow / OOB read; without ASan it is an
  infinite loop or an apparent hang.

build:
  compiler: clang++
  flags: ["-g", "-O0", "-std=gnu++17", "-fno-omit-frame-pointer", "-fsanitize=address"]

run:
  args: []
  stdin: ""
  env: {}
  expected_crash: true

bug:
  category: signed_unsigned
  error_type: unsigned_underflow
  root_cause_lines: [10]
  related_lines: [5, 20]

criteria:
  root_cause: >
    The response must identify that the loop counter `i` is `size_t`
    (unsigned) and so the termination condition `i >= 0` can never be
    false; additionally, when `v` is empty, `v.size() - 1` underflows to
    SIZE_MAX before the loop even starts. Pointing at line 10 counts.
    Mentioning "infinite loop" without connecting it to unsignedness is
    insufficient.

  local_fix: >
    Any of the following count as a local fix:
      - use a signed loop counter: `for (int i = (int)v.size() - 1; i >= 0; --i)`
      - use a half-open reverse form: `for (size_t i = v.size(); i-- > 0; )`
      - iterate explicitly over a reversed range and guard on empty
    The fix must prevent both the infinite loop and the empty-vector
    underflow.

  global_fix: >
    A root-cause fix additionally switches to a reverse iterator or range
    idiom that makes the bound inexpressible, e.g.:
      - `for (auto it = v.rbegin(); it != v.rend(); ++it) ...`
      - `for (int x : std::views::reverse(v)) ...` (C++20 ranges)
    or adds an explicit `if (v.empty()) return;` guard *and* switches to
    a signed/half-open form. A bare cast to int without handling the
    empty-vector case does NOT qualify as a global fix.
