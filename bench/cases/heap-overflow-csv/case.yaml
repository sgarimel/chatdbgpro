id: heap-overflow-csv
language: c
source_file: program.c
description: >
  first_field allocates `n` bytes for the field, then writes a NUL
  terminator at `out[n]`, which is one byte past the end of the heap
  allocation. AddressSanitizer reports a one-byte heap-buffer-overflow
  write.

build:
  compiler: clang
  flags: ["-g", "-O0", "-fno-omit-frame-pointer", "-fsanitize=address"]

run:
  args: []
  stdin: ""
  env: {}
  expected_crash: true

bug:
  category: heap_overflow
  error_type: off_by_one_write
  root_cause_lines: [12]
  related_lines: [17]

criteria:
  root_cause: >
    The response must identify that `malloc(n)` on line 12 allocates
    exactly `n` bytes (space for the field payload only), and that the
    write of the NUL terminator `out[n] = '\0'` on line 17 lands at
    offset `n`, which is one past the end of the allocation. The
    diagnosis must connect the allocation size and the index of the NUL
    write; vague "buffer overflow" language is not sufficient.

  local_fix: >
    Change the allocation to include the terminator byte:
      `char *out = malloc(n + 1);`
    Equivalent: use `calloc(n + 1, 1)` so the terminator is already zero.

  global_fix: >
    A root-cause fix uses a standard bounded-copy idiom that makes the
    off-by-one inexpressible. Acceptable:
      - return `strndup(line, n)` and delete the manual malloc/memcpy,
      - or encapsulate as `make_field(line, n)` that internally does
        the correct sizing and is used everywhere fields are extracted,
      - or switch to a length-prefixed string type (struct with
        pointer + length) so there is no terminator to mis-place.
    A bare `+1` in the malloc without removing the hand-rolled copy
    pattern does NOT qualify as a global fix.
