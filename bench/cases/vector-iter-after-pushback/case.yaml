id: vector-iter-after-pushback
language: cpp
source_file: program.cpp
description: >
  An iterator into std::vector<int> is captured before a loop of
  push_back calls that reallocate the underlying storage. The iterator
  becomes dangling. The post-loop dereference is a use-after-free that
  AddressSanitizer reports as heap-use-after-free READ.

build:
  compiler: clang++
  flags: ["-g", "-std=c++17", "-O0", "-fno-omit-frame-pointer", "-fsanitize=address"]

run:
  args: []
  expected_crash: true

bug:
  category: use_after_free
  error_type: iterator_invalidation
  root_cause_lines: [10, 11, 12, 13]
  related_lines: [14]

criteria:
  root_cause: >
    The response must identify that std::vector::push_back may
    reallocate the contiguous storage when size > capacity, and that
    any iterator (or pointer) into the old storage is invalidated by
    that reallocation. The dereference of `it` after the loop is a
    use-after-free of the freed buffer. Naming "iterator
    invalidation" without saying *why* (reallocation moves the
    underlying buffer) is not enough.

  local_fix: >
    Either capture the offset (auto idx = 2;) and recompute v[idx]
    after the loop, or reserve enough capacity (v.reserve(1004)) so
    push_back never reallocates, or take the iterator after the
    inserts. Any of these eliminate the dangling read.

  global_fix: >
    A root-cause fix avoids storing iterators across mutating
    operations. Acceptable options:
      (a) store an index instead of an iterator and look up by index
          when dereferencing;
      (b) hold a stable reference (e.g. by inserting via a node-based
          container like std::list / std::deque whose iterators are
          stable across grow operations);
      (c) wrap the access in an RAII guard / span that re-derives
          on every read.
    Just calling reserve() is a local fix.
