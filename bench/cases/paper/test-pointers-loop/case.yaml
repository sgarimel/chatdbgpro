id: test-pointers-loop
language: cpp
source_file: program.cpp
description: >
  Creates three linked-list nodes. node1 and node2 form a cycle, but
  node3->next is left as nullptr (from the constructor default).
  Dereferencing *node3->next crashes.

build:
  compiler: clang++
  flags: ["-g", "-O0", "-fno-omit-frame-pointer", "-fsanitize=address"]

run:
  args: []
  expected_crash: true

bug:
  category: null_deref
  error_type: uninitialized_next_pointer
  root_cause_lines: [19]
  related_lines: [7, 16, 17]

criteria:
  root_cause: >
    The response must identify that node3->next is nullptr (set by the
    constructor on line 7) and that dereferencing it on line 19 via
    *node3->next causes a null pointer dereference. Noting the cycle
    between node1 and node2 is helpful context but not sufficient alone.

  local_fix: >
    Check node3->next != nullptr before dereferencing, or link node3
    into the list (e.g. node2->next = node3 or node3->next = node1).

  global_fix: >
    Use a proper linked-list container (std::list or a custom class)
    that enforces list invariants. A sentinel node pattern or
    std::optional<Node&> for the next pointer would prevent null
    dereferences structurally.
