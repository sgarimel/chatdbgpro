id: test-out-of-bounds-read
language: cpp
source_file: program.cpp
description: >
  Two stack arrays a[5] and b[5] are declared. The call f(*(a + 5))
  reads one element past the end of array a, accessing adjacent stack
  memory. ASan catches the stack-buffer-overflow.

build:
  compiler: clang++
  flags: ["-g", "-O0", "-fno-omit-frame-pointer", "-fsanitize=address"]

run:
  args: []
  expected_crash: true

bug:
  category: buffer_overflow
  error_type: off_by_one_read
  root_cause_lines: [13]
  related_lines: [10]

criteria:
  root_cause: >
    The response must identify that *(a + 5) on line 13 reads one
    element past the end of the 5-element array a (valid indices 0-4).
    It should note this is an off-by-one or out-of-bounds stack read.

  local_fix: >
    Change *(a + 5) to *(a + 4) to read the last valid element, or
    add a bounds check before the pointer arithmetic.

  global_fix: >
    Use std::array<int, 5> with .at(5) which throws std::out_of_range
    instead of silently reading adjacent memory. Avoid raw pointer
    arithmetic on stack arrays.
