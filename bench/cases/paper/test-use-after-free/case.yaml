id: test-use-after-free
language: cpp
source_file: program.cpp
description: >
  Allocates an int with new, decrements the pointer, deletes it, then
  passes the dangling pointer to doSomething which dereferences it.
  ASan catches heap-use-after-free.

build:
  compiler: clang++
  flags: ["-g", "-O0", "-fno-omit-frame-pointer", "-fsanitize=address"]

run:
  args: []
  expected_crash: true

bug:
  category: use_after_free
  error_type: use_after_delete
  root_cause_lines: [14]
  related_lines: [10, 11]

criteria:
  root_cause: >
    The response must identify that n is deleted on line 11, and then
    doSomething(n) on line 14 dereferences the freed pointer. It should
    note the pointer arithmetic (n--) on line 10 which shifts the pointer
    before deletion, compounding the issue. Simply saying "use after free"
    without identifying the delete-then-use sequence is insufficient.

  local_fix: >
    Do not call doSomething(n) or read *n after delete n. Either reorder
    the operations to use n before deleting, or set n = nullptr after
    delete and guard the subsequent uses.

  global_fix: >
    Replace raw new/delete with std::unique_ptr<int> so the lifetime is
    managed by RAII. Remove the manual pointer arithmetic entirely. The
    doSomething function should take a reference or a smart pointer, not
    a raw pointer to potentially-freed memory.
